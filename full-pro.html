<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Silsilah Pro</title>

<style>
body {
  font-family: Arial;
  background:#f5f5f5;
  margin:0;
  overflow:auto;
}

/* TOOLBAR */
.toolbar {
  text-align:center;
  padding:10px;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;
  cursor:pointer;
  margin:5px;
}

/* VIEWPORT */
.viewport {
  width:100vw;
  height:calc(100vh - 70px);
  overflow:auto;
}

/* SCALE */
.scale-wrapper {
  transform-origin: top center;
}

.normal {
  transform: scale(var(--scale));
}

/* TREE */
.tree {
  display:flex;
  justify-content:center;
}

/* FAMILY */
.family {
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* COUPLE */
.couple {
  display:flex;
  gap:30px;
  position:relative;
}

/* garis turun */
.couple::after {
  content:'';
  position:absolute;
  bottom:-20px;
  left:50%;
  width:2px;
  height:20px;
  background:black;
}

/* CHILDREN (VERTICAL 🔥) */
.children {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  margin-top:30px;
}

/* garis tiap anak */
.child {
  position:relative;
}

.child::before {
  content:'';
  position:absolute;
  top:-15px;
  left:50%;
  width:2px;
  height:15px;
  background:black;
  transform:translateX(-50%);
}

/* PERSON */
.person {
  background:white;
  border:1px solid black;
  border-radius:12px;
  padding:8px;
  width:80px;
  text-align:center;
}

.person img,.siluet {
  width:60px;
  height:60px;
  border-radius:50%;
}

/* SILUET */
.siluet {
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
}

.siluet.l { background:#2193b0; color:white; }
.siluet.p { background:#ff758c; color:white; }

.name {
  font-size:11px;
  font-weight:bold;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="toolbar">
  <button onclick="autoScale()">⚡ Auto Fit</button>
  <button onclick="exportImage()">📸 PNG</button>
  <button onclick="exportPDF()">📄 PDF</button>
</div>

<div class="viewport">
  <div id="wrapper" class="scale-wrapper normal">
    <div id="tree" class="tree"></div>
  </div>
</div>

<!-- LIB -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script>
let dataGlobal=[];

/* LOAD */
fetch('data.json')
.then(r=>r.json())
.then(data=>{
  dataGlobal=data;
  buildTree();
  setTimeout(autoScale,500);
});

/* SHORT NAME */
function shortName(nama){
  return nama ? nama.split(" ")[0] : "-";
}

/* BUILD TREE */
function buildTree(){
  const tree=document.getElementById("tree");
  tree.innerHTML="";

  let roots=dataGlobal.filter(p=>p.generasi==="1");

  roots.forEach(root=>{
    tree.appendChild(createFamily(root));
  });
}

/* RECURSIVE */
function createFamily(person){
  let wrap=document.createElement("div");
  wrap.className="family";

  let pasanganList=[];
  if(person.pasangan){
    let list=person.pasangan.split("|");
    pasanganList=dataGlobal.filter(x=>list.includes(x.nama));
  }

  if(!pasanganList.length){
    wrap.appendChild(createPerson(person));
    return wrap;
  }

  pasanganList.forEach(pasangan=>{
    let couple=document.createElement("div");
    couple.className="couple";

    couple.appendChild(createPerson(person));
    couple.appendChild(createPerson(pasangan));

    wrap.appendChild(couple);

    let children=dataGlobal.filter(x=>
      (x.ayah===person.nama && x.ibu===pasangan.nama)
    );

    if(children.length){
      let box=document.createElement("div");
      box.className="children";

      children.forEach(c=>{
        let child=document.createElement("div");
        child.className="child";
        child.appendChild(createFamily(c));
        box.appendChild(child);
      });

      wrap.appendChild(box);
    }
  });

  return wrap;
}

/* PERSON */
function createPerson(p){
  let div=document.createElement("div");
  div.className="person";

  let foto="";
  if(p.foto){
    foto=`<img src="${p.foto}">`;
  } else {
    foto = p.jenis_kelamin==="L"
      ? `<div class="siluet l">👨</div>`
      : `<div class="siluet p">👩</div>`;
  }

  div.innerHTML=`
    ${foto}
    <div class="name">${shortName(p.nama)}</div>
  `;
  return div;
}

/* AUTO SCALE */
function autoScale(){
  const tree=document.getElementById("tree");
  const wrapper=document.getElementById("wrapper");

  let scaleX = window.innerWidth / tree.scrollWidth;
  let scaleY = window.innerHeight / tree.scrollHeight;

  let scale = Math.min(scaleX, scaleY, 1);
  wrapper.style.transform = "scale("+scale+")";
}

/* EXPORT PNG */
function exportImage(){
  const tree=document.getElementById("tree");

  html2canvas(tree,{
    scale:3,
    width:tree.scrollWidth,
    height:tree.scrollHeight
  }).then(canvas=>{
    let link=document.createElement("a");
    link.download="silsilah.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}

/* EXPORT PDF */
async function exportPDF(){
  const { jsPDF } = window.jspdf;
  const tree=document.getElementById("tree");

  const canvas = await html2canvas(tree,{
    scale:2,
    width:tree.scrollWidth,
    height:tree.scrollHeight
  });

  const img = canvas.toDataURL();
  const pdf=new jsPDF('p','mm','a4');

  let w=210;
  let h=canvas.height*w/canvas.width;

  let y=0;

  while(y < h){
    pdf.addImage(img,'PNG',0,-y,w,h);
    y += 297;
    if(y < h) pdf.addPage();
  }

  pdf.save("silsilah.pdf");
}
</script>

</body>
</html>
