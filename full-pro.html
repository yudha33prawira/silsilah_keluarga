<script>
let dataGlobal=[];
let isRotate=true;

/* ===== NAMA PENDEK ===== */
function shortName(nama){
  if(!nama) return "-";

  let gelar=["h","hj","dr","ir","kh","ust","ustadz","r","r."];
  let parts=nama.split(" ");

  for(let i=0;i<parts.length;i++){
    let w=parts[i].toLowerCase();

    if(gelar.includes(w)) continue;
    if(w.length===2 && w.endsWith(".")) continue;

    return parts[i];
  }

  return parts[0];
}

/* LOAD */
fetch('data.json?v='+Date.now())
.then(r=>r.json())
.then(data=>{
  dataGlobal=data;
  buildTree();
});

/* ROOT */
function buildTree(){
  const tree=document.getElementById("tree");

  let roots=dataGlobal.filter(p=>p.generasi==="1" && p.jenis_kelamin==="L");

  roots.forEach(root=>{
    tree.appendChild(createFamily(root));
  });
}

/* RECURSIVE FAMILY */
function createFamily(person){

  let wrapper=document.createElement("div");
  wrapper.className="family";

  let pasanganList=[];

  if(person.pasangan){
    let list=person.pasangan.split("|").map(x=>x.trim());
    pasanganList=dataGlobal.filter(x=>list.includes(x.nama));
  }

  if(!pasanganList.length){
    wrapper.appendChild(createPerson(person));
    return wrapper;
  }

  pasanganList.forEach(pasangan=>{

    let couple=document.createElement("div");
    couple.className="couple";

    couple.appendChild(createPerson(person));

    let love=document.createElement("div");
    love.className="love";
    love.innerHTML="❤️";
    couple.appendChild(love);

    couple.appendChild(createPerson(pasangan));

    wrapper.appendChild(couple);

    let children=dataGlobal.filter(x=>
      (x.ayah===person.nama && x.ibu===pasangan.nama) ||
      (x.ibu===person.nama && x.ayah===pasangan.nama)
    );

    if(children.length){
      let childBox=document.createElement("div");
      childBox.className="children";

      children.forEach(c=>{
        let childDiv=document.createElement("div");
        childDiv.className="child";

        childDiv.appendChild(createFamily(c));

        childBox.appendChild(childDiv);
      });

      wrapper.appendChild(childBox);
    }

  });

  return wrapper;
}

/* PERSON */
function createPerson(p){

  let div=document.createElement("div");
  div.className="person";

  let foto="";

  if(p.foto && p.foto.trim()!==""){
    foto=`<img src="${p.foto}">`;
  } else {
    let g=(p.jenis_kelamin||"").toUpperCase();
    foto = g==="L"
      ? `<div class="siluet l">👨</div>`
      : `<div class="siluet p">👩</div>`;
  }

  div.innerHTML=`
    ${foto}
    <div class="name">${shortName(p.nama)}</div>
  `;

  return div;
}

/* ROTATE */
function toggleRotate(){
  const tree=document.getElementById("tree");
  isRotate = !isRotate;
  tree.classList.toggle("tree-rotate");
}

/* ===== EXPORT PNG (FIX HD + ANTI CROP) ===== */
async function exportImage(){
  const tree = document.getElementById("tree");

  tree.classList.remove("tree-rotate");

  const canvas = await html2canvas(tree,{
    scale:3,
    useCORS:true,
    scrollX:0,
    scrollY:0,
    windowWidth:document.body.scrollWidth,
    windowHeight:document.body.scrollHeight
  });

  const link=document.createElement("a");
  link.download="silsilah-full.png";
  link.href=canvas.toDataURL("image/png");
  link.click();

  if(isRotate) tree.classList.add("tree-rotate");
}

/* ===== EXPORT PDF PREMIUM (ANTI TERPOTONG FIX TOTAL) ===== */
async function exportPDFPremium(){
  const { jsPDF } = window.jspdf;
  const tree = document.getElementById("tree");

  tree.classList.remove("tree-rotate");

  const canvas = await html2canvas(tree,{
    scale:2.5,
    useCORS:true,
    scrollX:0,
    scrollY:0,
    windowWidth:document.body.scrollWidth,
    windowHeight:document.body.scrollHeight
  });

  const imgData = canvas.toDataURL("image/png");

  const pdf = new jsPDF('l','mm','a4');

  const pageWidth = 297;
  const pageHeight = 210;

  const margin = 10;
  const usableWidth = pageWidth - margin*2;
  const usableHeight = pageHeight - margin*2;

  const imgHeight = canvas.height * usableWidth / canvas.width;

  let y = 0;
  let page = 1;

  while(y < imgHeight){

    if(page > 1) pdf.addPage();

    pdf.addImage(
      imgData,
      'PNG',
      margin,
      margin - y,
      usableWidth,
      imgHeight
    );

    // HEADER
    pdf.setFontSize(12);
    pdf.text("Silsilah Keluarga Besar", margin, 7);

    // FOOTER
    pdf.setFontSize(10);
    pdf.text("Halaman " + page, pageWidth - 40, pageHeight - 5);

    y += usableHeight;
    page++;
  }

  const d=new Date();
  pdf.save(`silsilah-${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}.pdf`);

  if(isRotate) tree.classList.add("tree-rotate");
}
</script>
