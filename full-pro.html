<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Silsilah Pro</title>

<style>
body {
  font-family: Arial;
  background:#f5f5f5;
  text-align:center;
  margin:0;
}

/* WRAPPER ROTATE */
.tree-wrapper {
  width:100vw;
  height:100vh;
  overflow:auto;
  position:relative;
}

.tree-rotate {
  transform: rotate(-90deg);
  transform-origin: top left;
  position:absolute;
  top:100%;
  left:0;
}

/* TREE */
.tree {
  display:flex;
  justify-content:center;
}

/* FAMILY */
.family {
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
}

/* COUPLE */
.couple {
  display:flex;
  gap:40px;
  align-items:center;
  position:relative;
}

.love {
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  top:35px;
}

/* LINE DOWN */
.couple::after {
  content:'';
  position:absolute;
  bottom:-30px;
  left:50%;
  width:2px;
  height:30px;
  background:black;
  transform:translateX(-50%);
}

/* CHILDREN */
.children {
  display:flex;
  gap:30px;
  margin-top:40px;
  position:relative;
}

.children::before {
  content:'';
  position:absolute;
  top:-20px;
  left:0;
  right:0;
  height:2px;
  background:black;
}

.child {
  position:relative;
}

.child::before {
  content:'';
  position:absolute;
  top:-20px;
  left:50%;
  width:2px;
  height:20px;
  background:black;
  transform:translateX(-50%);
}

/* PERSON */
.person {
  background:white;
  border:1px solid black;
  border-radius:12px;
  padding:10px;
  width:90px;
}

.person img, .siluet {
  width:70px;
  height:70px;
  border-radius:50%;
}

/* SILUET */
.siluet {
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  animation:pulse 2s infinite;
}

.siluet.l { background:#2193b0; color:white; }
.siluet.p { background:#ff758c; color:white; }

@keyframes pulse {
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

.name {
  margin-top:5px;
  font-weight:bold;
  font-size:13px;
}

/* TOOLBAR */
.toolbar {
  margin:10px;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;
  cursor:pointer;
  margin:5px;
}
</style>
</head>

<body>

<h2>🌳 Full Silsilah (Pro)</h2>

<div class="toolbar">
  <button onclick="toggleRotate()">🔄 Rotate</button>
  <button onclick="exportImage()">📸 PNG</button>
  <button onclick="exportPDFPremium()">📄 PDF</button>
</div>

<div class="tree-wrapper">
  <div class="tree tree-rotate" id="tree"></div>
</div>

<!-- LIBRARY -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script>
let dataGlobal=[];
let isRotate=true;

/* ===== NAMA PENDEK ===== */
function shortName(nama){
  if(!nama) return "-";

  let gelar=["h","hj","dr","ir","kh","ust","ustadz","r","r."];
  let parts=nama.split(" ");

  for(let i=0;i<parts.length;i++){
    let w=parts[i].toLowerCase();

    if(gelar.includes(w)) continue;
    if(w.length===2 && w.endsWith(".")) continue;

    return parts[i];
  }

  return parts[0];
}

/* LOAD */
fetch('data.json?v='+Date.now())
.then(r=>r.json())
.then(data=>{
  dataGlobal=data;
  buildTree();
});

/* ROOT */
function buildTree(){
  const tree=document.getElementById("tree");

  let roots=dataGlobal.filter(p=>p.generasi==="1" && p.jenis_kelamin==="L");

  roots.forEach(root=>{
    tree.appendChild(createFamily(root));
  });
}

/* RECURSIVE FAMILY */
function createFamily(person){

  let wrapper=document.createElement("div");
  wrapper.className="family";

  let pasanganList=[];

  if(person.pasangan){
    let list=person.pasangan.split("|").map(x=>x.trim());
    pasanganList=dataGlobal.filter(x=>list.includes(x.nama));
  }

  if(!pasanganList.length){
    wrapper.appendChild(createPerson(person));
    return wrapper;
  }

  pasanganList.forEach(pasangan=>{

    let couple=document.createElement("div");
    couple.className="couple";

    couple.appendChild(createPerson(person));

    let love=document.createElement("div");
    love.className="love";
    love.innerHTML="❤️";
    couple.appendChild(love);

    couple.appendChild(createPerson(pasangan));

    wrapper.appendChild(couple);

    let children=dataGlobal.filter(x=>
      (x.ayah===person.nama && x.ibu===pasangan.nama) ||
      (x.ibu===person.nama && x.ayah===pasangan.nama)
    );

    if(children.length){
      let childBox=document.createElement("div");
      childBox.className="children";

      children.forEach(c=>{
        let childDiv=document.createElement("div");
        childDiv.className="child";

        childDiv.appendChild(createFamily(c));

        childBox.appendChild(childDiv);
      });

      wrapper.appendChild(childBox);
    }

  });

  return wrapper;
}

/* PERSON */
function createPerson(p){

  let div=document.createElement("div");
  div.className="person";

  let foto="";

  if(p.foto && p.foto.trim()!==""){
    foto=`<img src="${p.foto}">`;
  } else {
    let g=(p.jenis_kelamin||"").toUpperCase();
    foto = g==="L"
      ? `<div class="siluet l">👨</div>`
      : `<div class="siluet p">👩</div>`;
  }

  div.innerHTML=`
    ${foto}
    <div class="name">${shortName(p.nama)}</div>
  `;

  return div;
}

/* ROTATE */
function toggleRotate(){
  const tree=document.getElementById("tree");
  isRotate = !isRotate;
  tree.classList.toggle("tree-rotate");
}

/* EXPORT PNG */
async function exportImage(){
  const tree = document.getElementById("tree");

  tree.classList.remove("tree-rotate");

  const canvas = await html2canvas(tree,{
    scale:3,
    useCORS:true,
    scrollX:0,
    scrollY:0,
    windowWidth:document.body.scrollWidth,
    windowHeight:document.body.scrollHeight
  });

  const link=document.createElement("a");
  link.download="silsilah-full.png";
  link.href=canvas.toDataURL("image/png");
  link.click();

  if(isRotate) tree.classList.add("tree-rotate");
}

/* EXPORT PDF PREMIUM */
async function exportPDFPremium(){
  const { jsPDF } = window.jspdf;
  const tree = document.getElementById("tree");

  tree.classList.remove("tree-rotate");

  const canvas = await html2canvas(tree,{
    scale:2.5,
    useCORS:true,
    scrollX:0,
    scrollY:0,
    windowWidth:document.body.scrollWidth,
    windowHeight:document.body.scrollHeight
  });

  const imgData = canvas.toDataURL("image/png");

  const pdf = new jsPDF('l','mm','a4');

  const pageWidth = 297;
  const pageHeight = 210;
  const margin = 10;

  const usableWidth = pageWidth - margin*2;
  const usableHeight = pageHeight - margin*2;

  const imgHeight = canvas.height * usableWidth / canvas.width;

  let y = 0;
  let page = 1;

  while(y < imgHeight){

    if(page > 1) pdf.addPage();

    pdf.addImage(
      imgData,
      'PNG',
      margin,
      margin - y,
      usableWidth,
      imgHeight
    );

    pdf.setFontSize(12);
    pdf.text("Silsilah Keluarga Besar", margin, 7);

    pdf.setFontSize(10);
    pdf.text("Halaman " + page, pageWidth - 40, pageHeight - 5);

    y += usableHeight;
    page++;
  }

  const d=new Date();
  pdf.save(`silsilah-${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}.pdf`);

  if(isRotate) tree.classList.add("tree-rotate");
}
</script>

</body>
</html>
