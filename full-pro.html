<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silsilah Ultimate FIX</title>

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; overflow:hidden; }

.toolbar {
  text-align:center;
  padding:10px;
  background:white;
  position:fixed;
  width:100%;
  z-index:10;
}

button {
  padding:8px 12px;
  margin:3px;
  border:none;
  border-radius:8px;
  background:#2575fc;
  color:white;
  cursor:pointer;
}

.viewport {
  width:100vw;
  height:100vh;
  overflow:hidden;
  position:relative;
}

#canvas {
  position:absolute;
  transform-origin:0 0;
  min-width:max-content;
  min-height:max-content;
  cursor:grab;
}

.tree {
  display:flex;
  justify-content:center;
  padding-top:80px;
}

.family {
  display:flex;
  flex-direction:column;
  align-items:center;
}

.couple {
  display:flex;
  gap:20px;
  position:relative;
}

.couple::after {
  content:'';
  position:absolute;
  bottom:-15px;
  left:50%;
  width:2px;
  height:15px;
  background:black;
}

.children {
  display:flex;
  flex-direction:column;
  gap:15px;
  margin-top:25px;
}

.child::before {
  content:'';
  position:absolute;
  top:-10px;
  left:50%;
  width:2px;
  height:10px;
  background:black;
  transform:translateX(-50%);
}

.person {
  background:white;
  border:1px solid black;
  border-radius:10px;
  padding:6px;
  width:70px;
  text-align:center;
  cursor:pointer;
}

.person.active { background:yellow; }

.siluet {
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
}

.siluet.l { background:#2193b0; color:white; }
.siluet.p { background:#ff758c; color:white; }

.name { font-size:10px; margin-top:3px; font-weight:bold; }
</style>
</head>

<body>

<div class="toolbar">
  <button onclick="resetView()">Reset</button>
  <button onclick="autoFit()">Auto Fit</button>
</div>

<div class="viewport" id="viewport">
  <div id="canvas">
    <div id="tree" class="tree"></div>
  </div>
</div>

<script>
/* DATA LANGSUNG */
let dataGlobal = [
  { nama:"Kakek", generasi:"1", jenis_kelamin:"L", pasangan:["Nenek"] },
  { nama:"Nenek", generasi:"1", jenis_kelamin:"P", pasangan:["Kakek"] },

  { nama:"Ayah", ayah:"Kakek", jenis_kelamin:"L", pasangan:["Ibu"] },
  { nama:"Ibu", jenis_kelamin:"P", pasangan:["Ayah"] },

  { nama:"Saya", ayah:"Ayah", jenis_kelamin:"L" },
  { nama:"Adik", ayah:"Ayah", jenis_kelamin:"P" }
];

let scale=1, posX=0, posY=0;

const viewport = document.getElementById("viewport");
const canvas = document.getElementById("canvas");
const tree = document.getElementById("tree");

function shortName(n){
  return n ? n.split(" ")[0] : "-";
}

function buildTree(){
  tree.innerHTML="";
  let roots=dataGlobal.filter(p=>p.generasi==="1");
  roots.forEach(r=>{
    tree.appendChild(createFamily(r));
  });
}

function createFamily(p){
  let wrap=document.createElement("div");
  wrap.className="family";

  let pasangan=dataGlobal.find(x=>p.pasangan?.includes(x.nama));

  if(!pasangan){
    wrap.appendChild(createPerson(p));
    return wrap;
  }

  let couple=document.createElement("div");
  couple.className="couple";

  couple.appendChild(createPerson(p));
  couple.appendChild(createPerson(pasangan));

  wrap.appendChild(couple);

  let children=dataGlobal.filter(x=>x.ayah===p.nama);

  if(children.length){
    let box=document.createElement("div");
    box.className="children";

    children.forEach(c=>{
      let d=document.createElement("div");
      d.appendChild(createFamily(c));
      box.appendChild(d);
    });

    wrap.appendChild(box);
  }

  return wrap;
}

function createPerson(p){
  let div=document.createElement("div");
  div.className="person";
  div.onclick=()=>highlight(p.nama);

  let icon = p.jenis_kelamin==='L'?'👨':'👩';

  div.innerHTML = `
    <div class="siluet ${p.jenis_kelamin==='L'?'l':'p'}">${icon}</div>
    <div class="name">${shortName(p.nama)}</div>
  `;
  return div;
}

function highlight(nama){
  document.querySelectorAll(".person").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".person").forEach(x=>{
    if(x.innerText.includes(shortName(nama))){
      x.classList.add("active");
    }
  });
}

viewport.addEventListener("wheel", e=>{
  e.preventDefault();
  scale += e.deltaY * -0.001;
  scale = Math.min(Math.max(.2, scale), 3);
  updateTransform();
});

let isDown=false, startX, startY;

viewport.addEventListener("mousedown", e=>{
  isDown=true;
  startX=e.clientX-posX;
  startY=e.clientY-posY;
});

window.addEventListener("mouseup",()=>isDown=false);

viewport.addEventListener("mousemove", e=>{
  if(!isDown) return;
  posX=e.clientX-startX;
  posY=e.clientY-startY;
  updateTransform();
});

function updateTransform(){
  canvas.style.transform = `translate(${posX}px,${posY}px) scale(${scale})`;
}

function autoFit(){
  const rect = tree.getBoundingClientRect();
  const scaleX = viewport.clientWidth / rect.width;
  const scaleY = viewport.clientHeight / rect.height;

  scale = Math.min(scaleX, scaleY) * 0.9;
  posX = (viewport.clientWidth - rect.width * scale) / 2;
  posY = (viewport.clientHeight - rect.height * scale) / 2;

  updateTransform();
}

function resetView(){
  scale=1; posX=0; posY=0;
  updateTransform();
}

buildTree();
setTimeout(autoFit, 300);
</script>

</body>
</html>
