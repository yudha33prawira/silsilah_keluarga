<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Silsilah Keluarga</title>

<style>
body {
  font-family: Arial;
  text-align: center;
}

.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.row {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.v-line {
  width: 2px;
  height: 30px;
  background: black;
}

.children {
  position: relative;
  margin-top: 10px;
}

.children::before {
  content: '';
  position: absolute;
  top: -10px;
  left: 10%;
  right: 10%;
  height: 2px;
  background: black;
}

.person {
  border: 1px solid black;
  padding: 10px;
  border-radius: 10px;
  margin: 10px;
  background: white;
  cursor: pointer;
  min-width: 120px;
}

.person img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
}

.couple {
  display: flex;
  gap: 10px;
  justify-content: center;
}

/* popup */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.popup-content {
  background: white;
  width: 260px;
  margin: 100px auto;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>Silsilah Keluarga Ngadiman</h2>

<div class="tree" id="tree"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3 id="nama"></h3>
    <p id="info"></p>

    <button id="btnDetail">Lihat Detail</button><br><br>
    <button onclick="closePopup()">Tutup</button>
  </div>
</div>

<script>
fetch('data.json')
  .then(res => res.json())
  .then(data => {

    const tree = document.getElementById("tree");

    // ===== GENERASI 1 =====
    const gen1 = data.filter(p => p.generasi == 1);

    const row1 = document.createElement("div");
    row1.className = "row";

    const used = new Set();

    gen1.forEach(p => {
      if (used.has(p.nama)) return;

      row1.appendChild(createPerson(p, data));

      if (p.pasangan) {
        used.add(p.pasangan);
      }
    });

    tree.appendChild(row1);

    // ===== GARIS =====
    const vline = document.createElement("div");
    vline.className = "v-line";
    tree.appendChild(vline);

    // ===== GENERASI 2 =====
    let gen2 = [];

    gen1.forEach(p => {
      const anak = data.filter(x => x.orang_tua === p.nama);
      gen2 = gen2.concat(anak);
    });

    const row2 = document.createElement("div");
    row2.className = "row children";

    const used2 = new Set();

    gen2.forEach(p => {
      if (used2.has(p.nama)) return;

      row2.appendChild(createPerson(p, data));

      if (p.pasangan) {
        used2.add(p.pasangan);
      }
    });

    tree.appendChild(row2);

  });


// ===== CARD =====
function createPerson(p, data) {

  const div = document.createElement("div");
  div.className = "person";

  const pasangan = data.find(x => x.nama === p.pasangan);

  if (pasangan) {
    div.innerHTML = `
      <div class="couple">
        <div>
          <img src="${p.foto}">
          <div>${p.nama}</div>
        </div>
        <div>
          <img src="${pasangan.foto}">
          <div>${pasangan.nama}</div>
        </div>
      </div>
    `;
  } else {
    div.innerHTML = `
      <img src="${p.foto}">
      <div>${p.nama}</div>
    `;
  }

  div.onclick = () => {
    showDetail(
      p.nama,
      `Lahir: ${p.tanggal_lahir}
Alamat: ${p.alamat_lahir}
Domisili: ${p.domisili}
Pasangan: ${p.pasangan}
Anak: ${p.jumlah_anak}
Status: ${p.status}
WA: ${p.wa}
Pekerjaan: ${p.pekerjaan}`,
      p.id
    );
  };

  return div;
}


// ===== POPUP =====
function showDetail(nama, info, id) {
  document.getElementById("popup").style.display = "block";
  document.getElementById("nama").innerText = nama;
  document.getElementById("info").innerHTML = info.replace(/\n/g, "<br>");

  const btn = document.getElementById("btnDetail");

  btn.style.display = "inline-block";
  btn.onclick = function() {
    window.location.href = "detail.html?id=" + id;
  };
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
