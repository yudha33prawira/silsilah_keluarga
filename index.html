<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silsilah Keluarga</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin: 0;
}

.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 15px;
}

.family-block {
  margin-bottom: 40px;
}

.couple {
  display: flex;
  gap: 20px;
  justify-content: center;
  position: relative;
}

.couple::after {
  content: '';
  position: absolute;
  bottom: -30px;
  left: 50%;
  width: 2px;
  height: 30px;
  background: black;
  transform: translateX(-50%);
}

.children {
  margin-top: 40px;
  width: 100%;
  max-width: 700px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  position: relative;
}

.children::before {
  content: '';
  position: absolute;
  top: -15px;
  left: 10%;
  right: 10%;
  height: 2px;
  background: black;
}

.person {
  border: 1px solid black;
  border-radius: 12px;
  padding: 15px;
  background: white;
  color: black;
}

.person:hover {
  transform: scale(1.05);
}

.person.meninggal {
  background: black;
  color: white;
}

.person img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  cursor: pointer;
}

.name {
  margin-top: 8px;
  font-weight: bold;
  cursor: pointer;
}

.name.disabled {
  color: gray;
  cursor: default;
}

/* SEARCH */
.search-btn {
  padding: 8px 15px;
  margin: 10px;
  cursor: pointer;
}

.search-popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.search-box {
  background: white;
  padding: 20px;
  margin: 100px auto;
  width: 300px;
  border-radius: 10px;
}

/* POPUP DETAIL */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.popup-content {
  background: white;
  width: 90%;
  max-width: 300px;
  margin: 80px auto;
  padding: 20px;
  border-radius: 10px;
}

@media (max-width: 600px) {
  .children {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<h2>Silsilah Keluarga Ngadiman</h2>

<button onclick="openSearch()" class="search-btn">🔍 Cari</button>

<div class="tree" id="tree"></div>

<!-- SEARCH POPUP -->
<div id="searchPopup" class="search-popup">
  <div class="search-box">
    <h3>Cari Nama</h3>
    <input type="text" id="searchInput" placeholder="Ketik nama..." onkeyup="searchName(event)">
    <br><br>
    <button onclick="searchName()">Cari</button>
    <button onclick="closeSearch()">Tutup</button>
  </div>
</div>

<!-- DETAIL POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3 id="nama"></h3>
    <p id="info"></p>
    <button id="btnDetail">Lihat Detail</button><br><br>
    <button onclick="closePopup()">Tutup</button>
  </div>
</div>

<script>
let globalData = [];

fetch('data.json?v=' + new Date().getTime())
.then(res => res.json())
.then(data => {
  globalData = data;
  init(data);
});

function init(data) {
  const tree = document.getElementById("tree");
  const root = data.find(p => p.nama === "Ngadiman");

  if (!root) {
    tree.innerHTML = "Data tidak ditemukan";
    return;
  }

  let pasanganList = [];
  if (root.pasangan) {
    let list = root.pasangan.split("|").map(x => x.trim());
    pasanganList = data.filter(x => list.includes(x.nama));
  }

  if (pasanganList.length === 0) {
    createFamilyBlock(tree, root, null, data);
  } else {
    pasanganList.forEach(psg => {
      createFamilyBlock(tree, root, psg, data);
    });
  }
}

// BLOK KELUARGA
function createFamilyBlock(tree, root, pasangan, data) {
  const block = document.createElement("div");
  block.className = "family-block";

  const couple = document.createElement("div");
  couple.className = "couple";
  couple.appendChild(createPerson(root));
  if (pasangan) couple.appendChild(createPerson(pasangan));

  block.appendChild(couple);

  const children = data.filter(x =>
    (x.ayah === root.nama && pasangan && x.ibu === pasangan.nama) ||
    (x.ibu === root.nama && pasangan && x.ayah === pasangan.nama)
  );

  if (children.length > 0) {
    const childBox = document.createElement("div");
    childBox.className = "children";
    children.forEach(p => childBox.appendChild(createPerson(p)));
    block.appendChild(childBox);
  }

  tree.appendChild(block);
}

function punyaAnak(p) {
  return globalData.some(x => x.ayah === p.nama || x.ibu === p.nama);
}

function createPerson(p) {
  const hasChild = punyaAnak(p);
  const isMeninggal = (p.status || "").toLowerCase().includes("meninggal");

  const div = document.createElement("div");
  div.className = isMeninggal ? "person meninggal person-card" : "person person-card";
  div.innerHTML = `
    <img src="${p.foto}" onclick="openPopup('${p.id}')">
    <div class="name ${!hasChild ? 'disabled' : ''}">${p.nama}</div>
  `;
  div.setAttribute("data-name", p.nama.toLowerCase());

  if (hasChild) div.querySelector('.name').onclick = () => goDetail(p.id);

  return div;
}

// POPUP DETAIL
function openPopup(id) {
  const p = globalData.find(x => x.id === id);
  if (!p) return;

  const hasChild = punyaAnak(p);
  document.getElementById("popup").style.display = "block";
  document.getElementById("nama").innerText = p.nama;
  document.getElementById("info").innerHTML = `
    Lahir: ${p.tanggal_lahir}<br>
    Alamat: ${p.alamat_lahir}<br>
    Domisili: ${p.domisili}<br>
    Pasangan: ${p.pasangan}<br>
    Anak: ${p.jumlah_anak}<br>
    Status: ${p.status}<br>
    WA: ${p.wa}<br>
    Pekerjaan: ${p.pekerjaan}
  `;

  const btn = document.getElementById("btnDetail");
  if (hasChild) {
    btn.style.display = "inline-block";
    btn.onclick = () => goDetail(p.id);
  } else {
    btn.style.display = "none";
  }
}

function closePopup() { document.getElementById("popup").style.display = "none"; }
function goDetail(id) { window.location.href = "detail.html?id=" + id; }

// POPUP SEARCH
function openSearch() {
  document.getElementById("searchPopup").style.display = "block";
  document.getElementById("searchInput").focus();
}

function closeSearch() {
  document.getElementById("searchPopup").style.display = "none";
}

function searchName(e) {
  if (e && e.key && e.key !== "Enter") return;

  let input = document.getElementById("searchInput").value.toLowerCase();
  let cards = document.querySelectorAll(".person-card");

  let firstMatch = null;
  cards.forEach(card => {
    let name = card.getAttribute("data-name");
    if (name.includes(input) && input !== "") {
      card.style.background = "yellow";
      if (!firstMatch) firstMatch = card;
    } else {
      card.style.background = "";
    }
  });

  if (firstMatch) firstMatch.scrollIntoView({ behavior: "smooth", block: "center" });
}
</script>

</body>
</html>
