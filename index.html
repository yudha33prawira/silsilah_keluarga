<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Silsilah Keluarga</title>

<style>
body {
  font-family: Arial;
  text-align: center;
}

/* TREE */
.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ROW */
.row {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

/* Garis vertikal */
.v-line {
  width: 2px;
  height: 30px;
  background: black;
}

/* Garis anak */
.children {
  position: relative;
  margin-top: 10px;
}

.children::before {
  content: '';
  position: absolute;
  top: -10px;
  left: 10%;
  right: 10%;
  height: 2px;
  background: black;
}

/* CARD */
.person {
  position: relative;
  border: 1px solid black;
  padding: 10px;
  border-radius: 10px;
  margin: 10px;
  cursor: pointer;
  background: white;
  min-width: 120px;
}

.person::before {
  content: '';
  position: absolute;
  top: -10px;
  left: 50%;
  width: 2px;
  height: 10px;
  background: black;
}

.person img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
}

/* pasangan */
.couple {
  display: flex;
  gap: 10px;
  justify-content: center;
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.popup-content {
  background: white;
  width: 260px;
  margin: 100px auto;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>Silsilah Keluarga Ngadiman</h2>

<div class="tree" id="tree"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3 id="nama"></h3>
    <p id="info"></p>

    <button id="btnDetail">Lihat Detail</button><br><br>
    <button onclick="closePopup()">Tutup</button>
  </div>
</div>

<script>
fetch('data.json')
  .then(res => res.json())
  .then(data => {

    const tree = document.getElementById("tree");

    // cari root (tidak punya orang tua)
    const roots = data.filter(p => !p.orang_tua || p.orang_tua === "-");

    buildLevel(roots, tree, data);

  });


// ===== BUILD TREE =====
function buildLevel(parents, container, data) {

  // ===== TAMPILKAN PARENT =====
  const row = document.createElement("div");
  row.className = "row";

  const used = new Set();

  parents.forEach(p => {

    if (used.has(p.nama)) return;

    row.appendChild(createPerson(p, data));

    if (p.pasangan) {
      used.add(p.pasangan);
    }

  });

  container.appendChild(row);


  // ===== CARI ANAK =====
  let children = [];

  parents.forEach(p => {
    const child = data.filter(x => x.orang_tua === p.nama);
    children = children.concat(child);
  });


  // ===== TAMPILKAN ANAK SEKALI SAJA =====
  if (children.length > 0) {

    const vline = document.createElement("div");
    vline.className = "v-line";
    container.appendChild(vline);

    const childRow = document.createElement("div");
    childRow.className = "row children";

    const usedChild = new Set();

    children.forEach(c => {

      if (usedChild.has(c.nama)) return;

      childRow.appendChild(createPerson(c, data));

      if (c.pasangan) {
        usedChild.add(c.pasangan);
      }

    });

    container.appendChild(childRow);

    // ❗ STOP DI SINI (JANGAN RECURSIVE LAGI)
  }
}
// ===== CARD =====
function createPerson(p, data) {

  const div = document.createElement("div");
  div.className = "person";

  const pasangan = data.find(x => x.nama === p.pasangan);

  if (pasangan) {
    div.innerHTML = `
      <div class="couple">
        <div>
          <img src="${p.foto}">
          <div>${p.nama}</div>
        </div>
        <div>
          <img src="${pasangan.foto}">
          <div>${pasangan.nama}</div>
        </div>
      </div>
    `;
  } else {
    div.innerHTML = `
      <img src="${p.foto}">
      <div>${p.nama}</div>
    `;
  }

  div.onclick = () => {
    showDetail(
      p.nama,
      `Lahir: ${p.tanggal_lahir}
Alamat: ${p.alamat_lahir}
Domisili: ${p.domisili}
Pasangan: ${p.pasangan}
Anak: ${p.jumlah_anak}
Status: ${p.status}
WA: ${p.wa}
Pekerjaan: ${p.pekerjaan}`,
      p.id
    );
  };

  return div;
}


// ===== POPUP =====
function showDetail(nama, info, id) {
  document.getElementById("popup").style.display = "block";
  document.getElementById("nama").innerText = nama;
  document.getElementById("info").innerHTML = info.replace(/\n/g, "<br>");

  const btn = document.getElementById("btnDetail");

  if (id) {
    btn.style.display = "inline-block";
    btn.onclick = function() {
      window.location.href = "detail.html?id=" + id;
    };
  } else {
    btn.style.display = "none";
  }
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
