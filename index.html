<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Silsilah Keluarga</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(-45deg, #1e2a5e, #2a3f7e, #1b4f8b, #0f2b4f);
      background-size: 400% 400%;
      animation: gradientFlow 15s ease infinite;
      min-height: 100vh;
      padding-bottom: 40px;
    }
    @keyframes gradientFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    
    .hero { text-align: center; padding: 20px 16px 8px; }
    h1 {
      font-size: 1.8rem; font-weight: 700;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(12px);
      display: inline-block; padding: 8px 24px; border-radius: 50px;
      color: white; border: 1px solid rgba(255,255,255,0.2);
    }
    .marquee {
      width: 100%; overflow: hidden;
      background: rgba(0,0,0,0.45); backdrop-filter: blur(8px);
      border-top: 1px solid rgba(255,255,255,0.2);
      border-bottom: 1px solid rgba(255,255,255,0.2);
      margin: 12px 0;
    }
    .marquee-track {
      display: flex; width: max-content;
      animation: scrollText 38s linear infinite;
    }
    .marquee-track span { white-space: nowrap; padding: 8px 36px; color: #fff9e0; font-size: 0.85rem; }
    @keyframes scrollText { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .marquee-track:hover { animation-play-state: paused; }
    
    .toolbar {
      display: flex; justify-content: center; gap: 16px; margin: 16px 0 20px; flex-wrap: wrap;
    }
    .btn-glass {
      background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
      border: none; padding: 10px 24px; border-radius: 40px;
      font-size: 1rem; font-weight: 600; color: white; cursor: pointer;
      transition: 0.2s;
    }
    .btn-glass:hover { background: rgba(255,255,255,0.3); transform: scale(1.02); }
    
    .tree { display: flex; flex-direction: column; align-items: center; gap: 36px; padding: 10px 20px 40px; }
    .family-card {
      background: rgba(255,255,255,0.1); backdrop-filter: blur(4px);
      border-radius: 32px; padding: 20px 12px 12px;
      width: 100%; max-width: 800px; box-shadow: 0 12px 28px rgba(0,0,0,0.2);
    }
    .couple-row {
      display: flex; justify-content: center; align-items: center;
      gap: 28px; position: relative; flex-wrap: wrap;
    }
    .love-badge { font-size: 28px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
    .children-grid {
      margin-top: 36px; display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 18px; justify-items: center;
      border-top: 2px dashed rgba(255,255,240,0.4);
      padding-top: 24px;
    }
    .person-card {
      background: rgba(255,255,255,0.92); backdrop-filter: blur(4px);
      border-radius: 28px; padding: 14px 10px 10px;
      width: 130px; text-align: center; cursor: pointer;
      transition: 0.2s ease; box-shadow: 0 6px 12px rgba(0,0,0,0.1);
      border: 1px solid rgba(255,255,255,0.5);
    }
    .person-card.meninggal { background: #2c2e3a; color: #e0e0e0; border-color: #555; }
    .person-card:hover { transform: translateY(-6px); box-shadow: 0 14px 22px rgba(0,0,0,0.2); }
    .avatar {
      width: 85px; height: 85px; border-radius: 50%; object-fit: cover;
      margin: 0 auto 8px; display: block; border: 3px solid white;
    }
    .avatar-siluet {
      width: 85px; height: 85px; border-radius: 50%; margin: 0 auto 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 52px; background: #d9e2ec;
    }
    .avatar-siluet.l { background: #7aa2f7; color: white; }
    .avatar-siluet.p { background: #f29bc4; color: white; }
    .person-name { font-weight: 800; font-size: 1rem; margin-top: 5px; }
    
    .breadcrumb-area {
      background: rgba(0,0,0,0.5); backdrop-filter: blur(12px);
      border-radius: 32px; padding: 12px 20px; margin: 10px auto;
      width: fit-content; max-width: 90%; text-align: center; color: white;
    }
    .bread-line { font-size: 0.85rem; display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin: 5px 0; }
    .bread-line span { cursor: pointer; color: #ffea9e; font-weight: 600; }
    .bread-line span:hover { text-decoration: underline; }
    
    /* popup & modal */
    .popup-overlay, .search-modal, .filter-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
      z-index: 1000; align-items: center; justify-content: center;
      padding: 20px;
    }
    .popup-container, .search-card, .filter-panel {
      background: white; border-radius: 36px; max-width: 440px;
      width: 100%; overflow: hidden; animation: popFade 0.25s ease;
    }
    @keyframes popFade { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    .popup-header { background: linear-gradient(135deg, #2b3b6e, #1f4a8e); padding: 20px; text-align: center; color: white; }
    .popup-header img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid white; cursor: pointer; }
    .popup-avatar-lg { width: 100px; height: 100px; border-radius: 50%; background: #cfddee; font-size: 56px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
    .popup-body { padding: 20px; color: #1e2a47; }
    .info-section { margin-bottom: 18px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; }
    .info-title { font-weight: 800; color: #1f4a8e; margin-bottom: 6px; }
    .popup-footer { padding: 10px 20px 20px; display: flex; flex-direction: column; gap: 10px; }
    .btn-wa { background: #25D366; color: white; border: none; padding: 12px; border-radius: 40px; font-weight: bold; cursor: pointer; }
    .btn-primary { background: #2c3e66; color: white; border: none; padding: 12px; border-radius: 40px; font-weight: bold; cursor: pointer; }
    .search-card, .filter-panel { padding: 24px; text-align: center; }
    .search-card input, .filter-panel input { width: 100%; padding: 12px; border-radius: 60px; border: 1px solid #ccc; margin: 10px 0; }
    .filter-row { margin: 12px 0; text-align: left; }
    .zoom-layer {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      z-index: 1200; align-items: center; justify-content: center; cursor: zoom-out;
    }
    .zoom-layer img { max-width: 92%; max-height: 90%; border-radius: 20px; }
    @media (max-width: 580px) { .person-card { width: 115px; } .avatar, .avatar-siluet { width: 70px; height: 70px; font-size: 42px; } }
  </style>
</head>
<body>

<div class="hero">
  <h1 id="mainTitle">🌳 Silsilah Keluarga</h1>
</div>
<div class="marquee">
  <div class="marquee-track">
    <span>⚠️ Foto ilustrasi AI (bukan asli) — jika ada kesalahan data, hubungi pengelola.</span>
    <span>⚠️ Foto ilustrasi AI (bukan asli) — jika ada kesalahan data, hubungi pengelola.</span>
  </div>
</div>

<div class="toolbar">
  <button class="btn-glass" id="backBtn" style="display:none;">⬅ Kembali</button>
  <button class="btn-glass" id="searchBtn">🔍 Cari Anggota</button>
  <button class="btn-glass" id="filterBtn">📌 Filter & Generasi</button>
</div>

<div id="treeContainer" class="tree"></div>

<!-- Modal Cari -->
<div id="searchModal" class="search-modal">
  <div class="search-card">
    <h3>Cari Nama</h3>
    <input type="text" id="searchInput" placeholder="Ketik nama...">
    <button id="searchSubmitBtn" style="background:#2c3e66; color:white; border:none; padding:10px 18px; border-radius:40px; margin-top:6px;">Cari</button>
    <button id="closeSearchBtn" style="background:#aaa; margin-top:8px;">Tutup</button>
  </div>
</div>

<!-- Modal Filter -->
<div id="filterModal" class="search-modal">
  <div class="filter-panel">
    <h3>🎛️ Filter Keluarga</h3>
    <div class="filter-row"><label><input type="checkbox" id="filterHidup"> Hidup saja</label></div>
    <div class="filter-row"><label><input type="checkbox" id="filterLaki"> Laki-laki</label></div>
    <div class="filter-row"><label><input type="checkbox" id="filterPerempuan"> Perempuan</label></div>
    <div class="filter-row"><input type="number" id="filterGenerasi" placeholder="Generasi (1-4)"></div>
    <button id="applyFilterBtn" style="background:#2c3e66; color:white; border:none; padding:8px; border-radius:40px; margin-top:10px;">Terapkan</button>
    <button id="resetFilterBtn" style="background:#777; margin-top:8px;">Reset & Tampilkan Semua</button>
    <button id="closeFilterBtn" style="background:#aaa; margin-top:8px;">Tutup</button>
  </div>
</div>

<!-- Popup Detail -->
<div id="globalPopup" class="popup-overlay">
  <div class="popup-container">
    <div class="popup-header" id="popupHeader"></div>
    <div class="popup-body" id="popupBody"></div>
    <div class="popup-footer">
      <button id="popupWaBtn" class="btn-wa">💬 WhatsApp</button>
      <button id="popupSilsilahBtn" class="btn-primary">📖 Lihat Silsilah Lengkap</button>
      <button id="closePopupBtn" style="background:#ccc; color:#222; padding:10px; border-radius:40px;">Tutup</button>
    </div>
  </div>
</div>

<div id="zoomLayer" class="zoom-layer"><img id="zoomImage" src=""></div>

<script>
  let globalFamily = [];
  const urlParams = new URLSearchParams(window.location.search);
  const detailId = urlParams.get('id');

  function shortName(fullname) {
    if (!fullname) return "?";
    let clean = fullname.replace(/\./g, '');
    let parts = clean.split(' ');
    const gelar = ['h','hj','dr','drs','ir','kh','ust','habib','r','s','m'];
    while(parts.length > 1 && gelar.includes(parts[0].toLowerCase())) parts.shift();
    return parts[0];
  }

  // ========== RENDER UTAMA ==========
  function renderMainTree() {
    const container = document.getElementById('treeContainer');
    container.innerHTML = '';
    if (!globalFamily.length) return;

    // Ambil semua generasi 1 laki-laki sebagai kepala keluarga
    let roots = globalFamily.filter(p => p.generasi === "1" && p.jenis_kelamin === "L");
    // urutkan berdasarkan tahun lahir
    roots.sort((a,b) => (parseInt(a.tanggal_lahir)||9999) - (parseInt(b.tanggal_lahir)||9999));
    
    for (let root of roots) {
      // cari pasangan dari root (split jika ada multiple)
      let spouseNames = [];
      if (root.pasangan) spouseNames = root.pasangan.split('|').map(s=>s.trim());
      let spouses = globalFamily.filter(s => spouseNames.includes(s.nama));
      
      if (spouses.length === 0) {
        createFamilyBlock(root, null, container);
      } else {
        for (let spouse of spouses) {
          createFamilyBlock(root, spouse, container);
        }
      }
    }
  }

  function createFamilyBlock(root, spouse, container) {
    const card = document.createElement('div');
    card.className = 'family-card';
    card.setAttribute('data-root', root.id);
    
    const coupleDiv = document.createElement('div');
    coupleDiv.className = 'couple-row';
    coupleDiv.appendChild(createPersonEl(root));
    if (spouse) {
      const love = document.createElement('span');
      love.className = 'love-badge';
      love.innerHTML = '❤️';
      coupleDiv.appendChild(love);
      coupleDiv.appendChild(createPersonEl(spouse));
    }
    card.appendChild(coupleDiv);
    
    // cari anak dari pasangan ini
    let children = [];
    if (spouse) {
      children = globalFamily.filter(c => 
        (c.ayah === root.nama && c.ibu === spouse.nama) || 
        (c.ibu === root.nama && c.ayah === spouse.nama)
      );
    } else {
      children = globalFamily.filter(c => c.ayah === root.nama || c.ibu === root.nama);
    }
    children.sort((a,b) => (parseInt(a.tanggal_lahir)||9999) - (parseInt(b.tanggal_lahir)||9999));
    if (children.length) {
      const grid = document.createElement('div');
      grid.className = 'children-grid';
      children.forEach(ch => grid.appendChild(createPersonEl(ch)));
      card.appendChild(grid);
    }
    container.appendChild(card);
  }

  // ========== DETAIL MODE (Bila ada ?id=xxx) ==========
  function renderDetailMode(personId) {
    const container = document.getElementById('treeContainer');
    container.innerHTML = '';
    const person = globalFamily.find(p => p.id === personId);
    if (!person) return;
    
    document.getElementById('mainTitle').innerHTML = `📌 Silsilah: ${shortName(person.nama)}`;
    document.getElementById('backBtn').style.display = 'inline-flex';
    
    const card = document.createElement('div');
    card.className = 'family-card';
    const coupleDiv = document.createElement('div');
    coupleDiv.className = 'couple-row';
    coupleDiv.appendChild(createPersonEl(person));
    
    // pasangan dari orang yg dilihat
    let spouseNames = [];
    if (person.pasangan) spouseNames = person.pasangan.split('|').map(s=>s.trim());
    let spouses = globalFamily.filter(s => spouseNames.includes(s.nama));
    if (spouses.length) {
      spouses.forEach(sp => {
        const loveSpan = document.createElement('span');
        loveSpan.className = 'love-badge';
        loveSpan.innerHTML = '❤️';
        coupleDiv.appendChild(loveSpan);
        coupleDiv.appendChild(createPersonEl(sp));
      });
    }
    card.appendChild(coupleDiv);
    
    // anak dari person ini
    let children = globalFamily.filter(c => c.ayah === person.nama || c.ibu === person.nama);
    children.sort((a,b) => (parseInt(a.tanggal_lahir)||9999) - (parseInt(b.tanggal_lahir)||9999));
    if (children.length) {
      const grid = document.createElement('div');
      grid.className = 'children-grid';
      children.forEach(ch => grid.appendChild(createPersonEl(ch)));
      card.appendChild(grid);
    }
    container.appendChild(card);
    
    // breadcrumb
    showBreadcrumb(person);
  }

  function showBreadcrumb(person) {
    // hapus breadcrumb lama
    const old = document.querySelector('.breadcrumb-area');
    if (old) old.remove();
    
    const breadDiv = document.createElement('div');
    breadDiv.className = 'breadcrumb-area';
    
    // garis ayah
    let ayahPath = [];
    let cur = person;
    while (cur) {
      ayahPath.unshift({ id: cur.id, nama: cur.nama });
      let ayahObj = globalFamily.find(p => p.nama === cur.ayah);
      if (!ayahObj) break;
      cur = ayahObj;
    }
    // garis ibu
    let ibuPath = [];
    let curIbu = person;
    let step = 0;
    while (curIbu && step < 10) {
      if (step === 0) ibuPath.unshift({ id: curIbu.id, nama: curIbu.nama });
      let ibuObj = globalFamily.find(p => p.nama === curIbu.ibu);
      if (!ibuObj) { if (step===0) ibuPath.unshift({ id:'0', nama:'?' }); break; }
      ibuPath.unshift({ id: ibuObj.id, nama: ibuObj.nama });
      let suamiIbu = globalFamily.find(p => p.pasangan && p.pasangan.includes(ibuObj.nama) && p.jenis_kelamin === 'L');
      curIbu = suamiIbu || ibuObj;
      step++;
    }
    
    breadDiv.innerHTML = `
      <div class="bread-line">👨 Garis Ayah: ${ayahPath.map(p => `<span data-id="${p.id}">${shortName(p.nama)}</span>`).join(' → ')}</div>
      <div class="bread-line">👩 Garis Ibu: ${ibuPath.map(p => `<span data-id="${p.id}">${shortName(p.nama)}</span>`).join(' → ')}</div>
    `;
    const hero = document.querySelector('.hero');
    hero.insertAdjacentElement('afterend', breadDiv);
    breadDiv.querySelectorAll('span').forEach(span => {
      span.addEventListener('click', (e) => {
        e.stopPropagation();
        let id = span.getAttribute('data-id');
        if (id && id !== '0') window.location.href = `?id=${id}`;
      });
    });
  }

  function createPersonEl(p) {
    const isDead = (p.status || '').toLowerCase().includes('meninggal');
    const card = document.createElement('div');
    card.className = `person-card ${isDead ? 'meninggal' : ''}`;
    card.setAttribute('data-id', p.id);
    
    let avatarHtml = '';
    if (p.foto && p.foto !== '') {
      avatarHtml = `<img class="avatar" src="${p.foto}" onclick="event.stopPropagation(); openZoom('${p.foto}')">`;
    } else {
      const genderClass = p.jenis_kelamin === 'L' ? 'l' : 'p';
      const icon = p.jenis_kelamin === 'L' ? '👨' : '👩';
      avatarHtml = `<div class="avatar-siluet ${genderClass}" onclick="event.stopPropagation(); openPopupById('${p.id}')">${icon}</div>`;
    }
    card.innerHTML = `${avatarHtml}<div class="person-name">${shortName(p.nama)}</div>`;
    card.querySelector('.person-name').onclick = (e) => { e.stopPropagation(); openPopupById(p.id); };
    return card;
  }

  // Popup & Zoom
  function openPopupById(id) {
    const p = globalFamily.find(x => x.id === id);
    if (!p) return;
    const headerDiv = document.getElementById('popupHeader');
    const bodyDiv = document.getElementById('popupBody');
    headerDiv.innerHTML = p.foto ? `<img src="${p.foto}" onclick="openZoom('${p.foto}')"><br><strong>${p.nama}</strong>` : `<div class="popup-avatar-lg">${p.jenis_kelamin==='L'?'👨':'👩'}</div><strong>${p.nama}</strong>`;
    bodyDiv.innerHTML = `
      <div class="info-section"><div class="info-title">🧬 Biodata</div>JK: ${p.jenis_kelamin||'-'}<br>Status: ${p.status||'-'}<br>Pekerjaan: ${p.pekerjaan||'-'}</div>
      <div class="info-section"><div class="info-title">👨‍👩‍👧 Keluarga</div>Ayah: ${p.ayah||'-'}<br>Ibu: ${p.ibu||'-'}<br>Pasangan: ${p.pasangan||'-'}<br>Anak: ${p.jumlah_anak||'-'}</div>
      <div class="info-section"><div class="info-title">📍 Lahir & Domisili</div>Tahun: ${p.tanggal_lahir||'-'} / ${p.alamat_lahir||'-'}<br>Domisili: ${p.domisili||'-'}</div>
      <div class="info-section"><div class="info-title">📞 Kontak</div>WA: ${p.wa||'-'}</div>
    `;
    document.getElementById('popupWaBtn').onclick = () => { if(p.wa) window.open(`https://wa.me/${p.wa.replace(/\D/g,'')}`); else alert('No WA tidak tersedia'); };
    document.getElementById('popupSilsilahBtn').onclick = () => { closePopup(); window.location.href = `?id=${p.id}`; };
    document.getElementById('globalPopup').style.display = 'flex';
  }
  function closePopup() { document.getElementById('globalPopup').style.display = 'none'; }
  function openZoom(src) { const z = document.getElementById('zoomLayer'); document.getElementById('zoomImage').src = src; z.style.display = 'flex'; }
  function closeZoom() { document.getElementById('zoomLayer').style.display = 'none'; }
  
  // Filter & Utils
  function applyFilters() {
    const hidup = document.getElementById('filterHidup').checked;
    const laki = document.getElementById('filterLaki').checked;
    const perempuan = document.getElementById('filterPerempuan').checked;
    const gen = document.getElementById('filterGenerasi').value;
    document.querySelectorAll('.person-card').forEach(card => {
      let id = card.getAttribute('data-id');
      let data = globalFamily.find(x => x.id === id);
      if (!data) return;
      let show = true;
      if (hidup && (data.status||'').toLowerCase().includes('meninggal')) show = false;
      if (laki && !perempuan && data.jenis_kelamin !== 'L') show = false;
      if (perempuan && !laki && data.jenis_kelamin !== 'P') show = false;
      if (gen && data.generasi !== gen) show = false;
      card.style.display = show ? 'block' : 'none';
    });
    document.querySelectorAll('.family-card').forEach(card => {
      let visible = card.querySelectorAll('.person-card[style="display: block"], .person-card:not([style*="display"])');
      card.style.display = visible.length ? 'block' : 'none';
    });
  }
  function resetFilters() {
    document.getElementById('filterHidup').checked = false;
    document.getElementById('filterLaki').checked = false;
    document.getElementById('filterPerempuan').checked = false;
    document.getElementById('filterGenerasi').value = '';
    document.querySelectorAll('.person-card').forEach(c => c.style.display = 'block');
    document.querySelectorAll('.family-card').forEach(c => c.style.display = 'block');
  }
  
  // Search
  function openSearch() { document.getElementById('searchModal').style.display = 'flex'; }
  function closeSearch() { document.getElementById('searchModal').style.display = 'none'; }
  function searchAndGo() {
    let kw = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!kw) { alert('Masukkan nama'); return; }
    let found = globalFamily.find(p => p.nama.toLowerCase().includes(kw));
    if (found) { closeSearch(); window.location.href = `?id=${found.id}`; }
    else alert('Tidak ditemukan');
  }
  
  // ========== INITIAL LOAD ==========
  fetch('data.json?v='+Date.now())
    .then(res => res.json())
    .then(data => {
      globalFamily = data;
      if (detailId) {
        renderDetailMode(detailId);
      } else {
        // Halaman awal: tampilkan semua silsilah generasi 1
        renderMainTree();
      }
      // pasang event untuk tombol
      document.getElementById('backBtn').onclick = () => window.location.href = '.';
      document.getElementById('searchBtn').onclick = openSearch;
      document.getElementById('filterBtn').onclick = () => document.getElementById('filterModal').style.display = 'flex';
      document.getElementById('closeSearchBtn').onclick = closeSearch;
      document.getElementById('searchSubmitBtn').onclick = searchAndGo;
      document.getElementById('searchInput').addEventListener('keypress', e => { if(e.key === 'Enter') searchAndGo(); });
      document.getElementById('applyFilterBtn').onclick = () => { applyFilters(); document.getElementById('filterModal').style.display = 'none'; };
      document.getElementById('resetFilterBtn').onclick = () => { resetFilters(); document.getElementById('filterModal').style.display = 'none'; };
      document.getElementById('closeFilterBtn').onclick = () => document.getElementById('filterModal').style.display = 'none';
      document.getElementById('closePopupBtn').onclick = closePopup;
      document.getElementById('zoomLayer').onclick = closeZoom;
    })
    .catch(e => console.error('Gagal load JSON:', e));
</script>
</body>
</html>
