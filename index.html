<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silsilah Keluarga</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin: 0;
}

/* TREE */
.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 15px;
}

/* BLOK KELUARGA */
.family-block {
  margin-bottom: 40px;
}

/* COUPLE */
.couple {
  display: flex;
  gap: 20px;
  justify-content: center;
  position: relative;
}

.couple::after {
  content: '';
  position: absolute;
  bottom: -30px;
  left: 50%;
  width: 2px;
  height: 30px;
  background: black;
  transform: translateX(-50%);
}

/* CHILDREN */
.children {
  margin-top: 40px;
  width: 100%;
  max-width: 700px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  position: relative;
}

.children::before {
  content: '';
  position: absolute;
  top: -15px;
  left: 10%;
  right: 10%;
  height: 2px;
  background: black;
}

/* CARD */
.person {
  border: 1px solid black;
  border-radius: 12px;
  padding: 15px;
  background: white;
  color: black;
  transition: 0.2s;
}

.person:hover {
  transform: scale(1.05);
}

/* MENINGGAL */
.person.meninggal {
  background: black;
  color: white;
}

.person.meninggal .name {
  color: white;
}

/* FOTO */
.person img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  cursor: pointer;
}

/* NAMA */
.name {
  margin-top: 8px;
  font-weight: bold;
  cursor: pointer;
}

.name.disabled {
  color: gray;
  cursor: default;
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.popup-content {
  background: white;
  width: 90%;
  max-width: 300px;
  margin: 80px auto;
  padding: 20px;
  border-radius: 10px;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .children {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<h2>Silsilah Keluarga Ngadiman</h2>

<div class="tree" id="tree"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3 id="nama"></h3>
    <p id="info"></p>
    <button id="btnDetail">Lihat Detail</button><br><br>
    <button onclick="closePopup()">Tutup</button>
  </div>
</div>

<script>
let globalData = [];

fetch('data.json?v=' + new Date().getTime())
.then(res => res.json())
.then(data => {
  globalData = data;
  init(data);
});

function init(data) {

  const tree = document.getElementById("tree");

  const root = data.find(p => p.nama === "Ngadiman");

  if (!root) {
    tree.innerHTML = "Data tidak ditemukan";
    return;
  }

  // ===== AMBIL SEMUA PASANGAN =====
  let pasanganList = [];

  if (Array.isArray(root.pasangan)) {
    pasanganList = data.filter(x =>
      root.pasangan.includes(x.nama)
    );
  } else if (root.pasangan && root.pasangan !== "-") {
    const p = data.find(x => x.nama === root.pasangan);
    if (p) pasanganList.push(p);
  }

  // ===== BUAT BLOK =====
  if (pasanganList.length === 0) {
    createFamilyBlock(tree, root, null, data);
  } else {
    pasanganList.forEach(psg => {
      createFamilyBlock(tree, root, psg, data);
    });
  }
}


// ===== BLOK KELUARGA =====
function createFamilyBlock(tree, root, pasangan, data) {

  const block = document.createElement("div");
  block.className = "family-block";

  // COUPLE
  const couple = document.createElement("div");
  couple.className = "couple";

  couple.appendChild(createPerson(root));

  if (pasangan) {
    couple.appendChild(createPerson(pasangan));
  }

  block.appendChild(couple);

  // ANAK PER PASANGAN
  const children = data.filter(x =>
    (x.ayah === root.nama && (!pasangan || x.ibu === pasangan.nama)) ||
    (x.ibu === root.nama && (!pasangan || x.ayah === pasangan.nama))
  );

  if (children.length > 0) {

    const childBox = document.createElement("div");
    childBox.className = "children";

    children.forEach(p => {
      childBox.appendChild(createPerson(p));
    });

    block.appendChild(childBox);
  }

  tree.appendChild(block);
}


// ===== CEK PUNYA ANAK =====
function punyaAnak(p) {
  return globalData.some(x =>
    x.ayah === p.nama || x.ibu === p.nama
  );
}


// ===== CARD =====
function createPerson(p) {

  const hasChild = punyaAnak(p);
  const isMeninggal = (p.status || "").toLowerCase().includes("meninggal");

  const div = document.createElement("div");
  div.className = isMeninggal ? "person meninggal" : "person";

  div.innerHTML = `
    <img src="${p.foto}" onclick="openPopup('${p.id}')">
    <div class="name ${!hasChild ? 'disabled' : ''}">
      ${p.nama}
    </div>
  `;

  if (hasChild) {
    div.querySelector('.name').onclick = () => goDetail(p.id);
  }

  return div;
}


// ===== POPUP =====
function openPopup(id) {

  const p = globalData.find(x => x.id === id);
  if (!p) return;

  const hasChild = punyaAnak(p);

  document.getElementById("popup").style.display = "block";
  document.getElementById("nama").innerText = p.nama;

  document.getElementById("info").innerHTML =
    `Lahir: ${p.tanggal_lahir}<br>
     Alamat: ${p.alamat_lahir}<br>
     Domisili: ${p.domisili}<br>
     Pasangan: ${Array.isArray(p.pasangan) ? p.pasangan.join(", ") : p.pasangan}<br>
     Anak: ${p.jumlah_anak}<br>
     Status: ${p.status}<br>
     WA: ${p.wa}<br>
     Pekerjaan: ${p.pekerjaan}`;

  const btn = document.getElementById("btnDetail");

  if (hasChild) {
    btn.style.display = "inline-block";
    btn.onclick = () => goDetail(p.id);
  } else {
    btn.style.display = "none";
  }
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}


// ===== NAVIGASI =====
function goDetail(id) {
  window.location.href = "detail.html?id=" + id;
}
</script>

</body>
</html>
