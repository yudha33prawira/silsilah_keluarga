<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silsilah Keluarga</title>

<style>
body { font-family: Arial; background:#f5f5f5; text-align:center; margin:0; }
h2 { margin:10px; }

.toolbar { display:flex; justify-content:center; gap:10px; margin:10px 0; }

.search-btn,.filter-btn {
  padding:10px 15px;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

.search-btn { background:linear-gradient(135deg,#6a11cb,#2575fc); }
.filter-btn { background:linear-gradient(135deg,#ff7e5f,#ff9966); }

/* FILTER */
.filter-panel {
  display:none;
  width:90%;
  max-width:600px;
  margin:10px auto;
  background:white;
  padding:15px;
  border-radius:10px;
}

.filter-container { display:flex; gap:10px; }
.filter-left,.filter-right { width:50%; }

.filter-left div {
  background:#eee;
  padding:8px;
  margin-bottom:5px;
  cursor:pointer;
  border-radius:6px;
}

.filter-right div {
  background:#2575fc;
  color:white;
  padding:8px;
  margin-bottom:5px;
  cursor:pointer;
  border-radius:6px;
}

.filter-item {
  border-bottom:1px solid #ddd;
  padding:5px;
  text-align:left;
}

/* TREE */
.tree { display:flex; flex-wrap:wrap; justify-content:center; gap:40px; }

.family-block { display:flex; flex-direction:column; align-items:center; }

.couple {
  display:flex;
  gap:40px;
  justify-content:center;
  position:relative;
}

.love-icon {
  position:absolute;
  top:40px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
}

.couple::after {
  content:'';
  position:absolute;
  bottom:-30px;
  left:50%;
  width:2px;
  height:30px;
  background:black;
  transform:translateX(-50%);
}

.children {
  margin-top:40px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.person {
  border:1px solid black;
  border-radius:12px;
  padding:10px;
  background:white;
}

.person.meninggal { background:black; color:white; }

.person img,
.siluet {
  width:80px;
  height:80px;
  border-radius:50%;
  cursor:pointer;
}

.siluet {
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

.siluet.l { background:#2193b0; color:white; }
.siluet.p { background:#ff758c; color:white; }

.name { font-weight:bold; margin-top:5px; cursor:pointer; }
.name.disabled { color:gray; }

.search-popup,.popup {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
}

.search-box,.popup-content {
  background:white;
  padding:20px;
  margin:100px auto;
  width:90%;
  max-width:300px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>Silsilah Keluarga</h2>

<div class="toolbar">
  <button onclick="openSearch()" class="search-btn">🔍 Cari</button>
  <button onclick="toggleFilter()" class="filter-btn">🎛 Filter</button>
</div>

<div class="filter-panel" id="filterPanel">
  <div class="filter-container">
    <div class="filter-left">
      <div onclick="setFilter('gender')">Gender</div>
      <div onclick="setFilter('generasi')">Generasi</div>
      <div onclick="setFilter('status')">Status</div>
    </div>
    <div class="filter-right" id="filterOptions"></div>
  </div>
  <div id="filterResult"></div>
</div>

<div class="tree" id="tree"></div>

<script>
let globalData=[];

/* LOAD + SORT GEN 1 */
fetch('data.json?v='+Date.now())
.then(r=>r.json())
.then(data=>{
  globalData=data;

  // SORT GEN 1 DARI TERTUA → TERMUDA
  let gen1 = data
    .filter(p=>p.generasi==="1" && p.jenis_kelamin==="L")
    .sort((a,b)=>(a.tanggal_lahir||0)-(b.tanggal_lahir||0));

  gen1.forEach(root=>{
    let pasangan=data.filter(x=>root.pasangan?.includes(x.nama));
    if(!pasangan.length) createFamilyBlock(root,null);
    else pasangan.forEach(p=>createFamilyBlock(root,p));
  });
});

/* FAMILY */
function createFamilyBlock(root,pasangan){
  const tree=document.getElementById("tree");

  const block=document.createElement("div");
  block.className="family-block";

  const couple=document.createElement("div");
  couple.className="couple";

  couple.appendChild(createPerson(root));

  if(pasangan){
    const love=document.createElement("div");
    love.className="love-icon";
    love.innerHTML="❤️";
    couple.appendChild(love);
    couple.appendChild(createPerson(pasangan));
  }

  block.appendChild(couple);

  let children=globalData.filter(x=>
    (x.ayah===root.nama && pasangan && x.ibu===pasangan.nama)
  );

  children.sort((a,b)=>(a.tanggal_lahir||0)-(b.tanggal_lahir||0));

  if(children.length){
    const box=document.createElement("div");
    box.className="children";
    children.forEach(c=>box.appendChild(createPerson(c)));
    block.appendChild(box);
  }

  tree.appendChild(block);
}

/* PERSON */
function createPerson(p){
  const div=document.createElement("div");
  div.className="person";

  div.innerHTML = p.foto
    ? `<img src="${p.foto}">`
    : `<div class="siluet ${p.jenis_kelamin==='L'?'l':'p'}">${p.jenis_kelamin==='L'?'👨':'👩'}</div>`;

  div.innerHTML += `<div class="name">${p.nama}</div>`;

  return div;
}
</script>

</body>
</html>
