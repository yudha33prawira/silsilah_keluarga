<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Silsilah Keluarga</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(-45deg, #1e2a5e, #2a3f7e, #1b4f8b, #0f2b4f);
      background-size: 400% 400%;
      animation: gradientFlow 15s ease infinite;
      min-height: 100vh;
    }
    
    body.lock { overflow: hidden; }
    
    @keyframes gradientFlow { 
      0% { background-position: 0% 50%; } 
      50% { background-position: 100% 50%; } 
      100% { background-position: 0% 50%; } 
    }
    
    .hero { text-align: center; padding: 12px 16px 4px; }
    h1 {
      font-size: 1.4rem; font-weight: 700;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(12px);
      display: inline-block; padding: 6px 18px; border-radius: 50px;
      color: white; border: 1px solid rgba(255,255,255,0.2);
    }
    
    .marquee {
      width: 100%; overflow: hidden;
      background: rgba(0,0,0,0.45); backdrop-filter: blur(8px);
      border-top: 1px solid rgba(255,255,255,0.2);
      border-bottom: 1px solid rgba(255,255,255,0.2);
      margin: 6px 0;
    }
    .marquee-track {
      display: flex; width: max-content;
      animation: scrollText 38s linear infinite;
    }
    .marquee-track span { white-space: nowrap; padding: 5px 30px; color: #fff9e0; font-size: 0.7rem; }
    @keyframes scrollText { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .marquee-track:hover { animation-play-state: paused; }
    
    .toolbar {
      display: flex; justify-content: center; gap: 10px; margin: 10px 0 15px; flex-wrap: wrap;
    }
    .btn-glass {
      background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
      border: none; padding: 6px 16px; border-radius: 40px;
      font-size: 0.8rem; font-weight: 600; color: white; cursor: pointer;
      transition: 0.2s;
    }
    .btn-glass:hover { background: rgba(255,255,255,0.3); transform: scale(1.02); }
    
    /* ===== TAMPILAN DEFAULT (FAMILY BLOCK) ===== */
    .tree-default {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding: 20px;
    }
    .family-block {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(4px);
      border-radius: 24px;
      padding: 20px 16px;
      width: 100%;
      max-width: 700px;
    }
    .couple-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      flex-wrap: wrap;
      position: relative;
    }
    .love-icon {
      font-size: 24px;
    }
    .children-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 15px;
      margin-top: 30px;
      justify-items: center;
      border-top: 2px dashed rgba(255,255,240,0.3);
      padding-top: 20px;
    }
    .person-card {
      background: rgba(255,255,255,0.92);
      border-radius: 20px;
      padding: 10px 8px;
      width: 110px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      border: 1px solid rgba(255,255,255,0.5);
    }
    .person-card.meninggal { background: #2c2e3a; color: #ccc; }
    .person-card:hover { transform: translateY(-4px); }
    
    .avatar-md {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 6px;
      display: block;
      border: 2px solid white;
    }
    .avatar-siluet-md {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      margin: 0 auto 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      background: #d9e2ec;
    }
    .avatar-siluet-md.l { background: #7aa2f7; color: white; }
    .avatar-siluet-md.p { background: #f29bc4; color: white; }
    .person-name {
      font-weight: 700;
      font-size: 0.85rem;
    }
    
    /* ===== TAMPILAN POHON HIERARKIS ===== */
    .tree-horizontal-scroll {
      width: 100%;
      overflow-x: auto;
      overflow-y: visible;
      position: relative;
      min-height: 85vh;
    }
    
    .tree-horizontal-scroll::-webkit-scrollbar {
      height: 12px;
    }
    .tree-horizontal-scroll::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
    }
    .tree-horizontal-scroll::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.5);
      border-radius: 10px;
    }
    
    .tree-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: max-content;
      padding: 20px 40px;
    }
    
    .family-tree {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 60px;
    }
    
    .family-separator {
      width: 80%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,200,0.5), transparent);
      margin: 20px auto;
    }
    
    .tree-branch {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    /* Container anak-anak */
    .children-container {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 35px;
      padding-top: 25px;
      position: relative;
    }
    
    /* Garis vertikal dari orang tua ke kumpulan anak */
    .children-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 25px;
      background: rgba(255,255,200,0.6);
    }
    
    .child-item {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    /* Garis vertikal ke setiap anak */
    .child-item::before {
      content: '';
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 25px;
      background: rgba(255,255,200,0.6);
    }
    
    /* 
      GARIS HORIZONTAL PENGHUBUNG ANTAR SAUDARA
      HANYA muncul jika jumlah anak GANJIL (1,3,5,7,...)
      Karena untuk anak genap, posisi tidak tepat di tengah
    */
    /* Jumlah anak 1 (ganjil) - TAMPIL */
    .children-container:has(> .child-item:only-child)::after {
      content: '';
      position: absolute;
      top: -13px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      display: none;
    }
    
    /* Jumlah anak 3,5,7 dst (ganjil > 1) - TAMPIL garis horizontal */
    .children-container:has(> .child-item:nth-child(3)):not(:has(> .child-item:nth-child(4)))::after,
    .children-container:has(> .child-item:nth-child(5)):not(:has(> .child-item:nth-child(6)))::after,
    .children-container:has(> .child-item:nth-child(7)):not(:has(> .child-item:nth-child(8)))::after,
    .children-container:has(> .child-item:nth-child(9)):not(:has(> .child-item:nth-child(10)))::after {
      content: '';
      position: absolute;
      top: -13px;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(255,255,200,0.5);
      z-index: 0;
    }
    
    /* Jumlah anak genap (2,4,6,8) - TIDAK tampil garis horizontal */
    
    .couple-group {
      display: flex;
      gap: 8px;
      align-items: center;
      background: rgba(0,0,0,0.25);
      border-radius: 30px;
      padding: 6px 15px;
    }
    
    .love-icon-sm { font-size: 12px; color: #ff99cc; }
    
    .avatar-sm {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 4px;
      display: block;
      border: 2px solid white;
    }
    .avatar-siluet-sm {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      margin: 0 auto 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      background: #d9e2ec;
    }
    .avatar-siluet-sm.l { background: #7aa2f7; color: white; }
    .avatar-siluet-sm.p { background: #f29bc4; color: white; }
    .person-name-sm {
      font-weight: 700;
      font-size: 0.65rem;
    }
    
    /* BREADCRUMB */
    .breadcrumb-area {
      background: rgba(0,0,0,0.5); backdrop-filter: blur(12px);
      border-radius: 24px; padding: 8px 20px;
      margin: 10px auto;
      width: fit-content;
      max-width: 95%;
      color: white;
    }
    .bread-line {
      font-size: 0.75rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin: 5px 0;
    }
    .bread-line strong { margin-right: 6px; color: #ffd966; }
    .bread-line span {
      cursor: pointer;
      color: #ffea9e;
      background: rgba(0,0,0,0.3);
      padding: 3px 10px;
      border-radius: 20px;
      transition: 0.2s;
    }
    .bread-line span:hover {
      background: rgba(0,0,0,0.5);
      transform: scale(1.02);
    }
    .bread-arrow {
      color: rgba(255,255,200,0.5);
      margin: 0 2px;
    }
    
    /* MODAL & POPUP */
    .popup-overlay, .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(5px);
      z-index: 1000; align-items: center; justify-content: center;
      padding: 20px;
    }
    .popup-container {
      background: white; border-radius: 28px; max-width: 380px;
      width: 100%; max-height: 80vh; overflow-y: auto;
    }
    .popup-header { background: linear-gradient(135deg, #2b3b6e, #1f4a8e); padding: 16px; text-align: center; color: white; border-radius: 28px 28px 0 0; }
    .popup-header img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid white; cursor: pointer; }
    .popup-body { padding: 16px; color: #1e2a47; font-size: 0.85rem; }
    .info-section { margin-bottom: 12px; border-bottom: 1px solid #e2e8f0; padding-bottom: 8px; }
    .info-title { font-weight: 800; color: #1f4a8e; margin-bottom: 4px; }
    .popup-footer { padding: 8px 16px 16px; display: flex; flex-direction: column; gap: 8px; }
    .btn-wa, .btn-primary, .btn-close-popup {
      padding: 8px; border-radius: 40px; font-weight: 600; font-size: 0.8rem;
      cursor: pointer; border: none;
    }
    .btn-wa { background: #25D366; color: white; }
    .btn-primary { background: #2c3e66; color: white; }
    .btn-close-popup { background: #e2e8f0; color: #4a5568; }
    
    .modal-card {
      background: white; border-radius: 28px; padding: 20px;
      width: 90%; max-width: 320px; text-align: center;
    }
    .modal-card input { width: 100%; padding: 10px; border-radius: 40px; border: 1px solid #ccc; margin: 10px 0; }
    .btn-search, .btn-apply { background: #2c3e66; color: white; width: 100%; padding: 8px; border-radius: 40px; margin: 4px 0; }
    .btn-close { background: #e2e8f0; color: #333; width: 100%; padding: 8px; border-radius: 40px; margin-top: 6px; }
    .btn-reset { background: #f59e0b; color: white; width: 100%; padding: 8px; border-radius: 40px; margin-top: 6px; }
    .filter-group { text-align: left; margin: 12px 0; }
    .filter-group label { display: flex; align-items: center; gap: 8px; margin: 8px 0; font-size: 0.85rem; }
    
    .zoom-layer {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      z-index: 1200; align-items: center; justify-content: center; cursor: zoom-out;
    }
    .zoom-layer img { max-width: 90%; max-height: 90%; border-radius: 16px; }
    
    .filter-info {
      text-align: center; margin: 5px auto 10px;
      color: #ffd966; font-size: 0.7rem;
      background: rgba(0,0,0,0.3); display: inline-block;
      padding: 2px 12px; border-radius: 20px;
    }
    .filter-container { text-align: center; }
  </style>
</head>
<body>

<div class="hero">
  <h1 id="mainTitle">🌳 Silsilah Keluarga</h1>
</div>
<div class="marquee">
  <div class="marquee-track">
    <span>⚠️ Foto ilustrasi AI (bukan asli) — jika ada kesalahan data, hubungi pengelola.</span>
    <span>⚠️ Foto ilustrasi AI (bukan asli) — jika ada kesalahan data, hubungi pengelola.</span>
  </div>
</div>

<div class="toolbar">
  <button class="btn-glass" id="backBtn" style="display:none;">⬅ Kembali</button>
  <button class="btn-glass" id="toggleTreeBtn">🌳 Tampilan Pohon</button>
  <button class="btn-glass" id="searchBtn">🔍 Cari</button>
  <button class="btn-glass" id="filterBtn">📌 Filter</button>
</div>

<div class="filter-container" id="filterInfoContainer"></div>

<div id="mainContainer"></div>

<!-- MODAL SEARCH -->
<div id="searchModal" class="modal-overlay">
  <div class="modal-card">
    <h3 style="font-size:1.2rem;">🔍 Cari Anggota</h3>
    <input type="text" id="searchInput" placeholder="Ketik nama...">
    <button id="searchSubmitBtn" class="btn-search">Cari</button>
    <button id="closeSearchBtn" class="btn-close">Tutup</button>
  </div>
</div>

<!-- MODAL FILTER -->
<div id="filterModal" class="modal-overlay">
  <div class="modal-card">
    <h3 style="font-size:1.2rem;">🎛️ Filter</h3>
    <div class="filter-group">
      <label><input type="checkbox" id="filterHidup"> ✅ Hanya yang hidup</label>
      <label><input type="checkbox" id="filterLaki"> 👨 Laki-laki</label>
      <label><input type="checkbox" id="filterPerempuan"> 👩 Perempuan</label>
      <label>📊 Generasi: <input type="number" id="filterGenerasi" placeholder="1-4" style="width:100%; margin-top:5px;"></label>
    </div>
    <button id="applyFilterBtn" class="btn-apply">Terapkan</button>
    <button id="resetFilterBtn" class="btn-reset">Reset</button>
    <button id="closeFilterBtn" class="btn-close">Tutup</button>
  </div>
</div>

<!-- POPUP DETAIL -->
<div id="globalPopup" class="popup-overlay">
  <div class="popup-container">
    <div class="popup-header" id="popupHeader"></div>
    <div class="popup-body" id="popupBody"></div>
    <div class="popup-footer">
      <button id="popupWaBtn" class="btn-wa">💬 WhatsApp</button>
      <button id="popupSilsilahBtn" class="btn-primary">📖 Lihat Silsilah</button>
      <button id="closePopupBtn" class="btn-close-popup">Tutup</button>
    </div>
  </div>
</div>

<div id="zoomLayer" class="zoom-layer" onclick="closeZoom()">
  <img id="zoomImage" src="" onclick="event.stopPropagation()">
</div>

<script>
  let globalFamily = [];
  let isTreeMode = false;
  let currentFilterActive = false;
  
  const urlParams = new URLSearchParams(window.location.search);
  const detailId = urlParams.get('id');

  function shortName(fullname) {
    if (!fullname) return "?";
    let clean = fullname.replace(/\./g, '');
    let parts = clean.split(' ');
    const gelar = ['h','hj','dr','drs','ir','kh','ust','habib','r','s','m'];
    while(parts.length > 1 && gelar.includes(parts[0].toLowerCase())) parts.shift();
    return parts[0];
  }

  // ========== TAMPILAN DEFAULT ==========
  function renderDefaultView() {
    const container = document.getElementById('mainContainer');
    container.innerHTML = '';
    container.className = 'tree-default';
    
    const roots = globalFamily.filter(p => p.generasi === "1" && p.jenis_kelamin === "L");
    roots.sort((a,b) => (parseInt(a.tanggal_lahir)||9999) - (parseInt(b.tanggal_lahir)||9999));
    
    roots.forEach(root => {
      const spouseNames = root.pasangan ? root.pasangan.split('|').map(s=>s.trim()) : [];
      const spouses = globalFamily.filter(s => spouseNames.includes(s.nama));
      
      if (spouses.length === 0) {
        createFamilyBlockDefault(root, null, container);
      } else {
        spouses.forEach(spouse => createFamilyBlockDefault(root, spouse, container));
      }
    });
    
    document.getElementById('mainTitle').innerHTML = '🌳 Silsilah Keluarga';
    document.getElementById('backBtn').style.display = 'none';
    document.getElementById('toggleTreeBtn').innerHTML = '🌳 Tampilan Pohon';
    isTreeMode = false;
    currentFilterActive = false;
    hideFilterInfo();
  }
  
  function createFamilyBlockDefault(root, spouse, container) {
    const block = document.createElement('div');
    block.className = 'family-block';
    
    const coupleDiv = document.createElement('div');
    coupleDiv.className = 'couple-row';
    coupleDiv.appendChild(createPersonCardDefault(root));
    
    if (spouse) {
      const love = document.createElement('span');
      love.className = 'love-icon';
      love.innerHTML = '❤️';
      coupleDiv.appendChild(love);
      coupleDiv.appendChild(createPersonCardDefault(spouse));
    }
    block.appendChild(coupleDiv);
    
    let children = [];
    if (spouse) {
      children = globalFamily.filter(c => 
        (c.ayah === root.nama && c.ibu === spouse.nama) || 
        (c.ibu === root.nama && c.ayah === spouse.nama)
      );
    } else {
      children = globalFamily.filter(c => c.ayah === root.nama || c.ibu === root.nama);
    }
    children.sort((a,b) => (parseInt(a.tanggal_lahir)||9999) - (parseInt(b.tanggal_lahir)||9999));
    
    if (children.length) {
      const grid = document.createElement('div');
      grid.className = 'children-grid';
      children.forEach(ch => grid.appendChild(createPersonCardDefault(ch)));
      block.appendChild(grid);
    }
    container.appendChild(block);
  }
  
  function createPersonCardDefault(person) {
    const isDead = (person.status || '').toLowerCase().includes('meninggal');
    const card = document.createElement('div');
    card.className = `person-card ${isDead ? 'meninggal' : ''}`;
    card.setAttribute('data-id', person.id);
    
    let avatarHtml = '';
    if (person.foto && person.foto !== '') {
      avatarHtml = `<img class="avatar-md" src="${person.foto}" onclick="event.stopPropagation(); openPopupById('${person.id}')">`;
    } else {
      const genderClass = person.jenis_kelamin === 'L' ? 'l' : 'p';
      const icon = person.jenis_kelamin === 'L' ? '👨' : '👩';
      avatarHtml = `<div class="avatar-siluet-md ${genderClass}" onclick="event.stopPropagation(); openPopupById('${person.id}')">${icon}</div>`;
    }
    card.innerHTML = `${avatarHtml}<div class="person-name">${shortName(person.nama)}</div>`;
    card.querySelector('.person-name').onclick = (e) => { e.stopPropagation(); openPopupById(person.id); };
    return card;
  }
  
  // ========== TAMPILAN POHON ==========
  function buildHierarchyTree(rootPerson) {
    const node = {
      person: rootPerson,
      spouses: [],
      children: []
    };
    
    let spouseNames = rootPerson.pasangan ? rootPerson.pasangan.split('|').map(s=>s.trim()) : [];
    let spouses = globalFamily.filter(s => spouseNames.includes(s.nama));
    node.spouses = spouses;
    
    let allChildren = [];
    if (spouses.length > 0) {
      spouses.forEach(spouse => {
        let children = globalFamily.filter(c => 
          (c.ayah === rootPerson.nama && c.ibu === spouse.nama) ||
          (c.ibu === rootPerson.nama && c.ayah === spouse.nama)
        );
        allChildren.push(...children);
      });
    } else {
      let children = globalFamily.filter(c => c.ayah === rootPerson.nama || c.ibu === rootPerson.nama);
      allChildren.push(...children);
    }
    
    allChildren = allChildren.filter((child, index, self) => 
      index === self.findIndex(c => c.id === child.id)
    );
    allChildren.sort((a,b) => (parseInt(a.tanggal_lahir)||9999) - (parseInt(b.tanggal_lahir)||9999));
    
    node.children = allChildren.map(child => buildHierarchyTree(child));
    return node;
  }
  
  function renderHierarchyTree(node) {
    if (!node) return null;
    const container = document.createElement('div');
    container.className = 'tree-branch';
    
    const personWrapper = document.createElement('div');
    personWrapper.className = 'couple-group';
    personWrapper.appendChild(createPersonCardTree(node.person));
    
    if (node.spouses && node.spouses.length > 0) {
      node.spouses.forEach(spouse => {
        const loveSpan = document.createElement('span');
        loveSpan.className = 'love-icon-sm';
        loveSpan.innerHTML = '❤️';
        personWrapper.appendChild(loveSpan);
        personWrapper.appendChild(createPersonCardTree(spouse));
      });
    }
    container.appendChild(personWrapper);
    
    if (node.children && node.children.length > 0) {
      const childrenContainer = document.createElement('div');
      childrenContainer.className = 'children-container';
      
      node.children.forEach(childNode => {
        const childItem = document.createElement('div');
        childItem.className = 'child-item';
        childItem.appendChild(renderHierarchyTree(childNode));
        childrenContainer.appendChild(childItem);
      });
      container.appendChild(childrenContainer);
    }
    return container;
  }
  
  function createPersonCardTree(person) {
    const isDead = (person.status || '').toLowerCase().includes('meninggal');
    const card = document.createElement('div');
    card.className = `person-card ${isDead ? 'meninggal' : ''}`;
    card.setAttribute('data-id', person.id);
    card.style.width = '75px';
    card.style.padding = '5px 4px';
    
    let avatarHtml = '';
    if (person.foto && person.foto !== '') {
      avatarHtml = `<img class="avatar-sm" src="${person.foto}" onclick="event.stopPropagation(); openPopupById('${person.id}')">`;
    } else {
      const genderClass = person.jenis_kelamin === 'L' ? 'l' : 'p';
      const icon = person.jenis_kelamin === 'L' ? '👨' : '👩';
      avatarHtml = `<div class="avatar-siluet-sm ${genderClass}" onclick="event.stopPropagation(); openPopupById('${person.id}')">${icon}</div>`;
    }
    card.innerHTML = `${avatarHtml}<div class="person-name-sm">${shortName(person.nama)}</div>`;
    card.querySelector('.person-name-sm').onclick = (e) => { e.stopPropagation(); openPopupById(person.id); };
    return card;
  }
  
  function renderTreeView() {
    const container = document.getElementById('mainContainer');
    container.innerHTML = '';
    container.className = '';
    
    const scrollWrapper = document.createElement('div');
    scrollWrapper.className = 'tree-horizontal-scroll';
    
    const treeContainer = document.createElement('div');
    treeContainer.className = 'tree-container';
    
    const roots = globalFamily.filter(p => p.generasi === "1" && p.jenis_kelamin === "L");
    roots.sort((a,b) => (parseInt(a.tanggal_lahir)||9999) - (parseInt(b.tanggal_lahir)||9999));
    
    roots.forEach((root, index) => {
      const familyDiv = document.createElement('div');
      familyDiv.className = 'family-tree';
      const hierarchyNode = buildHierarchyTree(root);
      const rootBranch = renderHierarchyTree(hierarchyNode);
      if (rootBranch) familyDiv.appendChild(rootBranch);
      treeContainer.appendChild(familyDiv);
      if (index < roots.length - 1) {
        const separator = document.createElement('div');
        separator.className = 'family-separator';
        treeContainer.appendChild(separator);
      }
    });
    
    scrollWrapper.appendChild(treeContainer);
    container.appendChild(scrollWrapper);
    
    document.getElementById('mainTitle').innerHTML = '🌳 Pohon Keluarga (Hierarkis)';
    document.getElementById('backBtn').style.display = 'none';
    document.getElementById('toggleTreeBtn').innerHTML = '🏠 Tampilan Default';
    isTreeMode = true;
    currentFilterActive = false;
    hideFilterInfo();
  }
  
  function toggleTreeView() {
    if (isTreeMode) {
      renderDefaultView();
    } else {
      renderTreeView();
    }
  }
  
  // ========== DETAIL MODE ==========
  function renderDetailMode(personId) {
    const container = document.getElementById('mainContainer');
    container.innerHTML = '';
    container.className = 'tree-default';
    
    const person = globalFamily.find(p => p.id === personId);
    if (!person) return;
    
    document.getElementById('mainTitle').innerHTML = `📌 Silsilah: ${shortName(person.nama)}`;
    document.getElementById('backBtn').style.display = 'inline-flex';
    document.getElementById('toggleTreeBtn').style.display = 'inline-flex';
    isTreeMode = false;
    hideFilterInfo();
    
    const block = document.createElement('div');
    block.className = 'family-block';
    
    const coupleDiv = document.createElement('div');
    coupleDiv.className = 'couple-row';
    coupleDiv.appendChild(createPersonCardDefault(person));
    
    let spouseNames = person.pasangan ? person.pasangan.split('|').map(s=>s.trim()) : [];
    let spouses = globalFamily.filter(s => spouseNames.includes(s.nama));
    if (spouses.length) {
      spouses.forEach(sp => {
        const loveSpan = document.createElement('span');
        loveSpan.innerHTML = '❤️';
        loveSpan.style.fontSize = '24px';
        coupleDiv.appendChild(loveSpan);
        coupleDiv.appendChild(createPersonCardDefault(sp));
      });
    }
    block.appendChild(coupleDiv);
    
    let children = globalFamily.filter(c => c.ayah === person.nama || c.ibu === person.nama);
    children.sort((a,b) => (parseInt(a.tanggal_lahir)||9999) - (parseInt(b.tanggal_lahir)||9999));
    if (children.length) {
      const grid = document.createElement('div');
      grid.className = 'children-grid';
      children.forEach(ch => grid.appendChild(createPersonCardDefault(ch)));
      block.appendChild(grid);
    }
    container.appendChild(block);
    showBreadcrumbCorrect(person);
  }
  
  // BREADCRUMB dari TUA ke MUDA
  function showBreadcrumbCorrect(person) {
    const old = document.querySelector('.breadcrumb-area');
    if (old) old.remove();
    
    const breadDiv = document.createElement('div');
    breadDiv.className = 'breadcrumb-area';
    
    // Garis Ayah
    let ayahList = [];
    let current = person;
    while (current) {
      ayahList.unshift({ id: current.id, nama: current.nama });
      let ayahObj = globalFamily.find(p => p.nama === current.ayah);
      if (!ayahObj) break;
      current = ayahObj;
    }
    
    // Garis Ibu
    let ibuStack = [];
    let cur = person;
    ibuStack.push({ id: cur.id, nama: cur.nama });
    
    if (cur.ibu) {
      let ibuObj = globalFamily.find(p => p.nama === cur.ibu);
      if (ibuObj) {
        ibuStack.push({ id: ibuObj.id, nama: ibuObj.nama });
        cur = ibuObj;
      }
    }
    
    while (cur) {
      let ayahObj = globalFamily.find(p => p.nama === cur.ayah);
      if (!ayahObj) break;
      ibuStack.push({ id: ayahObj.id, nama: ayahObj.nama });
      cur = ayahObj;
    }
    
    let ibuList = ibuStack.reverse();
    
    const ayahHtml = ayahList.map((p, idx) => {
      if (idx === ayahList.length - 1) {
        return `<span data-id="${p.id}">${shortName(p.nama)}</span>`;
      }
      return `<span data-id="${p.id}">${shortName(p.nama)}</span><span class="bread-arrow"> → </span>`;
    }).join('');
    
    const ibuHtml = ibuList.map((p, idx) => {
      if (idx === ibuList.length - 1) {
        return `<span data-id="${p.id}">${shortName(p.nama)}</span>`;
      }
      return `<span data-id="${p.id}">${shortName(p.nama)}</span><span class="bread-arrow"> → </span>`;
    }).join('');
    
    breadDiv.innerHTML = `
      <div class="bread-line"><strong>👨 Garis Ayah:</strong> ${ayahHtml}</div>
      <div class="bread-line"><strong>👩 Garis Ibu:</strong> ${ibuHtml}</div>
    `;
    
    const hero = document.querySelector('.hero');
    hero.insertAdjacentElement('afterend', breadDiv);
    
    breadDiv.querySelectorAll('span[data-id]').forEach(span => {
      span.onclick = () => {
        let id = span.getAttribute('data-id');
        if (id && id !== '0') window.location.href = `?id=${id}`;
      };
    });
  }
  
  // ========== FILTER ==========
  function applyFilterAndRender() {
    const generasi = document.getElementById('filterGenerasi').value;
    const hidup = document.getElementById('filterHidup').checked;
    const laki = document.getElementById('filterLaki').checked;
    const perempuan = document.getElementById('filterPerempuan').checked;
    
    let filtered = [...globalFamily];
    if (generasi) filtered = filtered.filter(p => p.generasi === generasi);
    if (hidup) filtered = filtered.filter(p => !(p.status || '').toLowerCase().includes('meninggal'));
    if (laki && !perempuan) filtered = filtered.filter(p => p.jenis_kelamin === 'L');
    if (perempuan && !laki) filtered = filtered.filter(p => p.jenis_kelamin === 'P');
    
    const container = document.getElementById('mainContainer');
    container.innerHTML = '';
    container.className = 'tree-default';
    
    if (filtered.length === 0) {
      container.innerHTML = `<div style="text-align:center; color:white; padding:40px;">Tidak ada anggota yang sesuai filter</div>`;
    } else {
      const grid = document.createElement('div');
      grid.style.display = 'grid';
      grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(120px, 1fr))';
      grid.style.gap = '20px';
      grid.style.justifyItems = 'center';
      grid.style.maxWidth = '1000px';
      grid.style.margin = '0 auto';
      grid.style.padding = '20px';
      filtered.forEach(p => grid.appendChild(createPersonCardDefault(p)));
      container.appendChild(grid);
    }
    
    let filterText = [];
    if (generasi) filterText.push(`Gen ${generasi}`);
    if (hidup) filterText.push('Hidup');
    if (laki && !perempuan) filterText.push('Laki');
    if (perempuan && !laki) filterText.push('Perempuan');
    document.getElementById('mainTitle').innerHTML = `📋 Filter: ${filterText.join(', ')} (${filtered.length})`;
    document.getElementById('backBtn').style.display = 'inline-flex';
    document.getElementById('toggleTreeBtn').style.display = 'inline-flex';
    isTreeMode = false;
    currentFilterActive = true;
    showFilterInfo(`${filtered.length} anggota ditemukan`);
  }
  
  function resetFilters() {
    document.getElementById('filterHidup').checked = false;
    document.getElementById('filterLaki').checked = false;
    document.getElementById('filterPerempuan').checked = false;
    document.getElementById('filterGenerasi').value = '';
    renderDefaultView();
  }
  
  function goBack() {
    if (detailId) {
      window.location.href = '.';
    } else {
      renderDefaultView();
    }
  }
  
  function showFilterInfo(text) {
    document.getElementById('filterInfoContainer').innerHTML = `<div class="filter-info">🔍 ${text}</div>`;
  }
  function hideFilterInfo() { document.getElementById('filterInfoContainer').innerHTML = ''; }
  
  // Popup & Zoom
  function openPopupById(id) {
    const p = globalFamily.find(x => x.id === id);
    if (!p) return;
    document.body.classList.add('lock');
    const headerDiv = document.getElementById('popupHeader');
    const bodyDiv = document.getElementById('popupBody');
    headerDiv.innerHTML = p.foto ? `<img src="${p.foto}" onclick="openZoom('${p.foto}')"><br><strong>${p.nama}</strong>` : `<div style="width:70px;height:70px;border-radius:50%;background:#cfddee;font-size:40px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;">${p.jenis_kelamin==='L'?'👨':'👩'}</div><strong>${p.nama}</strong>`;
    bodyDiv.innerHTML = `<div class="info-section"><div class="info-title">🧬 Biodata</div><p>JK: ${p.jenis_kelamin||'-'}<br>Status: ${p.status||'-'}<br>Pekerjaan: ${p.pekerjaan||'-'}</p></div>
      <div class="info-section"><div class="info-title">👨‍👩‍👧 Keluarga</div><p>Ayah: ${p.ayah||'-'}<br>Ibu: ${p.ibu||'-'}<br>Pasangan: ${p.pasangan||'-'}<br>Anak: ${p.jumlah_anak||'-'}</p></div>
      <div class="info-section"><div class="info-title">📍 Lokasi</div><p>Lahir: ${p.tanggal_lahir||'-'} ${p.alamat_lahir||'-'}<br>Domisili: ${p.domisili||'-'}</p></div>
      <div class="info-section"><div class="info-title">📞 Kontak</div><p>WA: ${p.wa||'-'}</p></div>`;
    document.getElementById('popupWaBtn').onclick = () => { if(p.wa) window.open(`https://wa.me/${p.wa.replace(/\D/g,'')}`); else alert('No WA tersedia'); };
    document.getElementById('popupSilsilahBtn').onclick = () => { closePopup(); window.location.href = `?id=${p.id}`; };
    document.getElementById('globalPopup').style.display = 'flex';
  }
  function closePopup() { document.getElementById('globalPopup').style.display = 'none'; document.body.classList.remove('lock'); }
  function openZoom(src) { document.getElementById('zoomImage').src = src; document.getElementById('zoomLayer').style.display = 'flex'; document.body.classList.add('lock'); }
  function closeZoom() { document.getElementById('zoomLayer').style.display = 'none'; document.body.classList.remove('lock'); }
  
  // Search & Modal
  function openSearchModal() { document.getElementById('searchModal').style.display = 'flex'; document.body.classList.add('lock'); }
  function closeSearchModal() { document.getElementById('searchModal').style.display = 'none'; document.body.classList.remove('lock'); }
  function openFilterModal() { document.getElementById('filterModal').style.display = 'flex'; document.body.classList.add('lock'); }
  function closeFilterModal() { document.getElementById('filterModal').style.display = 'none'; document.body.classList.remove('lock'); }
  function searchAndGo() {
    let kw = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!kw) { alert('Masukkan nama'); return; }
    let found = globalFamily.find(p => p.nama.toLowerCase().includes(kw));
    if (found) { closeSearchModal(); window.location.href = `?id=${found.id}`; }
    else alert('Nama tidak ditemukan');
  }
  
  // Event klik luar modal
  document.getElementById('searchModal').addEventListener('click', e => { if(e.target === e.currentTarget) closeSearchModal(); });
  document.getElementById('filterModal').addEventListener('click', e => { if(e.target === e.currentTarget) closeFilterModal(); });
  document.getElementById('globalPopup').addEventListener('click', e => { if(e.target === e.currentTarget) closePopup(); });
  
  // ========== INIT ==========
  fetch('data.json?v='+Date.now())
    .then(res => res.json())
    .then(data => {
      globalFamily = data;
      if (detailId) renderDetailMode(detailId);
      else renderDefaultView();
      
      document.getElementById('backBtn').onclick = goBack;
      document.getElementById('toggleTreeBtn').onclick = toggleTreeView;
      document.getElementById('searchBtn').onclick = openSearchModal;
      document.getElementById('filterBtn').onclick = openFilterModal;
      document.getElementById('closeSearchBtn').onclick = closeSearchModal;
      document.getElementById('closeFilterBtn').onclick = closeFilterModal;
      document.getElementById('searchSubmitBtn').onclick = searchAndGo;
      document.getElementById('searchInput').addEventListener('keypress', e => { if(e.key === 'Enter') searchAndGo(); });
      document.getElementById('applyFilterBtn').onclick = () => { applyFilterAndRender(); closeFilterModal(); };
      document.getElementById('resetFilterBtn').onclick = () => { resetFilters(); closeFilterModal(); };
      document.getElementById('closePopupBtn').onclick = closePopup;
    });
</script>
</body>
</html>
