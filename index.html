<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Silsilah Keluarga</title>

<style>
body {
  font-family: Arial;
  text-align: center;
}

/* TREE */
.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.row {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.v-line {
  width: 2px;
  height: 30px;
  background: black;
}

/* CHILDREN */
.children {
  position: relative;
  margin-top: 10px;
}

/* GRID ANAK */
.row.children {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  justify-items: center;
  max-width: 300px;
}

/* MOBILE */
@media (max-width: 480px) {
  .row.children {
    grid-template-columns: 1fr;
    max-width: 200px;
  }
}

/* GARIS */
.children::before {
  content: '';
  position: absolute;
  top: -10px;
  left: 20%;
  right: 20%;
  height: 2px;
  background: black;
}

/* CARD */
.person {
  border: 1px solid black;
  padding: 10px;
  border-radius: 10px;
  margin: 5px;
  background: white;
  cursor: pointer;
  min-width: 120px;
  text-align: center;
  transition: 0.2s;
}

.person:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.person img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.popup-content {
  background: white;
  width: 260px;
  margin: 100px auto;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>Silsilah Keluarga Ngadiman</h2>

<div class="tree" id="tree"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3 id="nama"></h3>
    <p id="info"></p>

    <button id="btnDetail">Lihat Detail</button><br><br>
    <button onclick="closePopup()">Tutup</button>
  </div>
</div>

<script>
let globalData = [];

// LOAD DATA
fetch('data.json?v=' + new Date().getTime())
.then(res => res.json())
.then(data => {
  globalData = data;
  init(data);
});

function init(data) {

  const tree = document.getElementById("tree");

  // ROOT
  const ayah = data.find(p => p.nama === "Ngadiman");
  const ibu = data.find(p => p.nama === "Titik");

  if (!ayah || !ibu) {
    tree.innerHTML = "Data orang tua tidak ditemukan";
    return;
  }

  const row1 = document.createElement("div");
  row1.className = "row";

  row1.appendChild(createPerson(ayah));
  row1.appendChild(createPerson(ibu));

  tree.appendChild(row1);

  // GARIS
  const vline = document.createElement("div");
  vline.className = "v-line";
  tree.appendChild(vline);

  // ANAK
  const gen2 = data.filter(x =>
    x.ayah === ayah.nama && x.ibu === ibu.nama
  );

  const row2 = document.createElement("div");
  row2.className = "row children";

  gen2.forEach(p => {
    row2.appendChild(createPerson(p));
  });

  tree.appendChild(row2);
}

// CARD
function createPerson(p) {

  const div = document.createElement("div");
  div.className = "person";

  div.innerHTML = `
    <img src="${p.foto}">
    <div>${p.nama}</div>
  `;

  div.onclick = () => {
    showDetail(p);
  };

  return div;
}

// FORMAT DETAIL
function formatDetail(p) {
  return `Lahir: ${p.tanggal_lahir}
Alamat: ${p.alamat_lahir}
Domisili: ${p.domisili}
Pasangan: ${p.pasangan}
Anak: ${p.jumlah_anak}
Status: ${p.status}
WA: ${p.wa}
Pekerjaan: ${p.pekerjaan}`;
}

// POPUP
function showDetail(p) {
  document.getElementById("popup").style.display = "block";
  document.getElementById("nama").innerText = p.nama;
  document.getElementById("info").innerHTML = formatDetail(p).replace(/\n/g, "<br>");

  document.getElementById("btnDetail").onclick = function() {
    window.location.href = "detail.html?id=" + p.id;
  };
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
