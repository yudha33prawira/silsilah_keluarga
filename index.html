```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silsilah Keluarga</title>

<style>
body { font-family: Arial; background:#f5f5f5; text-align:center; margin:0; }
h2 { margin:10px; }

.toolbar { display:flex; justify-content:center; gap:10px; margin:10px 0; }

.search-btn,.filter-btn {
  padding:10px 15px;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

.search-btn { background:linear-gradient(135deg,#6a11cb,#2575fc); }
.filter-btn { background:linear-gradient(135deg,#ff7e5f,#ff9966); }

/* TREE */
.tree { display:flex; flex-wrap:wrap; justify-content:center; gap:40px; }

.family-block { display:flex; flex-direction:column; align-items:center; }

.couple {
  display:flex;
  gap:40px;
  justify-content:center;
  position:relative;
}

.love-icon {
  position:absolute;
  top:40px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
}

.children {
  margin-top:40px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.person {
  border:1px solid black;
  border-radius:12px;
  padding:10px;
  background:white;
}

/* ✅ MENINGGAL */
.person.meninggal {
  background:black;
  color:white;
}

.person img,.siluet {
  width:80px;
  height:80px;
  border-radius:50%;
  cursor:pointer;
}

.siluet {
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

.siluet.l { background:#2193b0; color:white; }
.siluet.p { background:#ff758c; color:white; }

.name {
  font-weight:bold;
  margin-top:5px;
  cursor:pointer;
}

/* POPUP */
.search-popup,.popup {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
}

.search-box,.popup-content {
  background:white;
  padding:20px;
  margin:100px auto;
  width:90%;
  max-width:300px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>Silsilah Keluarga</h2>

<div class="toolbar">
  <button onclick="openSearch()" class="search-btn">🔍 Cari</button>
</div>

<div class="tree" id="tree"></div>

<!-- SEARCH -->
<div id="searchPopup" class="search-popup">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Cari nama..." onkeyup="searchName(event)">
    <br><br>
    <button onclick="searchName()">Cari</button>
    <button onclick="closeSearch()">Tutup</button>
  </div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3 id="nama"></h3>
    <p id="info"></p>
    <button id="btnDetail">Lihat Detail</button><br><br>
    <button onclick="closePopup()">Tutup</button>
  </div>
</div>

<script>
let globalData=[];

/* NAMA PENDEK */
function shortName(nama){
  if(!nama) return "-";
  let parts=nama.trim().split(/\s+/);
  return parts[0];
}

/* LOAD */
fetch('data.json?v='+Date.now())
.then(r=>r.json())
.then(data=>{
  globalData=data;
  init(data);
});

/* INIT */
function init(data){
  let roots=data
    .filter(p=>p.generasi==="1" && (p.jenis_kelamin||"")==="L")
    .sort((a,b)=>(a.tanggal_lahir||0)-(b.tanggal_lahir||0));

  roots.forEach(root=>{
    let pasangan=data.filter(x=>root.pasangan?.includes(x.nama));
    if(!pasangan.length) createFamilyBlock(root,null);
    else pasangan.forEach(p=>createFamilyBlock(root,p));
  });
}

/* FAMILY */
function createFamilyBlock(root,pasangan){
  const tree=document.getElementById("tree");

  const block=document.createElement("div");
  block.className="family-block";

  const couple=document.createElement("div");
  couple.className="couple";

  couple.appendChild(createPerson(root));

  if(pasangan){
    const love=document.createElement("div");
    love.className="love-icon";
    love.innerHTML="❤️";
    couple.appendChild(love);
    couple.appendChild(createPerson(pasangan));
  }

  block.appendChild(couple);

  let children=globalData.filter(x=>
    (x.ayah===root.nama && pasangan && x.ibu===pasangan.nama) ||
    (x.ibu===root.nama && pasangan && x.ayah===pasangan.nama)
  );

  children.sort((a,b)=>(a.tanggal_lahir||0)-(b.tanggal_lahir||0));

  if(children.length){
    const box=document.createElement("div");
    box.className="children";
    children.forEach(c=>box.appendChild(createPerson(c)));
    block.appendChild(box);
  }

  tree.appendChild(block);
}

/* DETAIL */
function goDetail(id){
  window.location.href="detail.html?id="+id;
}

/* PERSON */
function createPerson(p){

  const isMeninggal=(p.status||"").toLowerCase().includes("meninggal");

  const div=document.createElement("div");
  div.className="person "+(isMeninggal?"meninggal":"");

  let fotoHTML = p.foto
    ? `<img src="${p.foto}" onclick="openPopup('${p.id}')">`
    : `<div class="siluet ${p.jenis_kelamin==='L'?'l':'p'}" onclick="openPopup('${p.id}')">${p.jenis_kelamin==='L'?'👨':'👩'}</div>`;

  div.innerHTML = `
    ${fotoHTML}
    <div class="name" onclick="goDetail('${p.id}')">${shortName(p.nama)}</div>
  `;

  return div;
}

/* POPUP */
function val(v){ return v ? v : "-"; }

function openPopup(id){
  const p=globalData.find(x=>x.id===id);
  if(!p) return;

  document.getElementById("popup").style.display="block";
  document.getElementById("nama").innerText=p.nama;

  /* ✅ BIODATA LENGKAP */
  document.getElementById("info").innerHTML=`
    Lahir: ${val(p.tanggal_lahir)}<br>
    Alamat: ${val(p.alamat_lahir)}<br>
    Domisili: ${val(p.domisili)}<br>
    Pasangan: ${val(p.pasangan)}<br>
    Anak: ${val(p.jumlah_anak)}<br>
    Status: ${val(p.status)}
  `;

  document.getElementById("btnDetail").onclick=()=>goDetail(p.id);
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

/* SEARCH */
function openSearch(){ document.getElementById("searchPopup").style.display="block"; }
function closeSearch(){ document.getElementById("searchPopup").style.display="none"; }

function searchName(e){
  if(e && e.key!=="Enter") return;
  let v=document.getElementById("searchInput").value.toLowerCase();
  let p=globalData.find(x=>x.nama.toLowerCase().includes(v));
  if(p) goDetail(p.id); else alert("Tidak ditemukan");
}
</script>

</body>
</html>
