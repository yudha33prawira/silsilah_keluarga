<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Silsilah Keluarga</title>

<style>
body {
  font-family: Arial;
  text-align: center;
}

.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.row {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.v-line {
  width: 2px;
  height: 30px;
  background: black;
}

.children {
  position: relative;
  margin-top: 10px;
}

.children::before {
  content: '';
  position: absolute;
  top: -10px;
  left: 10%;
  right: 10%;
  height: 2px;
  background: black;
}

.person {
  border: 1px solid black;
  padding: 10px;
  border-radius: 10px;
  margin: 10px;
  background: white;
  cursor: pointer;
  min-width: 120px;
}

.person img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
}

.couple {
  display: flex;
  gap: 10px;
  justify-content: center;
}

/* popup */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.popup-content {
  background: white;
  width: 260px;
  margin: 100px auto;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>Silsilah Keluarga Ngadiman</h2>

<div class="tree" id="tree"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3 id="nama"></h3>
    <p id="info"></p>
    <button id="btnDetail">Lihat Detail</button><br><br>
    <button onclick="closePopup()">Tutup</button>
  </div>
</div>

<script>
fetch('data.json')
  .then(res => res.json())
  .then(data => {

    const tree = document.getElementById("tree");

    const roots = data.filter(p => !p.orang_tua || p.orang_tua === "-");

    buildTree(roots, tree, data);

  });


// ===== BUILD TREE MULTI GENERASI =====
function buildTree(parents, container, data) {

  if (parents.length === 0) return;

  // tampilkan 1 level
  const row = document.createElement("div");
  row.className = "row";

  const used = new Set();

  parents.forEach(p => {

    if (used.has(p.nama)) return;

    row.appendChild(createPerson(p, data));

    if (p.pasangan) {
      used.add(p.pasangan);
    }

  });

  container.appendChild(row);


  // cari anak
  let children = [];

  parents.forEach(p => {
    const child = data.filter(x => x.orang_tua === p.nama);
    children = children.concat(child);
  });

  // hapus duplikat anak
  const uniqueChildren = [];
  const usedChild = new Set();

  children.forEach(c => {
    if (!usedChild.has(c.nama)) {
      uniqueChildren.push(c);
      usedChild.add(c.nama);
    }
  });

  // kalau ada anak → lanjut
  if (uniqueChildren.length > 0) {

    const vline = document.createElement("div");
    vline.className = "v-line";
    container.appendChild(vline);

    const childContainer = document.createElement("div");
    childContainer.className = "tree children";

    container.appendChild(childContainer);

    // recursive ke bawah
    buildTree(uniqueChildren, childContainer, data);
  }
}


// ===== CARD =====
function createPerson(p, data) {

  const div = document.createElement("div");
  div.className = "person";

  const pasangan = data.find(x => x.nama === p.pasangan);

  if (pasangan) {
    div.innerHTML = `
      <div class="couple">
        <div>
          <img src="${p.foto}">
          <div>${p.nama}</div>
        </div>
        <div>
          <img src="${pasangan.foto}">
          <div>${pasangan.nama}</div>
        </div>
      </div>
    `;
  } else {
    div.innerHTML = `
      <img src="${p.foto}">
      <div>${p.nama}</div>
    `;
  }

  div.onclick = () => {
    showDetail(
      p.nama,
      `Lahir: ${p.tanggal_lahir}
Alamat: ${p.alamat_lahir}
Domisili: ${p.domisili}
Pasangan: ${p.pasangan}
Anak: ${p.jumlah_anak}
Status: ${p.status}
WA: ${p.wa}
Pekerjaan: ${p.pekerjaan}`,
      p.id
    );
  };

  return div;
}


// ===== POPUP =====
function showDetail(nama, info, id) {
  document.getElementById("popup").style.display = "block";
  document.getElementById("nama").innerText = nama;
  document.getElementById("info").innerHTML = info.replace(/\n/g, "<br>");

  const btn = document.getElementById("btnDetail");

  if (id) {
    btn.style.display = "inline-block";
    btn.onclick = function() {
      window.location.href = "detail.html?id=" + id;
    };
  } else {
    btn.style.display = "none";
  }
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
