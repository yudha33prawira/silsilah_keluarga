<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<body>

<div class="header">
  <h2>Silsilah Keluarga</h2>
</div>

<style>
body {
  font-family: Arial;
  margin: 0;
  text-align: center;

  background: linear-gradient(-45deg, #6a11cb, #2575fc, #00c6ff, #6a11cb);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
}

/* HEADER */
.header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  margin-top: 15px;
}

h2 {
  margin: 0;
  padding: 10px 20px;
  display: inline-block;

  color: white;
  font-size: 22px;
  font-weight: bold;

  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(8px);

  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);

  text-shadow: 0 0 10px rgba(255,255,255,0.4);
}
  
/* animasi */
@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.toolbar { display:flex; justify-content:center; gap:10px; margin:10px 0; }

.search-btn,.filter-btn {
  padding:10px 15px;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* TREE */
.tree {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:40px;
}

.family-block {
  display:flex;
  flex-direction:column;
  align-items:center;
}

  
.couple {
  display:flex;
  gap:40px;
  position:relative;
}

.love-icon {
  position:absolute;
  top:40px;
  left:50%;
  transform:translateX(-50%);
}

/* CHILDREN */
.children {
  margin-top:40px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

/* PERSON */
.person {
  border:1px solid black;
  border-radius:12px;
  padding:10px;
  background:white;
}

.person.meninggal {
  background:black;
  color:white;
}

.person img,.siluet {
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  cursor:pointer;
}

.siluet {
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

.siluet.l { background:#2193b0; color:white; }
.siluet.p { background:#ff758c; color:white; }

.name {
  font-weight:bold;
  margin-top:5px;
  cursor:pointer;
}

.person, .popup-box, .search-box {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.3);
}

.person {
  transition: 0.3s;
}

.person:hover {
  transform: translateY(-5px) scale(1.05);
}

/* POPUP */
.popup {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:999;
  overflow-y:auto;
}

.popup-box {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  margin:40px auto;
  width:90%;
  max-width:400px;
  border-radius:15px;
  overflow:hidden;
  text-align:left;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.popup-header {
  text-align:center;
  padding:20px;
  background:linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;
}

.popup-header img,
.popup-avatar {
  width:100px;
  height:100px;
  border-radius:50%;
  margin-bottom:10px;
}

.popup-avatar {
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  background:white;
  color:black;
}
button {
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color: white;
  cursor: pointer;
}

.popup-body {
  padding:15px;
  color:#222; /* 🔥 biar terbaca */
}

.section { margin-bottom:15px; }

.section-title {
  font-weight:bold;
  margin-bottom:5px;
  color:#2575fc;
}

.popup-footer {
  padding:15px;
  text-align:center;
}

.btn-wa {
  background:#25D366;
  color:white;
}

  /* ===== FIX POPUP BIAR SAMA DENGAN DETAIL ===== */
.popup-box {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  color: #222; /* 🔥 ini kunci biar tulisan kelihatan */
}

.popup-body {
  color: #222;
}

.section-title {
  color: #2575fc;
  font-weight: bold;
}

.popup-footer button {
  width: 100%;
  margin-top: 5px;
}

/* tombol WA tetap hijau */
.btn-wa {
  background: #25D366;
  color: white;
}

/* tombol lain biar serasi */
.popup-footer button:not(.btn-wa) {
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color: white;
}

  .popup-header {
  text-align:center;
  padding:20px;
  background:linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;
}

/* ANIMASI BACKGROUND */
@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.search-box,.popup-content {
  background:white;
  padding:20px;
  margin:100px auto;
  width:90%;
  max-width:300px;
  border-radius:10px;
}

.search-popup {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 999;
}

.toolbar {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin: 15px 0;
}

.toolbar button {
  padding: 10px 18px;
  border: none;
  border-radius: 12px;

  background: rgba(255,255,255,0.2);
  color: white;

  backdrop-filter: blur(10px);
  cursor: pointer;

  transition: 0.3s;
}

.toolbar button:hover {
  background: rgba(255,255,255,0.35);
  transform: scale(1.05);
}

.toolbar button:active {
  transform: scale(0.95);
}

.search-box button {
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color: white;
  width: 100%;
  margin-top: 5px;
}

.search-box button:last-child {
  background: #777;
}

  .header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  margin-top: 15px;
}

h2 {
  margin: 0;
  padding: 10px 20px;
  color: white;
  font-size: 22px;
  font-weight: bold;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(8px);
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  text-shadow: 0 0 10px rgba(255,255,255,0.4);
}

  .toolbar {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin: 15px 0;
}

.toolbar button {
  padding: 10px 18px;
  border-radius: 12px;
  background: rgba(255,255,255,0.2);
  color: white;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.toolbar button:hover {
  background: rgba(255,255,255,0.35);
  transform: scale(1.05);
}

</style>
</head>

<body>

<div class="toolbar">
  <button onclick="openSearch()" class="search-btn">🔍 Cari</button>
  <button onclick="openFilter()" class="filter-btn">📑 Filter</button>
</div>

<div class="tree" id="tree"></div>

<!-- SEARCH -->
<div id="searchPopup" class="search-popup" onclick="closeSearch()">
  <div class="search-box" onclick="event.stopPropagation()">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Cari nama..." onkeyup="searchName(event)">
    <br><br>
    <button onclick="searchName()">Cari</button>
    <button onclick="closeSearch()">Tutup</button>
  </div>
</div>

<!-- FILTER -->
<div id="filterPopup" class="search-popup" onclick="closeFilter()">
  <div class="search-box" onclick="event.stopPropagation()">

    <p><b>Pilih Filter:</b></p>

    <label>
      <input type="checkbox" id="fHidup"> Yang masih hidup
    </label><br><br>

    <label>
      <input type="checkbox" id="fLaki"> Laki-laki
    </label><br><br>

    <label>
      <input type="checkbox" id="fPerempuan"> Perempuan
    </label><br><br>

    <label>
      Generasi:
      <input type="number" id="fGenerasi" placeholder="Contoh: 1">
    </label><br><br>

    <button onclick="applyFilter()">Terapkan</button><br><br>
    <button onclick="resetFilter()">Reset</button>

  </div>
</div>

<!-- POPUP -->
<div id="popup" class="popup" onclick="closePopup(event)">
  <div class="popup-box" onclick="event.stopPropagation()">

    <div class="popup-header" id="popupHeader"></div>
    <div class="popup-body" id="popupBody"></div>

    <div class="popup-footer">
      <button id="btnWA" class="btn-wa">📞 WhatsApp</button><br>
      <button id="btnDetail">📄 Detail</button><br><br>
      <button onclick="closePopup()">Tutup</button>
    </div>

  </div>
</div>

<script>
// NONAKTIFKAN ALERT ERROR DI HP
window.onerror = null;

let globalData=[];

/* LOAD */
fetch('data.json?v='+Date.now())
.then(r=>r.json())
.then(data=>{
  globalData=data;
  init(data);
});

/* INIT + SORT */
function init(data){
  let roots = data
    .filter(p=>p.generasi==="1" && p.jenis_kelamin==="L")
    .sort((a,b)=>
      parseInt(a.tanggal_lahir || "9999") - parseInt(b.tanggal_lahir || "9999")
    );

  roots.forEach(root=>{
    let pasangan=data.filter(x=>root.pasangan && root.pasangan.includes(x.nama));

    if(!pasangan.length){
      createFamilyBlock(root,null);
    } else {
      pasangan.forEach(p=>createFamilyBlock(root,p));
    }
  });
}

function renderByGenerasi(gen){
  const tree = document.getElementById("tree");
  tree.innerHTML = ""; // 🔥 hapus tampilan lama

  let dataGen = globalData.filter(x => x.generasi === gen);

  dataGen.forEach(p=>{
    const block = document.createElement("div");
    block.className = "family-block";

    const couple = document.createElement("div");
    couple.className = "couple";

    couple.appendChild(createPerson(p));

    block.appendChild(couple);
    tree.appendChild(block);
  });
}

/* FAMILY */
function createFamilyBlock(root,pasangan){
  const tree=document.getElementById("tree");

  const block=document.createElement("div");
  block.className="family-block";

  const couple=document.createElement("div");
  couple.className="couple";

  couple.appendChild(createPerson(root));

  if(pasangan){
    let love=document.createElement("div");
    love.className="love-icon";
    love.innerHTML="❤️";
    couple.appendChild(love);
    couple.appendChild(createPerson(pasangan));
  }

  block.appendChild(couple);

  let children=globalData.filter(x=>
    (x.ayah===root.nama && pasangan && x.ibu===pasangan.nama) ||
    (x.ibu===root.nama && pasangan && x.ayah===pasangan.nama)
  );

  children.sort((a,b)=>
    parseInt(a.tanggal_lahir||9999) - parseInt(b.tanggal_lahir||9999)
  );

  if(children.length){
    let box=document.createElement("div");
    box.className="children";
    children.forEach(c=>box.appendChild(createPerson(c)));
    block.appendChild(box);
  }

  tree.appendChild(block);
}

/* ===== FIX NAMA ===== */
function shortName(nama){
  if(!nama) return "-";

  const gelar=[
    "h","h.","hj","hj.","dr","dr.","drs","drs.",
    "ir","ir.","kh","kh.","ust","ust.","ustadz",
    "habib","r","r."
  ];

  let parts=nama.trim().split(/\s+/);

  for(let i=0;i<parts.length;i++){
    let word=parts[i].toLowerCase();

    if(gelar.includes(word)) continue;
    if(parts[i].includes(".")) continue;

    return parts[i];
  }

  return parts[0];
}

/* PERSON */
function createPerson(p){
  const isMeninggal=(p.status||"").toLowerCase().includes("meninggal");

  const div=document.createElement("div");
  div.className="person "+(isMeninggal?"meninggal":"");
  div.setAttribute("data-id", p.id); // 🔥 WAJIB

  let foto = p.foto
    ? `<img src="${p.foto}" onclick="openPopup('${p.id}')">`
    : `<div class="siluet ${p.jenis_kelamin==='L'?'l':'p'}" onclick="openPopup('${p.id}')">${p.jenis_kelamin==='L'?'👨':'👩'}</div>`;

  div.innerHTML = `
    ${foto}
    <div class="name" onclick="goDetail('${p.id}')">${shortName(p.nama)}</div>
  `;

  return div;
}

/* DETAIL */
function goDetail(id){
  window.location.href="detail.html?id="+id;
}

/* POPUP */
function val(v){ return v ? v : "-"; }

function openPopup(id){
  const p=globalData.find(x=>x.id===id);
  if(!p) return;

  document.getElementById("popup").style.display="block";
  document.body.classList.add("lock");

  let header = p.foto
    ? `<img src="${p.foto}"><br>${p.nama}`
    : `<div class="popup-avatar">${p.jenis_kelamin==='L'?'👨':'👩'}</div>${p.nama}`;

  document.getElementById("popupHeader").innerHTML=header;

  document.getElementById("popupBody").innerHTML=`
    <div class="section">
      <div class="section-title">👤 Biodata</div>
      Jenis Kelamin: ${val(p.jenis_kelamin)}<br>
      Status: ${val(p.status)}<br>
      Pekerjaan: ${val(p.pekerjaan)}
    </div>

    <div class="section">
      <div class="section-title">👨‍👩‍👧 Keluarga</div>
      Ayah: ${val(p.ayah)}<br>
      Ibu: ${val(p.ibu)}<br>
      Pasangan: ${val(p.pasangan)}<br>
      Anak: ${val(p.jumlah_anak)}
    </div>

    <div class="section">
      <div class="section-title">📍 Lahir</div>
      Tahun: ${val(p.tanggal_lahir)}<br>
      Tempat: ${val(p.alamat_lahir)}<br>
      Domisili: ${val(p.domisili)}
    </div>

    <div class="section">
      <div class="section-title">📞 Kontak</div>
      WA: ${val(p.wa)}
    </div>
  `;

  document.getElementById("btnWA").onclick=()=>{
    if(p.wa) window.open("https://wa.me/"+p.wa);
    else alert("No WA tidak tersedia");
  };

  document.getElementById("btnDetail").onclick=()=>{
  closePopup(); // 🔥 tutup popup dulu
  setTimeout(()=>{
    goDetail(p.id);
  },200);
};
}

function closePopup(){
  document.getElementById("popup").style.display="none";
  document.body.classList.remove("lock");
}

/* SEARCH */
function openSearch(){ document.getElementById("searchPopup").style.display="block"; }
function closeSearch(){ document.getElementById("searchPopup").style.display="none"; }

function searchName(e){
  if(e && e.key!=="Enter") return;

  let v=document.getElementById("searchInput").value.toLowerCase();

  if(!v){
    alert("Masukkan nama dulu");
    return;
  }

  let p=globalData.find(x=>x.nama.toLowerCase().includes(v));

  if(p){
    closeSearch();
    window.location.href="detail.html?id="+p.id;
  } else {
    alert("Tidak ditemukan");
  }
}

/* FILTER */
function openFilter(){
  document.getElementById("filterPopup").style.display="block";
}

function closeFilter(){
  document.getElementById("filterPopup").style.display="none";
}

function toggleFilter(){
  let el = document.getElementById("filterPopup");
  el.style.display = (el.style.display === "block") ? "none" : "block";
}

function applyFilter(){

  const fHidup = document.getElementById("fHidup").checked;
  const fLaki = document.getElementById("fLaki").checked;
  const fPerempuan = document.getElementById("fPerempuan").checked;
  const fGenerasi = document.getElementById("fGenerasi").value;

  // 🔥 1. RESET TAMPILAN DULU
  document.getElementById("tree").innerHTML = "";
  init(globalData);

  // 🔥 2. KHUSUS GENERASI → tampilkan hanya generasi itu
  if(fGenerasi){
    renderByGenerasi(fGenerasi);
  }

  // 🔥 3. FILTER SEMUA PERSON
  document.querySelectorAll(".person").forEach(el=>{
    let id = el.getAttribute("data-id");
    let data = globalData.find(x => x.id === id);

    if(!data) return;

    let show = true;

    // hidup
    if(fHidup && (data.status||"").toLowerCase().includes("meninggal")){
      show = false;
    }

    // gender pintar
    if(!(fLaki && fPerempuan)){
      if(fLaki && data.jenis_kelamin !== "L") show = false;
      if(fPerempuan && data.jenis_kelamin !== "P") show = false;
    }

    // generasi (tetap dicek biar aman)
    if(fGenerasi && data.generasi !== fGenerasi){
      show = false;
    }

    el.style.display = show ? "block" : "none";
  });

  // 🔥 4. RAPIIIN COUPLE + LOVE
  document.querySelectorAll(".couple").forEach(couple=>{
    let persons = couple.querySelectorAll(".person");
    let love = couple.querySelector(".love-icon");

    let visibleCount = 0;

    persons.forEach(p=>{
      if(p.style.display !== "none") visibleCount++;
    });

    couple.style.display = visibleCount ? "flex" : "none";

    if(love){
      love.style.display = (visibleCount === 2) ? "block" : "none";
    }
  });
  // 🔥 SORT COUPLE
  document.querySelectorAll(".couple").forEach(couple=>{
  sortByUmur(couple);
});

  // 🔥 5. CHILDREN + SORT UMUR
  document.querySelectorAll(".children").forEach(childBox=>{

  // 🔥 SORT
  sortByUmur(childBox);

  let visibleChild = 0;

  childBox.querySelectorAll(".person").forEach(p=>{
    if(p.style.display !== "none") visibleChild++;
  });

  childBox.style.display = visibleChild ? "grid" : "none";
});

  // 🔥 6. FAMILY BLOCK
  document.querySelectorAll(".family-block").forEach(block=>{
    let visible = block.querySelectorAll(".person:not([style*='display: none'])");
    block.style.display = visible.length ? "flex" : "none";
  });

  sortTreeByUmur();

  closeFilter(); // 🔥 auto close
}

function sortByUmur(container){

  let persons = Array.from(container.querySelectorAll(".person"));

  persons.sort((a,b)=>{
    let idA = a.getAttribute("data-id");
    let idB = b.getAttribute("data-id");

    let dataA = globalData.find(x=>x.id===idA);
    let dataB = globalData.find(x=>x.id===idB);

    let thA = parseInt(dataA?.tanggal_lahir);
    let thB = parseInt(dataB?.tanggal_lahir);

    // 🔥 kalau kosong → taruh paling bawah
    if(!thA) return 1;
    if(!thB) return -1;

    return thA - thB; // dari tua ke muda
  });

  // 🔥 tempel ulang urutan
  persons.forEach(p => container.appendChild(p));
}

function sortTreeByUmur(){

  const tree = document.getElementById("tree");

  let blocks = Array.from(tree.querySelectorAll(".family-block"));

  blocks.sort((a,b)=>{

    let personA = a.querySelector(".person");
    let personB = b.querySelector(".person");

    let idA = personA?.getAttribute("data-id");
    let idB = personB?.getAttribute("data-id");

    let dataA = globalData.find(x=>x.id===idA);
    let dataB = globalData.find(x=>x.id===idB);

    let thA = parseInt(dataA?.tanggal_lahir);
    let thB = parseInt(dataB?.tanggal_lahir);

    if(!thA) return 1;
    if(!thB) return -1;

    return thA - thB; // tua ke muda
  });

  blocks.forEach(b => tree.appendChild(b));
}

function resetFilter(){
  document.querySelectorAll(".person").forEach(el=>{
    el.style.display="block";
  });

  document.querySelectorAll(".couple").forEach(el=>{
    el.style.display="flex"; // 🔥 penting
  });

  document.getElementById("fHidup").checked=false;
  document.getElementById("fLaki").checked=false;
  document.getElementById("fPerempuan").checked=false;
  document.getElementById("fGenerasi").value="";
  document.getElementById("tree").innerHTML = "";
  init(globalData); // 🔥 kembali ke tampilan awal

  closeFilter();
}
</script>

</body>
</html>
