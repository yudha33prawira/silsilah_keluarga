<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Silsilah Keluarga</title>

<style>
body {
  font-family: Arial;
  text-align: center;
}

.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.row {
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Garis dari orang tua ke tengah */
.v-line {
  width: 2px;
  height: 35px;
  background: black;
  margin-bottom: 10px;
}

/* ===== GARIS OTOMATIS KE ANAK ===== */
.row.children {
  position: relative;
}

/* garis horizontal */
.row.children::before {
  content: '';
  position: absolute;
  top: -10px;
  left: 5%;
  right: 5%;
  height: 2px;
  background: black;
}

/* garis ke tiap anak */
.row.children .person {
  position: relative;
}

.row.children .person::before {
  content: '';
  position: absolute;
  top: -20px;
  left: 50%;
  width: 2px;
  height: 20px;
  background: black;
}

/* Card orang */
.person {
  border: 1px solid #000;
  padding: 10px;
  border-radius: 10px;
  margin: 10px;
  width: 110px;
  cursor: pointer;
}

.person img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.popup-content {
  background: white;
  width: 260px;
  margin: 100px auto;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}
</style>
</head>

<body>

<h2>Silsilah Keluarga Ngadiman</h2>

<div class="tree">

  <!-- ORANG TUA -->
  <div class="row">

    <div class="person"
    onclick="showDetail('Ngadiman','Gen1\nAyah\nLahir: 1960\nAlamat Lahir: Purworjo\nDomisili: Tasikmalaya\nHubungan: Menikah dengan Titik\nKeturunan: 4\nStatus Saat Ini : Meninggal\nWA: -----\nPekerjaan: ----')">
      <img src="images/ngadiman.jpg">
      <div>Ngadiman</div>
    </div>

    <div class="person"
    onclick="showDetail('Titik','Gen1\nIbu\nLahir: 1965\nAlamat Lahir: Tasikmalaya\nDomisili: Tasikmalaya\nHubungan: Menikah dengan Ngadiman\nKeturunan: 4\nStatus Saat Ini: Masih Hidup\nWA: +62 812-1629-4218\nPekerjaan: ----')">
      <img src="images/titik.jpg">
      <div>Titik</div>
    </div>

  </div>

  <div class="v-line"></div>

  <!-- ANAK -->
  <div class="row children">

    <div class="person"
    onclick="showDetail('Yuliarsih','Gen2\nAnak1\nLahir: 1975\nAlamat Lahir: Tasikmalaya\nDomisili: Tasikmalaya\nHubungan: Menikah dengan R Oyo Sunarso\nKeturunan: 2\nStatus Saat Ini : Masih Hidup\nWA: +62 852-1862-9771\nPekerjaan: ----','yuliarsih.html')">
      <img src="images/yuliarsih.jpg">
      <div>Yuliarsih</div>
    </div>

    <div class="person"
    onclick="showDetail('Agus','Gen2\nAnak2\nLahir: 1978\nAlamat Lahir: Tasikmalaya\nDomisili: Tasikmalaya\nDomisili: Tasikmalaya\nHubungan: Menikah dengan -----\nKeturunan: 2\nStatus Saat Ini: Masih Hidup\nWA: -----\nPekerjaan: Jualan Mie Ayam','agus.html')">
      <img src="images/agus.jpg">
      <div>Agus</div>
    </div>

    <div class="person"
    onclick="showDetail('Suparmo','Gen2\nAnak3\nLahir: 1980\nAlamat Lahir: Tasikmalaya\nDomisili: Depok\nHubungan: Menikah dengan Yatih\nKeturunan: 2\nStatus Saat Ini: Masih Hidup\nWA: +62 812-9225-9609\nPekerjaan: Jualan Buah Buahan','suparmo.html')">
      <img src="images/suparmo.jpg">
      <div>Suparmo</div>
    </div>

    <div class="person"
    onclick="showDetail('Eti','Gen2\nAnak4\nLahir: 1982\nAlamat Lahir: Tasikmalaya\nDomisili: Tasikmalaya\nHubungan: Lajang\nKeturunan: -----\nStatus Saat Ini: Meninggal\nWA: -----\nPekerjaan: ----')">
      <img src="images/eti.jpg">
      <div>Eti</div>
    </div>

  </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3 id="nama"></h3>
    <p id="info"></p>

    <button id="btnDetail">Lihat Silsilah</button><br><br>
    <button onclick="closePopup()">Tutup</button>
  </div>
</div>

<div class="tree" id="tree"></div>

<script>
fetch('data.json')
  .then(res => res.json())
  .then(data => {

    const tree = document.getElementById("tree");

    // Ambil generasi 1 (orang tua)
    const gen1 = data.filter(p => p.generasi == 1);
    const gen2 = data.filter(p => p.generasi == 2);

    // ===== ROW ORANG TUA =====
    const rowParent = document.createElement("div");
    rowParent.className = "row";

    gen1.forEach(p => {
      const div = createPerson(p);
      rowParent.appendChild(div);
    });

    tree.appendChild(rowParent);

    // Garis tengah
    const vline = document.createElement("div");
    vline.className = "v-line";
    tree.appendChild(vline);

    // ===== ROW ANAK =====
    const rowChild = document.createElement("div");
    rowChild.className = "row children";

    gen2.forEach(p => {
      const div = createPerson(p);
      rowChild.appendChild(div);
    });

    tree.appendChild(rowChild);

  });


// ===== FUNCTION BUAT CARD =====
function createPerson(p) {
  const div = document.createElement("div");
  div.className = "person";

  div.innerHTML = `
    <img src="${p.foto}">
    <div>${p.nama}</div>
  `;

  div.onclick = () => {
    showDetail(
      p.nama,
      `Gen${p.generasi}
Lahir: ${p.tanggal_lahir}
Alamat Lahir: ${p.alamat_lahir}
Domisili: ${p.domisili}
Pasangan: ${p.pasangan}
Keturunan: ${p.jumlah_anak}
Status: ${p.status}
WA: ${p.wa}
Pekerjaan: ${p.pekerjaan}`,
      p.link_detail
    );
  };

  return div;
}


// ===== POPUP =====
function showDetail(nama, info, link) {
  document.getElementById("popup").style.display = "block";
  document.getElementById("nama").innerText = nama;
  document.getElementById("info").innerHTML = info.replace(/\n/g, "<br>");

  const btn = document.getElementById("btnDetail");

  if (link) {
    btn.style.display = "inline-block";
    btn.onclick = function() {
      window.location.href = link;
    };
  } else {
    btn.style.display = "none";
  }
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>
  

</body>
</html>
