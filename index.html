<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silsilah Keluarga</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin: 0;
}

/* TREE */
.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 15px;
}

/* COUPLE (AYAH IBU) */
.couple {
  display: flex;
  gap: 20px;
  justify-content: center;
  align-items: center;
  position: relative;
}

/* GARIS TURUN DARI TENGAH */
.couple::after {
  content: '';
  position: absolute;
  bottom: -40px;
  left: 50%;
  width: 2px;
  height: 40px;
  background: black;
  transform: translateX(-50%);
}

/* CHILDREN */
.children {
  margin-top: 50px;
  width: 100%;
  max-width: 600px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  position: relative;
}

/* GARIS KE ANAK */
.children::before {
  content: '';
  position: absolute;
  top: -20px;
  left: 10%;
  right: 10%;
  height: 2px;
  background: black;
}

/* CARD */
.person {
  border: 1px solid black;
  border-radius: 12px;
  padding: 15px;
  background: white;
  cursor: pointer;
  transition: 0.2s;
}

.person:hover {
  transform: scale(1.05);
}

/* FOTO */
.person img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .children {
    grid-template-columns: 1fr;
  }

  .person img {
    width: 80px;
    height: 80px;
  }
}
</style>
</head>

<body>

<h2>Silsilah Keluarga Ngadiman</h2>

<div class="tree" id="tree"></div>

<script>
fetch('data.json?v=' + new Date().getTime())
.then(res => res.json())
.then(data => {

  const tree = document.getElementById("tree");

  const ayah = data.find(p => p.nama === "Ngadiman");
  const ibu = data.find(p => p.nama === "Titik");

  if (!ayah || !ibu) {
    tree.innerHTML = "Data tidak ditemukan";
    return;
  }

  // ===== AYAH + IBU =====
  const couple = document.createElement("div");
  couple.className = "couple";

  couple.appendChild(createPerson(ayah));
  couple.appendChild(createPerson(ibu));

  tree.appendChild(couple);

  // ===== ANAK =====
  const children = data.filter(x =>
    x.ayah === ayah.nama && x.ibu === ibu.nama
  );

  const childBox = document.createElement("div");
  childBox.className = "children";

  children.forEach(p => {
    childBox.appendChild(createPerson(p));
  });

  tree.appendChild(childBox);

});

// CARD
function createPerson(p) {
  const div = document.createElement("div");
  div.className = "person";

  div.innerHTML = `
    <img src="${p.foto}">
    <div>${p.nama}</div>
  `;

  div.onclick = () => {
    window.location.href = "detail.html?id=" + p.id;
  };

  return div;
}
</script>

</body>
</html>
