<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silsilah Keluarga</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; text-align:center; }
body.lock { overflow:hidden; }

h2 { margin:10px; }

/* TOOLBAR */
.toolbar {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}

input {
  padding:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* TREE */
.tree { display:flex; flex-wrap:wrap; justify-content:center; gap:40px; }

.family-block { display:flex; flex-direction:column; align-items:center; }

.couple { display:flex; gap:40px; position:relative; }

.love-icon {
  position:absolute;
  top:40px;
  left:50%;
  transform:translateX(-50%);
}

.children {
  margin-top:40px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.person {
  border:1px solid black;
  border-radius:12px;
  padding:10px;
  background:white;
}

.person img,.siluet {
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  cursor:pointer;
}

.siluet {
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

.name { font-weight:bold; margin-top:5px; cursor:pointer; }

/* POPUP */
.popup {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:999;
  overflow-y:auto;
}

.popup-box {
  background:white;
  margin:40px auto;
  width:90%;
  max-width:400px;
  border-radius:15px;
}

.popup-body { padding:15px; }
</style>
</head>

<body>

<h2>Silsilah Keluarga</h2>

<div class="toolbar">
  <input type="text" id="search" placeholder="Cari nama...">
  <button onclick="doSearch()">🔍 Cari</button>
</div>

<div class="tree" id="tree"></div>

<div id="popup" class="popup" onclick="closePopup()">
  <div class="popup-box" onclick="event.stopPropagation()">
    <div class="popup-body" id="popupBody"></div>
  </div>
</div>

<script>
let globalData=[];

fetch('data.json?v='+Date.now())
.then(r=>r.json())
.then(data=>{
  globalData=data;
  init(data);
});

function init(data){
  const tree=document.getElementById("tree");
  tree.innerHTML="";

  data.forEach(p=>{
    tree.appendChild(createPerson(p));
  });
}

/* ===== SEARCH ===== */
function doSearch(){
  let key=document.getElementById("search").value.toLowerCase();

  let result=globalData.filter(p=>
    p.nama.toLowerCase().includes(key)
  );

  init(result);
}

/* ===== NAMA FIX ===== */
function shortName(nama){
  if(!nama) return "-";

  return nama
    .split(" ")
    .find(x => !x.includes("."));
}

/* PERSON */
function createPerson(p){
  const div=document.createElement("div");
  div.className="person";

  div.innerHTML=`
    <div onclick="openPopup('${p.id}')">
      ${p.foto ? `<img src="${p.foto}">` : "👤"}
    </div>
    <div class="name" onclick="goDetail('${p.id}')">${shortName(p.nama)}</div>
  `;

  return div;
}

/* POPUP */
function openPopup(id){
  const p=globalData.find(x=>x.id===id);

  document.getElementById("popup").style.display="block";
  document.body.classList.add("lock");

  document.getElementById("popupBody").innerHTML=`
    <b>${p.nama}</b><br><br>
    Status: ${p.status || "-"}<br>
    Pekerjaan: ${p.pekerjaan || "-"}
  `;
}

function closePopup(){
  document.getElementById("popup").style.display="none";
  document.body.classList.remove("lock");
}

function goDetail(id){
  let history = JSON.parse(localStorage.getItem("history")||"[]");
  history.push(id);
  localStorage.setItem("history",JSON.stringify(history));

  window.location.href="detail.html?id="+id;
}
</script>

</body>
</html>
