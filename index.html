<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silsilah Keluarga</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 0;
  background: #f5f5f5;
}

.tree {
  display: flex;
  flex-direction: row; /* horizontal untuk Gen-1 */
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
  gap: 50px; /* jarak antar kepala keluarga */
  flex-wrap: wrap;
}

.family-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

/* Garis vertikal antar kepala keluarga Gen-1 */
.family-block::after {
  content: '';
  position: absolute;
  top: 0;
  right: -25px; /* setengah gap */
  width: 2px;
  height: 100%;
  background: black;
}

.family-block:last-child::after {
  display: none; /* blok terakhir tidak perlu garis */
}

.couple {
  display: flex;
  gap: 20px;
  justify-content: center;
  position: relative;
}

.couple::after {
  content: '';
  position: absolute;
  bottom: -30px;
  left: 50%;
  width: 2px;
  height: 30px;
  background: black;
  transform: translateX(-50%);
}

.children {
  margin-top: 40px;
  width: 100%;
  max-width: 700px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  position: relative;
}

.children::before {
  content: '';
  position: absolute;
  top: -15px;
  left: 10%;
  right: 10%;
  height: 2px;
  background: black;
}

.person {
  border: 1px solid black;
  border-radius: 12px;
  padding: 15px;
  background: white;
  color: black;
  transition: transform 0.2s, box-shadow 0.2s;
}

.person:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.person.meninggal {
  background: black;
  color: white;
}

.person img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  cursor: pointer;
}

.name {
  margin-top: 8px;
  font-weight: bold;
  cursor: pointer;
}

.name.disabled {
  color: gray;
  cursor: default;
}

/* Modern Search Button */
.search-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  color: white;
  font-size: 22px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: transform 0.2s, box-shadow 0.2s;
}

.search-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 6px 15px rgba(0,0,0,0.3);
}

/* Search Popup */
.search-popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.search-box {
  background: white;
  padding: 25px;
  margin: 120px auto;
  width: 90%;
  max-width: 350px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

.search-box input {
  width: 80%;
  padding: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-bottom: 15px;
}

.search-box button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #2575fc;
  color: white;
  font-size: 16px;
  cursor: pointer;
  margin: 5px;
  transition: background 0.2s;
}

.search-box button:hover {
  background: #6a11cb;
}

/* Detail Popup */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.popup-content {
  background: white;
  width: 90%;
  max-width: 300px;
  margin: 80px auto;
  padding: 20px;
  border-radius: 10px;
}

@media (max-width: 600px) {
  .tree {
    flex-direction: column;
  }
  .family-block::after {
    display: none;
  }
  .children {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<h2>Silsilah Keluarga</h2>

<!-- Modern Search Button -->
<button onclick="openSearch()" class="search-btn">🔍</button>

<div class="tree" id="tree"></div>

<!-- Search Popup -->
<div id="searchPopup" class="search-popup">
  <div class="search-box">
    <h3>Cari Nama</h3>
    <input type="text" id="searchInput" placeholder="Ketik nama..." onkeyup="searchName(event)">
    <br>
    <button onclick="searchName()">Cari</button>
    <button onclick="closeSearch()">Tutup</button>
  </div>
</div>

<!-- Detail Popup -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3 id="nama"></h3>
    <p id="info"></p>
    <button id="btnDetail">Lihat Detail</button><br><br>
    <button onclick="closePopup()">Tutup</button>
  </div>
</div>

<script>
let globalData = [];

// Load data JSON
fetch('data.json?v=' + new Date().getTime())
  .then(res => res.json())
  .then(data => {
    globalData = data;
    init(data);
  });

// Inisialisasi halaman utama
function init(data) {
  const tree = document.getElementById("tree");

  // Ambil semua kepala keluarga Generasi 1
  const roots = data.filter(p => p.generasi === "1");

  if (!roots.length) {
    tree.innerHTML = "Data tidak ditemukan";
    return;
  }

  // Loop tiap kepala keluarga Gen 1
  roots.forEach(root => {
    // Cari pasangan
    let pasanganList = [];
    if (root.pasangan) {
      let list = root.pasangan.split("|").map(x => x.trim());
      pasanganList = data.filter(x => list.includes(x.nama));
    }

    if (pasanganList.length === 0) {
      createFamilyBlock(tree, root, null, data);
    } else {
      pasanganList.forEach(psg => createFamilyBlock(tree, root, psg, data));
    }
  });
}

// Buat blok keluarga
function createFamilyBlock(tree, root, pasangan, data) {
  const block = document.createElement("div");
  block.className = "family-block";

  const couple = document.createElement("div");
  couple.className = "couple";
  couple.appendChild(createPerson(root));
  if (pasangan) couple.appendChild(createPerson(pasangan));

  block.appendChild(couple);

  // Anak-anak
  const children = data.filter(x =>
    (x.ayah === root.nama && pasangan && x.ibu === pasangan.nama) ||
    (x.ibu === root.nama && pasangan && x.ayah === pasangan.nama)
  );

  if (children.length > 0) {
    const childBox = document.createElement("div");
    childBox.className = "children";
    children.forEach(p => childBox.appendChild(createPerson(p)));
    block.appendChild(childBox);
  }

  tree.appendChild(block);
}

// Cek punya anak
function punyaAnak(p) {
  return globalData.some(x => x.ayah === p.nama || x.ibu === p.nama);
}

// Buat card orang
function createPerson(p) {
  const hasChild = punyaAnak(p);
  const isMeninggal = (p.status || "").toLowerCase().includes("meninggal");

  const div = document.createElement("div");
  div.className = isMeninggal ? "person meninggal person-card" : "person person-card";

  div.innerHTML = `
    <img src="${p.foto}" onclick="openPopup('${p.id}')">
    <div class="name ${!hasChild ? 'disabled' : ''}">${p.nama}</div>
  `;
  div.setAttribute("data-name", p.nama.toLowerCase());

  if (hasChild) div.querySelector('.name').onclick = () => goDetail(p.id);

  return div;
}

// Detail popup
function openPopup(id) {
  const p = globalData.find(x => x.id === id);
  if (!p) return;

  const hasChild = punyaAnak(p);
  document.getElementById("popup").style.display = "block";
  document.getElementById("nama").innerText = p.nama;
  document.getElementById("info").innerHTML = `
    Lahir: ${p.tanggal_lahir}<br>
    Alamat: ${p.alamat_lahir}<br>
    Domisili: ${p.domisili}<br>
    Pasangan: ${p.pasangan}<br>
    Anak: ${p.jumlah_anak}<br>
    Status: ${p.status}<br>
    WA: ${p.wa}<br>
    Pekerjaan: ${p.pekerjaan}
  `;

  const btn = document.getElementById("btnDetail");
  if (hasChild) {
    btn.style.display = "inline-block";
    btn.onclick = () => goDetail(p.id);
  } else {
    btn.style.display = "none";
  }
}

function closePopup() { document.getElementById("popup").style.display = "none"; }
function goDetail(id) { window.location.href = "detail.html?id=" + id; }

// Search popup
function openSearch() {
  document.getElementById("searchPopup").style.display = "block";
  document.getElementById("searchInput").focus();
}

function closeSearch() {
  document.getElementById("searchPopup").style.display = "none";
}

// Cari nama
function searchName(e) {
  if (e && e.key && e.key !== "Enter") return;

  let input = document.getElementById("searchInput").value.toLowerCase();
  if (!input) return;

  let person = globalData.find(p => p.nama.toLowerCase().includes(input));

  if (person) {
    window.location.href = "detail.html?id=" + person.id;
  } else {
    alert("Nama tidak ditemukan!");
  }
}
</script>

</body>
</html>
