<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Silsilah Keluarga</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(-45deg, #1e2a5e, #2a3f7e, #1b4f8b, #0f2b4f);
      background-size: 400% 400%;
      animation: gradientFlow 15s ease infinite;
      min-height: 100vh;
      padding-bottom: 40px;
    }
    
    body.lock { overflow: hidden; }
    
    @keyframes gradientFlow { 
      0% { background-position: 0% 50%; } 
      50% { background-position: 100% 50%; } 
      100% { background-position: 0% 50%; } 
    }
    
    .hero { text-align: center; padding: 20px 16px 8px; }
    h1 {
      font-size: 1.8rem; font-weight: 700;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(12px);
      display: inline-block; padding: 8px 24px; border-radius: 50px;
      color: white; border: 1px solid rgba(255,255,255,0.2);
    }
    
    .marquee {
      width: 100%; overflow: hidden;
      background: rgba(0,0,0,0.45); backdrop-filter: blur(8px);
      border-top: 1px solid rgba(255,255,255,0.2);
      border-bottom: 1px solid rgba(255,255,255,0.2);
      margin: 12px 0;
    }
    .marquee-track {
      display: flex; width: max-content;
      animation: scrollText 38s linear infinite;
    }
    .marquee-track span { white-space: nowrap; padding: 8px 36px; color: #fff9e0; font-size: 0.85rem; }
    @keyframes scrollText { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .marquee-track:hover { animation-play-state: paused; }
    
    .toolbar {
      display: flex; justify-content: center; gap: 16px; margin: 16px 0 20px; flex-wrap: wrap;
    }
    .btn-glass {
      background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
      border: none; padding: 10px 24px; border-radius: 40px;
      font-size: 1rem; font-weight: 600; color: white; cursor: pointer;
      transition: 0.2s;
    }
    .btn-glass:hover { background: rgba(255,255,255,0.3); transform: scale(1.02); }
    .btn-glass:active { transform: scale(0.98); }
    
    .tree { display: flex; flex-direction: column; align-items: center; gap: 36px; padding: 10px 20px 40px; }
    .family-card {
      background: rgba(255,255,255,0.1); backdrop-filter: blur(4px);
      border-radius: 32px; padding: 20px 12px 12px;
      width: 100%; max-width: 800px; box-shadow: 0 12px 28px rgba(0,0,0,0.2);
    }
    .couple-row {
      display: flex; justify-content: center; align-items: center;
      gap: 28px; position: relative; flex-wrap: wrap;
    }
    .love-badge { font-size: 28px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
    .children-grid {
      margin-top: 36px; display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 18px; justify-items: center;
      border-top: 2px dashed rgba(255,255,240,0.4);
      padding-top: 24px;
    }
    .person-card {
      background: rgba(255,255,255,0.92); backdrop-filter: blur(4px);
      border-radius: 28px; padding: 14px 10px 10px;
      width: 130px; text-align: center; cursor: pointer;
      transition: 0.2s ease; box-shadow: 0 6px 12px rgba(0,0,0,0.1);
      border: 1px solid rgba(255,255,255,0.5);
    }
    .person-card.meninggal { background: #2c2e3a; color: #e0e0e0; border-color: #555; }
    .person-card:hover { transform: translateY(-6px); box-shadow: 0 14px 22px rgba(0,0,0,0.2); }
    .avatar {
      width: 85px; height: 85px; border-radius: 50%; object-fit: cover;
      margin: 0 auto 8px; display: block; border: 3px solid white;
      cursor: pointer;
    }
    .avatar-siluet {
      width: 85px; height: 85px; border-radius: 50%; margin: 0 auto 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 52px; background: #d9e2ec;
      cursor: pointer;
    }
    .avatar-siluet.l { background: #7aa2f7; color: white; }
    .avatar-siluet.p { background: #f29bc4; color: white; }
    .person-name { font-weight: 800; font-size: 1rem; margin-top: 5px; }
    
    /* BREADCRUMB */
    .breadcrumb-area {
      background: rgba(0,0,0,0.5); backdrop-filter: blur(12px);
      border-radius: 32px; padding: 12px 20px; margin: 10px auto;
      width: fit-content; max-width: 90%; text-align: center;
      color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .bread-line {
      font-size: 0.9rem; display: flex; flex-wrap: wrap;
      justify-content: center; align-items: center; gap: 6px; margin: 6px 0;
    }
    .bread-line strong { margin-right: 8px; color: #ffd966; }
    .bread-line span {
      cursor: pointer; color: #ffea9e; font-weight: 600;
      background: rgba(0,0,0,0.3); padding: 4px 12px;
      border-radius: 30px; transition: 0.2s;
    }
    .bread-line span:hover {
      background: rgba(0,0,0,0.5); transform: scale(1.02);
    }
    .bread-arrow { color: rgba(255,255,255,0.5); font-size: 14px; margin: 0 2px; }
    
    /* POPUP DETAIL */
    .popup-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
      z-index: 1000; align-items: center; justify-content: center;
      padding: 20px;
    }
    .popup-container {
      background: white; border-radius: 36px; max-width: 440px;
      width: 100%; max-height: 85vh; overflow-y: auto;
      animation: popFade 0.25s ease;
      box-shadow: 0 30px 50px rgba(0,0,0,0.4);
    }
    .popup-container::-webkit-scrollbar { width: 5px; }
    .popup-container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
    .popup-container::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
    
    @keyframes popFade { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    .popup-header { background: linear-gradient(135deg, #2b3b6e, #1f4a8e); padding: 24px 20px; text-align: center; color: white; border-radius: 36px 36px 0 0; }
    .popup-header img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 4px solid white; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
    .popup-header img:hover { transform: scale(1.05); }
    .popup-header strong { font-size: 1.3rem; display: block; margin-top: 5px; }
    .popup-avatar-lg { width: 110px; height: 110px; border-radius: 50%; background: #cfddee; font-size: 60px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
    .popup-body { padding: 24px; color: #1e2a47; }
    .info-section { margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 12px; }
    .info-title { font-weight: 800; color: #1f4a8e; margin-bottom: 8px; font-size: 1rem; display: flex; align-items: center; gap: 6px; }
    .info-section p { line-height: 1.5; color: #2d3748; }
    
    .popup-footer { padding: 8px 24px 24px; display: flex; flex-direction: column; gap: 12px; }
    .btn-wa { 
      background: #25D366; color: white; border: none; padding: 14px;
      border-radius: 50px; font-weight: 700; font-size: 1rem;
      cursor: pointer; transition: 0.2s; display: flex;
      align-items: center; justify-content: center; gap: 8px;
    }
    .btn-wa:hover { background: #1da15a; transform: scale(1.02); }
    .btn-primary { 
      background: #2c3e66; color: white; border: none; padding: 14px;
      border-radius: 50px; font-weight: 700; font-size: 1rem;
      cursor: pointer; transition: 0.2s; display: flex;
      align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:hover { background: #1f2f50; transform: scale(1.02); }
    .btn-close-popup {
      background: #e2e8f0; color: #4a5568; border: none; padding: 12px;
      border-radius: 50px; font-weight: 600; font-size: 0.95rem;
      cursor: pointer; transition: 0.2s; margin-top: 4px;
    }
    .btn-close-popup:hover { background: #cbd5e1; }
    
    /* MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      z-index: 1100; align-items: center; justify-content: center;
    }
    .modal-card {
      background: white; border-radius: 32px; padding: 28px 24px;
      width: 90%; max-width: 360px; text-align: center;
      animation: modalSlide 0.2s ease;
      box-shadow: 0 25px 45px rgba(0,0,0,0.3);
    }
    @keyframes modalSlide {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .modal-card h3 {
      font-size: 1.6rem; margin-bottom: 20px; color: #1e2a5e;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .modal-card input {
      width: 100%; padding: 14px 18px; border-radius: 60px;
      border: 2px solid #e0e7ff; font-size: 1rem; outline: none;
      transition: 0.2s; margin-bottom: 16px;
    }
    .modal-card input:focus { border-color: #2a3f7e; box-shadow: 0 0 0 3px rgba(42,63,126,0.1); }
    .modal-card button {
      padding: 12px 20px; border-radius: 60px; font-weight: 600;
      cursor: pointer; transition: 0.2s; border: none;
      margin: 4px 0;
    }
    .btn-search { background: #2c3e66; color: white; width: 100%; }
    .btn-search:hover { background: #1f2f50; transform: scale(1.02); }
    .btn-close { background: #e2e8f0; color: #333; width: 100%; margin-top: 8px; }
    .btn-close:hover { background: #cbd5e1; }
    
    .filter-group { text-align: left; margin: 16px 0; }
    .filter-group label {
      display: flex; align-items: center; gap: 10px;
      margin: 12px 0; font-size: 1rem; color: #2d3748;
      cursor: pointer;
    }
    .filter-group input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
    .filter-group input[type="number"] {
      width: 100%; padding: 10px; border-radius: 40px;
      border: 2px solid #e0e7ff; margin-top: 8px;
    }
    .btn-apply { background: #2c3e66; color: white; width: 100%; margin-top: 10px; }
    .btn-reset { background: #f59e0b; color: white; width: 100%; margin-top: 8px; }
    
    .zoom-layer {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      z-index: 1200; align-items: center; justify-content: center; cursor: zoom-out;
    }
    .zoom-layer img { max-width: 92%; max-height: 90%; border-radius: 20px; animation: zoomIn 0.2s ease; }
    @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    
    @media (max-width: 580px) { 
      .person-card { width: 115px; } 
      .avatar, .avatar-siluet { width: 70px; height: 70px; font-size: 42px; } 
    }
  </style>
</head>
<body>

<div class="hero">
  <h1 id="mainTitle">🌳 Silsilah Keluarga</h1>
</div>
<div class="marquee">
  <div class="marquee-track">
    <span>⚠️ Foto ilustrasi AI (bukan asli) — jika ada kesalahan data, hubungi pengelola.</span>
    <span>⚠️ Foto ilustrasi AI (bukan asli) — jika ada kesalahan data, hubungi pengelola.</span>
  </div>
</div>

<div class="toolbar">
  <button class="btn-glass" id="backBtn" style="display:none;">⬅ Kembali</button>
  <button class="btn-glass" id="searchBtn">🔍 Cari Anggota</button>
  <button class="btn-glass" id="filterBtn">📌 Filter & Generasi</button>
</div>

<div id="treeContainer" class="tree"></div>

<!-- MODAL SEARCH -->
<div id="searchModal" class="modal-overlay">
  <div class="modal-card">
    <h3>🔍 Cari Anggota</h3>
    <input type="text" id="searchInput" placeholder="Ketik nama lengkap..." autocomplete="off">
    <button id="searchSubmitBtn" class="btn-search">Cari Sekarang</button>
    <button id="closeSearchBtn" class="btn-close">Tutup</button>
  </div>
</div>

<!-- MODAL FILTER -->
<div id="filterModal" class="modal-overlay">
  <div class="modal-card">
    <h3>🎛️ Filter Silsilah</h3>
    <div class="filter-group">
      <label><input type="checkbox" id="filterHidup"> ✅ Hanya yang masih hidup</label>
      <label><input type="checkbox" id="filterLaki"> 👨 Laki-laki</label>
      <label><input type="checkbox" id="filterPerempuan"> 👩 Perempuan</label>
      <label>📊 Generasi ke-<input type="number" id="filterGenerasi" placeholder="contoh: 2" style="width:80px; display:inline-block; margin-left:8px;"></label>
    </div>
    <button id="applyFilterBtn" class="btn-apply">Terapkan Filter</button>
    <button id="resetFilterBtn" class="btn-reset">Reset Semua</button>
    <button id="closeFilterBtn" class="btn-close" style="margin-top:8px;">Tutup</button>
  </div>
</div>

<!-- POPUP DETAIL -->
<div id="globalPopup" class="popup-overlay">
  <div class="popup-container">
    <div class="popup-header" id="popupHeader"></div>
    <div class="popup-body" id="popupBody"></div>
    <div class="popup-footer">
      <button id="popupWaBtn" class="btn-wa">💬 WhatsApp</button>
      <button id="popupSilsilahBtn" class="btn-primary">📖 Lihat Silsilah Lengkap</button>
      <button id="closePopupBtn" class="btn-close-popup">Tutup</button>
    </div>
  </div>
</div>

<!-- ZOOM LAYER -->
<div id="zoomLayer" class="zoom-layer" onclick="closeZoom()">
  <img id="zoomImage" src="" onclick="event.stopPropagation()">
</div>

<script>
  let globalFamily = [];
  const urlParams = new URLSearchParams(window.location.search);
  const detailId = urlParams.get('id');

  function shortName(fullname) {
    if (!fullname) return "?";
    let clean = fullname.replace(/\./g, '');
    let parts = clean.split(' ');
    const gelar = ['h','hj','dr','drs','ir','kh','ust','habib','r','s','m'];
    while(parts.length > 1 && gelar.includes(parts[0].toLowerCase())) parts.shift();
    return parts[0];
  }

  // ========== RENDER UTAMA ==========
  function renderMainTree() {
    const container = document.getElementById('treeContainer');
    container.innerHTML = '';
    if (!globalFamily.length) return;

    let roots = globalFamily.filter(p => p.generasi === "1" && p.jenis_kelamin === "L");
    roots.sort((a,b) => (parseInt(a.tanggal_lahir)||9999) - (parseInt(b.tanggal_lahir)||9999));
    
    for (let root of roots) {
      let spouseNames = root.pasangan ? root.pasangan.split('|').map(s=>s.trim()) : [];
      let spouses = globalFamily.filter(s => spouseNames.includes(s.nama));
      
      if (spouses.length === 0) {
        createFamilyBlock(root, null, container);
      } else {
        for (let spouse of spouses) {
          createFamilyBlock(root, spouse, container);
        }
      }
    }
  }

  function createFamilyBlock(root, spouse, container) {
    const card = document.createElement('div');
    card.className = 'family-card';
    card.setAttribute('data-root', root.id);
    
    const coupleDiv = document.createElement('div');
    coupleDiv.className = 'couple-row';
    coupleDiv.appendChild(createPersonEl(root, false));
    if (spouse) {
      const love = document.createElement('span');
      love.className = 'love-badge';
      love.innerHTML = '❤️';
      coupleDiv.appendChild(love);
      coupleDiv.appendChild(createPersonEl(spouse, false));
    }
    card.appendChild(coupleDiv);
    
    let children = [];
    if (spouse) {
      children = globalFamily.filter(c => 
        (c.ayah === root.nama && c.ibu === spouse.nama) || 
        (c.ibu === root.nama && c.ayah === spouse.nama)
      );
    } else {
      children = globalFamily.filter(c => c.ayah === root.nama || c.ibu === root.nama);
    }
    children.sort((a,b) => (parseInt(a.tanggal_lahir)||9999) - (parseInt(b.tanggal_lahir)||9999));
    if (children.length) {
      const grid = document.createElement('div');
      grid.className = 'children-grid';
      children.forEach(ch => grid.appendChild(createPersonEl(ch, false)));
      card.appendChild(grid);
    }
    container.appendChild(card);
  }

  // ========== DETAIL MODE ==========
  function renderDetailMode(personId) {
    const container = document.getElementById('treeContainer');
    container.innerHTML = '';
    const person = globalFamily.find(p => p.id === personId);
    if (!person) return;
    
    document.getElementById('mainTitle').innerHTML = `📌 Silsilah: ${shortName(person.nama)}`;
    document.getElementById('backBtn').style.display = 'inline-flex';
    
    const card = document.createElement('div');
    card.className = 'family-card';
    const coupleDiv = document.createElement('div');
    coupleDiv.className = 'couple-row';
    coupleDiv.appendChild(createPersonEl(person, false));
    
    let spouseNames = person.pasangan ? person.pasangan.split('|').map(s=>s.trim()) : [];
    let spouses = globalFamily.filter(s => spouseNames.includes(s.nama));
    if (spouses.length) {
      spouses.forEach(sp => {
        const loveSpan = document.createElement('span');
        loveSpan.className = 'love-badge';
        loveSpan.innerHTML = '❤️';
        coupleDiv.appendChild(loveSpan);
        coupleDiv.appendChild(createPersonEl(sp, false));
      });
    }
    card.appendChild(coupleDiv);
    
    let children = globalFamily.filter(c => c.ayah === person.nama || c.ibu === person.nama);
    children.sort((a,b) => (parseInt(a.tanggal_lahir)||9999) - (parseInt(b.tanggal_lahir)||9999));
    if (children.length) {
      const grid = document.createElement('div');
      grid.className = 'children-grid';
      children.forEach(ch => grid.appendChild(createPersonEl(ch, false)));
      card.appendChild(grid);
    }
    container.appendChild(card);
    showBreadcrumb(person);
  }

  /**
   * BREADCRUMB YANG BENAR:
   * - Garis Ayah: orang → ayah → ayah dari ayah → ... (lurus via ayah)
   * - Garis Ibu: orang → ibu → ayah dari ibu → ayah dari ayah ibu → ... (lurus via ayah dari garis ibu)
   */
  function showBreadcrumb(person) {
    const old = document.querySelector('.breadcrumb-area');
    if (old) old.remove();
    
    const breadDiv = document.createElement('div');
    breadDiv.className = 'breadcrumb-area';
    
    // ===== GARIS AYAH =====
    let ayahPath = [];
    let currentAyah = person;
    while (currentAyah) {
      ayahPath.unshift({ id: currentAyah.id, nama: currentAyah.nama });
      let ayahObj = globalFamily.find(p => p.nama === currentAyah.ayah);
      if (!ayahObj) break;
      currentAyah = ayahObj;
    }
    
    // ===== GARIS IBU =====
    // Path: orang → ibu → ayah dari ibu → ayah dari ayah ibu → ...
    let ibuPath = [];
    
    // Step 1: mulai dari orang
    let current = person;
    
    // Step 2: tambahkan ibu (jika ada)
    if (current.ibu) {
      let ibuObj = globalFamily.find(p => p.nama === current.ibu);
      if (ibuObj) {
        ibuPath.push(ibuObj);
        current = ibuObj;
      } else {
        ibuPath.push({ id: '0', nama: '?' });
      }
    }
    
    // Step 3: selanjutnya telusuri AYAH dari current (bukan ibu lagi)
    while (current) {
      let ayahObj = globalFamily.find(p => p.nama === current.ayah);
      if (!ayahObj) break;
      ibuPath.push(ayahObj);
      current = ayahObj;
    }
    
    // Balik agar dari yang paling tua ke yang paling muda (orang ada di akhir)
    // Tapi kita ingin tampil: Orang → Ibu → AyahIbu → AyahAyahIbu → ...
    // Jadi tidak perlu dibalik, urutan sudah benar dari bawah ke atas
    // Kita buat array final: [orang, ibu, ayah1, ayah2, ...]
    let finalIbuPath = [person];
    finalIbuPath.push(...ibuPath);
    
    // Render Garis Ayah
    const ayahHtml = ayahPath.map((p, idx) => {
      if (idx === ayahPath.length - 1) {
        return `<span data-id="${p.id}">${shortName(p.nama)}</span>`;
      }
      return `<span data-id="${p.id}">${shortName(p.nama)}</span><span class="bread-arrow"> → </span>`;
    }).join('');
    
    // Render Garis Ibu
    const ibuHtml = finalIbuPath.map((p, idx) => {
      if (idx === finalIbuPath.length - 1) {
        return `<span data-id="${p.id}">${shortName(p.nama)}</span>`;
      }
      return `<span data-id="${p.id}">${shortName(p.nama)}</span><span class="bread-arrow"> → </span>`;
    }).join('');
    
    breadDiv.innerHTML = `
      <div class="bread-line"><strong>👨‍🦳 Garis Ayah:</strong> ${ayahHtml}</div>
      <div class="bread-line"><strong>👩‍🦳 Garis Ibu:</strong> ${ibuHtml}</div>
    `;
    
    const hero = document.querySelector('.hero');
    hero.insertAdjacentElement('afterend', breadDiv);
    
    breadDiv.querySelectorAll('span[data-id]').forEach(span => {
      span.addEventListener('click', (e) => {
        e.stopPropagation();
        let id = span.getAttribute('data-id');
        if (id && id !== '0') window.location.href = `?id=${id}`;
      });
    });
  }

  function createPersonEl(p, disableZoomOnClick = false) {
    const isDead = (p.status || '').toLowerCase().includes('meninggal');
    const card = document.createElement('div');
    card.className = `person-card ${isDead ? 'meninggal' : ''}`;
    card.setAttribute('data-id', p.id);
    
    let avatarHtml = '';
    if (p.foto && p.foto !== '') {
      avatarHtml = `<img class="avatar" src="${p.foto}" onclick="event.stopPropagation(); openPopupById('${p.id}')">`;
    } else {
      const genderClass = p.jenis_kelamin === 'L' ? 'l' : 'p';
      const icon = p.jenis_kelamin === 'L' ? '👨' : '👩';
      avatarHtml = `<div class="avatar-siluet ${genderClass}" onclick="event.stopPropagation(); openPopupById('${p.id}')">${icon}</div>`;
    }
    card.innerHTML = `${avatarHtml}<div class="person-name">${shortName(p.nama)}</div>`;
    card.querySelector('.person-name').onclick = (e) => { e.stopPropagation(); openPopupById(p.id); };
    return card;
  }

  // Popup Detail
  function openPopupById(id) {
    const p = globalFamily.find(x => x.id === id);
    if (!p) return;
    
    document.body.classList.add('lock');
    const headerDiv = document.getElementById('popupHeader');
    const bodyDiv = document.getElementById('popupBody');
    
    let headerContent = '';
    if (p.foto && p.foto !== '') {
      headerContent = `<img src="${p.foto}" onclick="event.stopPropagation(); openZoom('${p.foto}')"><br><strong>${p.nama}</strong>`;
    } else {
      const icon = p.jenis_kelamin === 'L' ? '👨' : '👩';
      headerContent = `<div class="popup-avatar-lg">${icon}</div><strong>${p.nama}</strong>`;
    }
    headerDiv.innerHTML = headerContent;
    
    bodyDiv.innerHTML = `
      <div class="info-section"><div class="info-title">🧬 Biodata</div><p>Jenis Kelamin: ${p.jenis_kelamin||'-'}<br>Status: ${p.status||'-'}<br>Pekerjaan: ${p.pekerjaan||'-'}</p></div>
      <div class="info-section"><div class="info-title">👨‍👩‍👧 Keluarga</div><p>Ayah: ${p.ayah||'-'}<br>Ibu: ${p.ibu||'-'}<br>Pasangan: ${p.pasangan||'-'}<br>Jumlah Anak: ${p.jumlah_anak||'-'}</p></div>
      <div class="info-section"><div class="info-title">📍 Lahir & Domisili</div><p>Tahun: ${p.tanggal_lahir||'-'} / ${p.alamat_lahir||'-'}<br>Domisili: ${p.domisili||'-'}</p></div>
      <div class="info-section"><div class="info-title">📞 Kontak</div><p>WA: ${p.wa||'-'}</p></div>
    `;
    
    document.getElementById('popupWaBtn').onclick = () => { 
      if(p.wa) window.open(`https://wa.me/${p.wa.replace(/\D/g,'')}`); 
      else alert('No WhatsApp tidak tersedia'); 
    };
    document.getElementById('popupSilsilahBtn').onclick = () => { 
      closePopup(); 
      window.location.href = `?id=${p.id}`; 
    };
    document.getElementById('globalPopup').style.display = 'flex';
  }
  
  function closePopup() { 
    document.getElementById('globalPopup').style.display = 'none'; 
    document.body.classList.remove('lock');
  }
  
  function openZoom(src) { 
    const z = document.getElementById('zoomLayer'); 
    document.getElementById('zoomImage').src = src; 
    z.style.display = 'flex'; 
    document.body.classList.add('lock');
  }
  
  function closeZoom() { 
    document.getElementById('zoomLayer').style.display = 'none'; 
    document.body.classList.remove('lock');
  }
  
  // Filter functions
  function applyFilters() {
    const hidup = document.getElementById('filterHidup').checked;
    const laki = document.getElementById('filterLaki').checked;
    const perempuan = document.getElementById('filterPerempuan').checked;
    const gen = document.getElementById('filterGenerasi').value;
    
    document.querySelectorAll('.person-card').forEach(card => {
      let id = card.getAttribute('data-id');
      let data = globalFamily.find(x => x.id === id);
      if (!data) return;
      let show = true;
      if (hidup && (data.status||'').toLowerCase().includes('meninggal')) show = false;
      if (laki && !perempuan && data.jenis_kelamin !== 'L') show = false;
      if (perempuan && !laki && data.jenis_kelamin !== 'P') show = false;
      if (gen && data.generasi !== gen) show = false;
      card.style.display = show ? 'block' : 'none';
    });
    
    document.querySelectorAll('.family-card').forEach(card => {
      let visible = card.querySelectorAll('.person-card[style="display: block"], .person-card:not([style*="display"])');
      card.style.display = visible.length ? 'block' : 'none';
    });
  }
  
  function resetFilters() {
    document.getElementById('filterHidup').checked = false;
    document.getElementById('filterLaki').checked = false;
    document.getElementById('filterPerempuan').checked = false;
    document.getElementById('filterGenerasi').value = '';
    document.querySelectorAll('.person-card').forEach(c => c.style.display = 'block');
    document.querySelectorAll('.family-card').forEach(c => c.style.display = 'block');
  }
  
  // Search & Modal helpers
  function openSearchModal() { document.getElementById('searchModal').style.display = 'flex'; document.body.classList.add('lock'); }
  function closeSearchModal() { document.getElementById('searchModal').style.display = 'none'; document.body.classList.remove('lock'); }
  function openFilterModal() { document.getElementById('filterModal').style.display = 'flex'; document.body.classList.add('lock'); }
  function closeFilterModal() { document.getElementById('filterModal').style.display = 'none'; document.body.classList.remove('lock'); }
  
  function searchAndGo() {
    let kw = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!kw) { alert('Masukkan nama terlebih dahulu'); return; }
    let found = globalFamily.find(p => p.nama.toLowerCase().includes(kw));
    if (found) { 
      closeSearchModal(); 
      window.location.href = `?id=${found.id}`; 
    } else { 
      alert('Nama tidak ditemukan dalam silsilah'); 
    }
  }
  
  // Close modal ketika klik di luar area
  document.getElementById('searchModal').addEventListener('click', function(e) {
    if (e.target === this) closeSearchModal();
  });
  document.getElementById('filterModal').addEventListener('click', function(e) {
    if (e.target === this) closeFilterModal();
  });
  document.getElementById('globalPopup').addEventListener('click', function(e) {
    if (e.target === this) closePopup();
  });
  
  // ========== INITIAL LOAD ==========
  fetch('data.json?v='+Date.now())
    .then(res => res.json())
    .then(data => {
      globalFamily = data;
      if (detailId) {
        renderDetailMode(detailId);
      } else {
        renderMainTree();
      }
      
      document.getElementById('backBtn').onclick = () => window.location.href = '.';
      document.getElementById('searchBtn').onclick = openSearchModal;
      document.getElementById('filterBtn').onclick = openFilterModal;
      document.getElementById('closeSearchBtn').onclick = closeSearchModal;
      document.getElementById('closeFilterBtn').onclick = closeFilterModal;
      document.getElementById('searchSubmitBtn').onclick = searchAndGo;
      document.getElementById('searchInput').addEventListener('keypress', e => { if(e.key === 'Enter') searchAndGo(); });
      document.getElementById('applyFilterBtn').onclick = () => { applyFilters(); closeFilterModal(); };
      document.getElementById('resetFilterBtn').onclick = () => { resetFilters(); closeFilterModal(); };
      document.getElementById('closePopupBtn').onclick = closePopup;
    })
    .catch(e => console.error('Gagal load JSON:', e));
</script>
</body>
</html>
