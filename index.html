<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silsilah Keluarga</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin: 0;
}

input {
  padding: 10px;
  width: 80%;
  max-width: 300px;
  margin: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* TREE */
.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* BLOK */
.family-block {
  margin-bottom: 40px;
}

/* COUPLE */
.couple {
  display: flex;
  gap: 20px;
  justify-content: center;
  position: relative;
}

.couple::after {
  content: '';
  position: absolute;
  bottom: -30px;
  left: 50%;
  width: 2px;
  height: 30px;
  background: black;
  transform: translateX(-50%);
}

/* CHILDREN */
.children {
  margin-top: 40px;
  width: 100%;
  max-width: 700px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  position: relative;
}

.children::before {
  content: '';
  position: absolute;
  top: -15px;
  left: 10%;
  right: 10%;
  height: 2px;
  background: black;
}

/* CARD */
.person {
  border: 1px solid black;
  border-radius: 12px;
  padding: 15px;
  background: white;
  transition: 0.2s;
}

.person.highlight {
  background: yellow;
}

.person.meninggal {
  background: black;
  color: white;
}

.person img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  cursor: pointer;
}

.name {
  margin-top: 8px;
  font-weight: bold;
  cursor: pointer;
}

/* SEARCH RESULT */
.result {
  background: white;
  border: 1px solid #ccc;
  max-width: 300px;
  margin: auto;
  text-align: left;
}

.result div {
  padding: 8px;
  cursor: pointer;
}

.result div:hover {
  background: #eee;
}
</style>
</head>

<body>

<h2>Silsilah Keluarga</h2>

<input type="text" id="search" placeholder="Cari nama...">
<div class="result" id="result"></div>

<div class="tree" id="tree"></div>
