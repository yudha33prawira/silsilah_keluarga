<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Silsilah</title>
<div class="running-text">
  <div class="running-content">
    ⚠️ Foto merupakan hasil dari AI dan bukan foto asli, jika ada perbedaan harap dimaklumi, dan untuk data yang belum terisi atau ada kesalahan silahkan kirim ke pengedit untuk perbaikan datanya.
  </div>
</div>

<style>

/* RUNNING TEXT */
.running-text {
  width: 100%;
  overflow: hidden;
  margin-top: 10px;

  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(8px);

  border-top: 1px solid rgba(255,255,255,0.2);
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

.running-content {
  display: inline-block;
  white-space: nowrap;

  color: #fff;
  font-size: 14px;
  padding: 8px 0;

  animation: runningMove 25s linear infinite;
letter-spacing: 0.5px;
}

/* animasi jalan */
@keyframes runningMove {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

  .running-text:hover .running-content {
  animation-play-state: paused;
}
  
/* ===== FIX TOMBOL DI POPUP ===== */
.search-box button {
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color: white;
  width: 100%;
  margin-top: 5px;
}

.search-box button:last-child {
  background: #777; /* tombol tutup */
}

body {
  font-family: Arial;
  margin: 0;
  text-align: center;

  background: linear-gradient(-45deg, #6a11cb, #2575fc, #00c6ff, #6a11cb);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
}

/* LOCK BODY */
body.lock {
  overflow: hidden;
}

h2 {
  margin: 15px auto;
  padding: 10px 20px;
  display: inline-block;

  color: white;
  font-size: 22px;
  font-weight: bold;

  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(8px);

  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

/* BREADCRUMB */
.breadcrumb {
  margin: 10px auto;
  padding: 10px 15px;
  display: inline-block;

  font-size: 14px;
  color: white;

  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(8px);

  border-radius: 10px;
}

.breadcrumb span {
  cursor: pointer;
  color: #ffd369;
  font-weight: bold;
}

/* TOOLBAR */
.toolbar {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin: 15px 0;
}

button {
  padding: 10px 18px;
  border: none;
  border-radius: 12px;
  cursor: pointer;

  background: rgba(255,255,255,0.2);
  color: white;
  backdrop-filter: blur(10px);

  transition: 0.3s;
}

.toolbar button:hover {
  background: rgba(255,255,255,0.35);
  transform: scale(1.05);
}

.search-btn {
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color: white;
  cursor: pointer;
}

/* TREE */
.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.family-block { margin-bottom: 40px; }

.couple {
  display: flex;
  gap: 40px;
  position: relative;
}

.love-icon {
  position: absolute;
  top: 40px;
  left: 50%;
  transform: translateX(-50%);
}

/* garis */
.couple::after {
  content: '';
  position: absolute;
  bottom: -30px;
  left: 50%;
  width: 2px;
  height: 30px;
  background: black;
  transform: translateX(-50%);
}

/* CHILDREN */
.children {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 15px;
}

/* PERSON */

.person, .popup-box, .search-box {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.3);
}

.person {
  transition: 0.3s;
}

.person:hover {
  transform: translateY(-5px) scale(1.05);
}

.person {
  border: 1px solid black;
  border-radius: 12px;
  padding: 10px;
  background: white;
}

.person.meninggal {
  background: black;
  color: white;
}

.person {
  color: #222;
}

/* FOTO */
.person img,.siluet {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  cursor: pointer;
}

.siluet {
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

.siluet.l { background:#2193b0; color:white; }
.siluet.p { background:#ff758c; color:white; }

.name {
  font-weight: bold;
  margin-top: 5px;
  cursor: pointer;
}

/* ===== POPUP FIX ===== */
.search-popup, .popup {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.5);
}

.search-box, .popup-content {
  background: white;
  padding: 20px;
  margin: 100px auto;
  width: 90%;
  max-width: 320px;
  border-radius: 10px;
}

@media(max-width:600px){
  .children { grid-template-columns: 1fr; }
}

.popup {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:999;

  overflow-y:auto; /* 🔥 ini kunci scroll */
}

.popup-box {
  background:white;
  margin:40px auto;
  width:90%;
  max-width:400px;
  border-radius:15px;
  overflow:hidden;
  text-align:left;
}

.popup-header {
  text-align:center;
  padding:20px;
  background:linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;
}

.popup-header img,
.popup-avatar {
  width:100px;
  height:100px;
  border-radius:50%;
  margin-bottom:10px;
}

.popup-avatar {
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  background:white;
  color:black;
}

.popup-body { padding:15px; }

.section { margin-bottom:15px; }

.section-title {
  font-weight:bold;
  margin-bottom:5px;
  color:#2575fc;
}

.popup-footer {
  padding:15px;
  text-align:center;
}

.btn-wa {
  background:#25D366;
  color:white;
}

/* ANIMASI BACKGROUND */
@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

body {
  color: white;
}

h2 {
  text-shadow: 0 0 10px rgba(255,255,255,0.5);
}

.header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  margin-top: 15px;
}

h2 {
  background: rgba(0,0,0,0.25);
  padding: 10px 20px;
  border-radius: 12px;
  color: white;
  backdrop-filter: blur(10px);
}

.breadcrumb {
  background: rgba(0,0,0,0.25);
  padding: 8px 15px;
  border-radius: 12px;
  color: #ffd54f;
  font-weight: bold;
  backdrop-filter: blur(10px);
}

button:active {
  transform: scale(0.95);
}

/* ===== FIX TOMBOL POPUP DETAIL ===== */
.popup-footer button {
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color: white;
  width: 100%;
  margin-top: 5px;
}

/* tombol WA tetap hijau */
.popup-footer .btn-wa {
  background: #25D366;
}

/* tombol tutup beda warna */
.popup-footer button:last-child {
  background: #777;
}

.popup-footer button {
  font-weight: bold;
}

.popup-box {
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  animation: fadeIn 0.3s ease;
}

/* ===== FIX TEXT POPUP ===== */
.popup-box {
  color: #222; /* 🔥 ubah jadi gelap */
}

.popup-body {
  color: #222;
}

.section-title {
  color: #2575fc; /* tetap biru biar cantik */
}

.popup-body {
  line-height: 1.6;
}

.section {
  border-bottom: 1px solid #eee;
  padding-bottom: 8px;
}

/* ===== FIX HOVER BUTTON POPUP ===== */
.search-box button:hover {
  background: linear-gradient(135deg,#6a11cb,#2575fc) !important;
  transform: scale(1.05);
  opacity: 1 !important;
}

.search-box button:last-child:hover {
  background: #777 !important;
}

/* ===== WARNA JUDUL & BREADCRUMB ===== */

h2 {
  color: #ffffff !important;
}

.breadcrumb {
  color: #ffffff !important;
}

/* teks label */
.breadcrumb b {
  color: #ffffff !important;
}

/* nama orang (link breadcrumb) */
.breadcrumb span {
  color: #4fc3f7 !important;
  text-shadow: 0 0 5px rgba(0,0,0,0.6);
}

/* biar tanda > juga putih */
.breadcrumb {
  text-shadow: 0 0 5px rgba(0,0,0,0.6);
}

</style>
</head>

<body>

<div class="header">
  <h2 id="judul">Detail Silsilah</h2>
  <div class="breadcrumb" id="breadcrumb"></div>
</div>

<div class="toolbar">
  <button onclick="history.back()">⬅ Kembali</button>
  <button onclick="openSearch()" class="search-btn">🔍 Cari</button>
</div>

<div class="tree" id="tree"></div>

<!-- SEARCH -->
<div id="searchPopup" class="search-popup" onclick="closeSearch()">
  <div class="search-box" onclick="event.stopPropagation()">
    
    <input type="text" id="searchInput" placeholder="Cari nama..." onkeyup="searchName(event)">
    <br><br>

    <button onclick="searchName()">Cari</button>
    <button onclick="closeSearch()">Tutup</button>

  </div>
</div>

<!-- POPUP -->
<div id="popup" class="popup" onclick="closePopup(event)">
  <div class="popup-box" onclick="event.stopPropagation()">

    <div class="popup-header" id="popupHeader"></div>
    <div class="popup-body" id="popupBody"></div>

    <div class="popup-footer">
      <button id="btnWA" class="btn-wa">📞 WhatsApp</button><br>
      <button id="btnDetail">📄 Lihat Silsilah</button><br><br>
      <button onclick="closePopup()">Tutup</button>
    </div>

  </div>
</div>

<script>
let globalData=[];
const id = new URLSearchParams(window.location.search).get('id');

/* LOAD */
fetch('data.json?v='+Date.now())
.then(r=>r.json())
.then(data=>{
  globalData=data;
  init(data);
});

/* ===== NAMA TANPA GELAR ===== */
function shortName(nama){
  if(!nama) return "-";

  // hapus titik (S.M.R jadi SMR)
  nama = nama.replace(/\./g,'');

  const gelar = [
    "h","hj","dr","drs","ir","kh","ust","habib","r"
  ];

  let parts = nama.split(" ");

  while(parts.length>1 && gelar.includes(parts[0].toLowerCase())){
    parts.shift();
  }

  return parts[0];
}

/* INIT */
function init(data){
  const root=data.find(p=>p.id===id);
  if(!root) return;

  document.getElementById("judul").innerText="Silsilah "+shortName(root.nama);

  buildBreadcrumb(root,data);

  let pasanganList=[];
  if(root.pasangan){
    let list=root.pasangan.split("|").map(x=>x.trim());
    pasanganList=data.filter(x=>list.includes(x.nama));
  }

  if(!pasanganList.length) createFamilyBlock(root,null);
  else pasanganList.forEach(p=>createFamilyBlock(root,p));
}

/* FAMILY */
function createFamilyBlock(root,pasangan){
  const tree=document.getElementById("tree");

  const block=document.createElement("div");
  block.className="family-block";

  const couple=document.createElement("div");
  couple.className="couple";

  couple.appendChild(createPerson(root));

  if(pasangan){
    const love=document.createElement("div");
    love.className="love-icon";
    love.innerHTML="❤️";
    couple.appendChild(love);
    couple.appendChild(createPerson(pasangan));
  }

  block.appendChild(couple);

  let children=globalData.filter(x=>
    (x.ayah===root.nama && pasangan && x.ibu===pasangan.nama) ||
    (x.ibu===root.nama && pasangan && x.ayah===pasangan.nama)
  );

  children.sort((a,b)=>
    parseInt(a.tanggal_lahir||9999) - parseInt(b.tanggal_lahir||9999)
  );

  if(children.length){
    const box=document.createElement("div");
    box.className="children";
    children.forEach(c=>box.appendChild(createPerson(c)));
    block.appendChild(box);
  }

  tree.appendChild(block);
}

/* PERSON */
function createPerson(p){
  const isMeninggal=(p.status||"").toLowerCase().includes("meninggal");

  const div=document.createElement("div");
  div.className="person "+(isMeninggal?"meninggal":"");

  let foto = p.foto
    ? `<img src="${p.foto}" onclick="openPopup('${p.id}')">`
    : `<div class="siluet ${p.jenis_kelamin==='L'?'l':'p'}" onclick="openPopup('${p.id}')">${p.jenis_kelamin==='L'?'👨':'👩'}</div>`;

  div.innerHTML = `
    ${foto}
    <div class="name" onclick="goDetail('${p.id}')">${shortName(p.nama)}</div>
  `;

  return div;
}

/* POPUP */
function val(v){ return v ? v : "-"; }

function openPopup(id){
  const p=globalData.find(x=>x.id===id);
  if(!p) return;

  document.getElementById("popup").style.display="block";
  document.body.classList.add("lock");

  let header = p.foto
    ? `<img src="${p.foto}"><br>${p.nama}`
    : `<div class="popup-avatar">${p.jenis_kelamin==='L'?'👨':'👩'}</div>${p.nama}`;

  document.getElementById("popupHeader").innerHTML=header;

  document.getElementById("popupBody").innerHTML=`
    <div class="section">
      <div class="section-title">👤 Biodata</div>
      Jenis Kelamin: ${val(p.jenis_kelamin)}<br>
      Status: ${val(p.status)}<br>
      Pekerjaan: ${val(p.pekerjaan)}
    </div>

    <div class="section">
      <div class="section-title">👨‍👩‍👧 Keluarga</div>
      Ayah: ${val(p.ayah)}<br>
      Ibu: ${val(p.ibu)}<br>
      Pasangan: ${val(p.pasangan)}<br>
      Anak: ${val(p.jumlah_anak)}
    </div>

    <div class="section">
      <div class="section-title">📍 Lahir</div>
      Tahun: ${val(p.tanggal_lahir)}<br>
      Tempat: ${val(p.alamat_lahir)}<br>
      Domisili: ${val(p.domisili)}
    </div>

    <div class="section">
      <div class="section-title">📞 Kontak</div>
      WA: ${val(p.wa)}
    </div>
  `;

  document.getElementById("btnWA").onclick=()=>{
    if(p.wa) window.open("https://wa.me/"+p.wa);
    else alert("No WA tidak tersedia");
  };

  document.getElementById("btnDetail").onclick=()=>goDetail(p.id);
}

function closePopup(){
  document.getElementById("popup").style.display="none";
  document.body.classList.remove("lock");
}

function goDetail(id){
  window.location.href="detail.html?id="+id;
}

/* SEARCH */
function openSearch() {
  document.getElementById("searchPopup").style.display = "block";
}

function closeSearch() {
  document.getElementById("searchPopup").style.display = "none";
}

function searchName(e) {
  if (e && e.key !== "Enter") return;

  let v = document.getElementById("searchInput").value.toLowerCase();

  if(!v){
    alert("Masukkan nama dulu");
    return;
  }

  let p = globalData.find(x => x.nama.toLowerCase().includes(v));

  if (p){
    closeSearch(); // 🔥 tutup popup dulu
    setTimeout(()=>{
      goDetail(p.id);
    },200);
  } else {
    alert("Tidak ditemukan");
  }
}

/* BREADCRUMB */
function buildBreadcrumb(person){

  const box=document.getElementById("breadcrumb");
  box.innerHTML="";

  // ===== GARIS AYAH =====
  let ayahPath=[];
  let current=person;

  while(current){
  ayahPath.unshift(current);

  let next = globalData.find(x=>x.nama===current.ayah);

  if(!next){
    ayahPath.unshift({ id:"0", nama:"Unknow" });
    break;
  }

  current = next;
}

  // ===== GARIS IBU =====
  function getGarisIbu(id){

  let result = [];
  let current = globalData.find(x=>x.id===id);

  let visited = new Set();
  let step = 0;

  while(current){

    if(visited.has(current.id)) break;
    visited.add(current.id);

    // 🔥 STEP 0 & 1 → tampil normal (anak + ibu)
    if(step <= 1){
      result.unshift(current);

      let ibu = globalData.find(x=>x.nama === current.ibu);

      if(!ibu){
        result.unshift({ id:"0", nama:"Unknow" });
        break;
      }

      current = ibu;
      step++;
      continue;
    }

    // 🔥 MULAI STEP 2 (nenek) → ambil suami
    if(step === 2 && current.jenis_kelamin === "P"){

      let suami = globalData.find(x =>
        current.pasangan && current.pasangan.includes(x.nama)
      );

      if(suami){
        result.unshift(suami);
        current = suami; // lanjut dari suami
        step++;
        continue;
      }
    }

    // 🔥 SELANJUTNYA → jalur ayah (ANTI DOBEL)
    if(!result.length || result[0].id !== current.id){
    result.unshift(current);
}

    let ayah = globalData.find(x=>x.nama === current.ayah);

    if(!ayah){
      result.unshift({ id:"0", nama:"Unknow" });
      break;
    }

    current = ayah;
    step++;
  }

  return result;
}

const ibuPath = getGarisIbu(person.id);

  // ===== RENDER =====
  box.innerHTML += "<div><b>👨 Garis Ayah:</b> ";
  ayahPath.forEach((p,i)=>{
    box.innerHTML += `<span onclick="goDetail('${p.id}')">${shortName(p.nama)}</span>`;
    if(i<ayahPath.length-1) box.innerHTML += " > ";
  });
  box.innerHTML += "</div>";

  box.innerHTML += "<div style='margin-top:5px'><b>👩 Garis Ibu:</b> ";
  ibuPath.forEach((p,i)=>{
    box.innerHTML += `<span onclick="goDetail('${p.id}')">${shortName(p.nama)}</span>`;
    if(i<ibuPath.length-1) box.innerHTML += " > ";
  });
  box.innerHTML += "</div>";
}

</script>

</body>
</html>
