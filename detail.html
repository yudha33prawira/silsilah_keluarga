<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Detail Keluarga</title>
</head>

<body>

<h2 id="nama"></h2>
<div id="info"></div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get('id');

fetch('data.json')
  .then(res => res.json())
  .then(data => {
    const p = data.find(x => x.id == id);

    if (p) {
      document.getElementById("nama").innerText = p.nama;

      document.getElementById("info").innerHTML = `
        Lahir: ${p.tanggal_lahir}<br>
        Alamat: ${p.alamat_lahir}<br>
        Domisili: ${p.domisili}<br>
        Pasangan: ${p.pasangan}<br>
        Anak: ${p.jumlah_anak}<br>
        Status: ${p.status}<br>
        WA: ${p.wa}<br>
        Pekerjaan: ${p.pekerjaan}
      `;
    }
  });
</script>

</body>
</html>
