<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Silsilah</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
  text-align: center;
}

h2 { margin: 10px; }

.breadcrumb {
  margin-bottom: 10px;
  font-size: 14px;
}

.breadcrumb span {
  cursor: pointer;
  color: blue;
}

/* TOOLBAR */
.toolbar {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 10px 0;
}

.search-btn {
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color: white;
  cursor: pointer;
}

/* TREE */
.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.family-block {
  margin-bottom: 40px;
}

.couple {
  display: flex;
  gap: 40px;
  justify-content: center;
  position: relative;
}

/* ❤️ LOVE ICON */
.love-icon {
  position: absolute;
  top: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 22px;
}

/* garis turun */
.couple::after {
  content: '';
  position: absolute;
  bottom: -30px;
  left: 50%;
  width: 2px;
  height: 30px;
  background: black;
  transform: translateX(-50%);
}

.children {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 15px;
}

.person {
  border: 1px solid black;
  border-radius: 12px;
  padding: 10px;
  background: white;
}

.person.meninggal {
  background: black;
  color: white;
}

.person img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  cursor: pointer;
}

.name {
  font-weight: bold;
  margin-top: 5px;
  cursor: pointer;
}

.name.disabled {
  color: gray;
}

/* POPUP */
.search-popup, .popup {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.5);
}

.search-box, .popup-content {
  background: white;
  padding: 20px;
  margin: 100px auto;
  width: 90%;
  max-width: 320px;
  border-radius: 10px;
}

@media(max-width:600px){
  .children { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<h2 id="judul">Silsilah</h2>

<div class="breadcrumb" id="breadcrumb"></div>

<div class="toolbar">
  <button onclick="history.back()">⬅ Kembali</button>
  <button onclick="openSearch()" class="search-btn">🔍 Cari</button>
</div>

<div class="tree" id="tree"></div>

<!-- SEARCH -->
<div id="searchPopup" class="search-popup">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Cari nama..." onkeyup="searchName(event)">
    <br><br>
    <button onclick="searchName()">Cari</button>
    <button onclick="closeSearch()">Tutup</button>
  </div>
</div>

<!-- POPUP DETAIL -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3 id="nama"></h3>
    <p id="info"></p>
    <button id="btnDetail">Lihat Detail</button><br><br>
    <button onclick="closePopup()">Tutup</button>
  </div>
</div>

<script>
let globalData = [];
const id = new URLSearchParams(window.location.search).get('id');

/* LOAD DATA */
fetch('data.json?v=' + Date.now())
.then(res => res.json())
.then(data => {
  globalData = data;
  init(data);
});

/* INIT */
function init(data) {
  const root = data.find(p => p.id === id);
  if (!root) return;

  document.getElementById("judul").innerText = "Silsilah " + root.nama;

  buildBreadcrumb(root, data);

  let pasanganList = [];

  if (root.pasangan) {
    let list = root.pasangan.split("|").map(x => x.trim());
    pasanganList = data.filter(x => list.includes(x.nama));
  }

  if (!pasanganList.length) createFamilyBlock(root, null);
  else pasanganList.forEach(p => createFamilyBlock(root, p));
}

/* FAMILY */
function createFamilyBlock(root, pasangan) {
  const tree = document.getElementById("tree");

  const block = document.createElement("div");
  block.className = "family-block";

  const couple = document.createElement("div");
  couple.className = "couple";

  couple.appendChild(createPerson(root));

  if (pasangan) {
    const love = document.createElement("div");
    love.className = "love-icon";
    love.innerHTML = "❤️";
    couple.appendChild(love);

    couple.appendChild(createPerson(pasangan));
  }

  block.appendChild(couple);

  let children = globalData.filter(x =>
    (x.ayah === root.nama && pasangan && x.ibu === pasangan.nama) ||
    (x.ibu === root.nama && pasangan && x.ayah === pasangan.nama)
  );

  children.sort((a,b)=>(a.tanggal_lahir||0)-(b.tanggal_lahir||0));

  if (children.length) {
    const box = document.createElement("div");
    box.className = "children";
    children.forEach(c => box.appendChild(createPerson(c)));
    block.appendChild(box);
  }

  tree.appendChild(block);
}

/* UTIL */
function punyaAnak(p) {
  return globalData.some(x => x.ayah === p.nama || x.ibu === p.nama);
}

function createPerson(p) {
  const has = punyaAnak(p);

  const div = document.createElement("div");
  div.className = "person " + ((p.status||"").toLowerCase().includes("meninggal") ? "meninggal" : "");

  div.innerHTML = `
    <img src="${p.foto}" onclick="openPopup('${p.id}')">
    <div class="name ${!has ? 'disabled' : ''}">${p.nama}</div>
  `;

  if (has) div.querySelector('.name').onclick = () => goDetail(p.id);

  return div;
}

/* POPUP DETAIL (FULL DATA NORMAL LAGI) */
function val(v){ return v ? v : "-"; }

function openPopup(id) {
  const p = globalData.find(x => x.id === id);
  if (!p) return;

  const hasChild = punyaAnak(p);

  document.getElementById("popup").style.display = "block";
  document.getElementById("nama").innerText = p.nama;

  document.getElementById("info").innerHTML = `
    Lahir: ${val(p.tanggal_lahir)}<br>
    Alamat Lahir: ${val(p.alamat_lahir)}<br>
    Domisili: ${val(p.domisili)}<br>
    Pasangan: ${val(p.pasangan)}<br>
    Jumlah Anak: ${val(p.jumlah_anak)}<br>
    Status: ${val(p.status)}<br>
    WA: ${val(p.wa)}<br>
    Pekerjaan: ${val(p.pekerjaan)}
  `;

  const btn = document.getElementById("btnDetail");

  if (hasChild) {
    btn.style.display = "inline-block";
    btn.onclick = () => goDetail(p.id);
  } else {
    btn.style.display = "none";
  }
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

function goDetail(id) {
  window.location.href = "detail.html?id=" + id;
}

/* SEARCH */
function openSearch() {
  document.getElementById("searchPopup").style.display = "block";
}

function closeSearch() {
  document.getElementById("searchPopup").style.display = "none";
}

function searchName(e) {
  if (e && e.key !== "Enter") return;

  let v = document.getElementById("searchInput").value.toLowerCase();
  let p = globalData.find(x => x.nama.toLowerCase().includes(v));

  if (p) goDetail(p.id);
  else alert("Tidak ditemukan");
}

/* BREADCRUMB */
function buildBreadcrumb(person, data) {
  const box = document.getElementById("breadcrumb");
  box.innerHTML = "";

  let path = [];
  let current = person;

  while (current) {
    path.unshift(current);
    current = data.find(x => x.nama === current.ayah || x.nama === current.ibu);
  }

  path.forEach((p,i)=>{
    const span = document.createElement("span");
    span.innerText = p.nama;
    span.onclick = () => goDetail(p.id);

    box.appendChild(span);

    if (i < path.length - 1)
      box.appendChild(document.createTextNode(" > "));
  });
}
</script>

</body>
</html>
