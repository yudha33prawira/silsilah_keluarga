<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Silsilah</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin: 0;
}

/* JUDUL */
h2 {
  margin: 10px;
}

/* BREADCRUMB */
.breadcrumb {
  margin-bottom: 15px;
  font-size: 14px;
}

.breadcrumb span {
  cursor: pointer;
  color: blue;
}

/* TREE */
.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 15px;
}

/* COUPLE */
.couple {
  display: flex;
  gap: 20px;
  justify-content: center;
  position: relative;
}

.couple::after {
  content: '';
  position: absolute;
  bottom: -40px;
  left: 50%;
  width: 2px;
  height: 40px;
  background: black;
  transform: translateX(-50%);
}

/* CHILDREN */
.children {
  margin-top: 50px;
  width: 100%;
  max-width: 700px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  position: relative;
}

.children::before {
  content: '';
  position: absolute;
  top: -20px;
  left: 10%;
  right: 10%;
  height: 2px;
  background: black;
}

/* CARD */
.person {
  border: 1px solid black;
  border-radius: 12px;
  padding: 15px;
  background: white;
  color: black;
  transition: 0.2s;
}

/* 🔥 STATUS MENINGGAL */
.person.meninggal {
  background: black !important;
  color: white !important;
}

.person.meninggal .name {
  color: white !important;
}

/* HOVER */
.person:hover {
  transform: scale(1.05);
}

/* FOTO */
.person img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  cursor: pointer;
}

/* NAMA */
.name {
  margin-top: 8px;
  font-weight: bold;
  cursor: pointer;
}

.name.disabled {
  color: gray;
  cursor: default;
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.popup-content {
  background: white;
  width: 90%;
  max-width: 300px;
  margin: 80px auto;
  padding: 20px;
  border-radius: 10px;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .children {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<h2 id="judul">Silsilah</h2>

<div class="breadcrumb" id="breadcrumb"></div>

<button onclick="history.back()">⬅ Kembali</button>

<div class="tree" id="tree"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3 id="nama"></h3>
    <p id="info"></p>

    <button id="btnDetail">Lihat Detail</button><br><br>
    <button onclick="closePopup()">Tutup</button>
  </div>
</div>

<script>
let globalData = [];

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get('id');

fetch('data.json?v=' + new Date().getTime())
.then(res => res.json())
.then(data => {
  globalData = data;
  init(data);
});

function init(data) {

  const root = data.find(p => p.id === id);

  if (!root) {
    document.getElementById("judul").innerText = "Data tidak ditemukan";
    return;
  }

  document.getElementById("judul").innerText =
    "Silsilah Keluarga " + root.nama;

  buildBreadcrumb(root, data);

  const tree = document.getElementById("tree");

  // ===== PASANGAN =====
  let pasangan = null;

  if (root.pasangan && root.pasangan !== "-") {
    pasangan = data.find(x =>
      x.nama.toLowerCase().trim() === root.pasangan.toLowerCase().trim()
    );
  }

  const couple = document.createElement("div");
  couple.className = "couple";

  couple.appendChild(createPerson(root));

  if (pasangan) {
    couple.appendChild(createPerson(pasangan));
  }

  tree.appendChild(couple);

  // ===== ANAK =====
  const children = data.filter(x =>
    x.ayah === root.nama ||
    x.ibu === root.nama ||
    x.ayah === root.pasangan ||
    x.ibu === root.pasangan
  );

  const unique = [];
  const used = new Set();

  children.forEach(c => {
    if (!used.has(c.id)) {
      unique.push(c);
      used.add(c.id);
    }
  });

  const childBox = document.createElement("div");
  childBox.className = "children";

  unique.forEach(p => {
    childBox.appendChild(createPerson(p));
  });

  tree.appendChild(childBox);
}


// ===== CEK PUNYA ANAK =====
function punyaAnak(p) {
  return globalData.some(x =>
    x.ayah === p.nama || x.ibu === p.nama
  );
}


// ===== BREADCRUMB =====
function buildBreadcrumb(person, data) {

  const container = document.getElementById("breadcrumb");

  let path = [];
  let current = person;
  const visited = new Set();

  while (current && !visited.has(current.id)) {
    visited.add(current.id);
    path.unshift(current);

    current = data.find(x =>
      x.nama === current.ayah || x.nama === current.ibu
    );
  }

  path.forEach((p, i) => {

    const span = document.createElement("span");
    span.innerText = p.nama;

    span.onclick = () => {
      window.location.href = "detail.html?id=" + p.id;
    };

    container.appendChild(span);

    if (i < path.length - 1) {
      container.appendChild(document.createTextNode(" > "));
    }
  });
}


// ===== CARD =====
function createPerson(p) {

  const hasChild = punyaAnak(p);

  // 🔥 DETEKSI MENINGGAL (AMAN)
  const isMeninggal = (p.status || "").toLowerCase().trim() === "meninggal";

  const div = document.createElement("div");
  div.className = isMeninggal ? "person meninggal" : "person";

  div.innerHTML = `
    <img src="${p.foto}" onclick="openPopup('${p.id}')">
    <div class="name ${!hasChild ? 'disabled' : ''}">
      ${p.nama}
    </div>
  `;

  if (hasChild) {
    div.querySelector('.name').onclick = () => goDetail(p.id);
  }

  return div;
}


// ===== POPUP =====
function openPopup(id) {

  const p = globalData.find(x => x.id === id);
  if (!p) return;

  const hasChild = punyaAnak(p);

  document.getElementById("popup").style.display = "block";

  document.getElementById("nama").innerText = p.nama;

  document.getElementById("info").innerHTML =
    `Lahir: ${p.tanggal_lahir}<br>
     Alamat: ${p.alamat_lahir}<br>
     Domisili: ${p.domisili}<br>
     Pasangan: ${p.pasangan}<br>
     Anak: ${p.jumlah_anak}<br>
     Status: ${p.status}<br>
     WA: ${p.wa}<br>
     Pekerjaan: ${p.pekerjaan}`;

  const btn = document.getElementById("btnDetail");

  if (hasChild) {
    btn.style.display = "inline-block";
    btn.onclick = () => goDetail(p.id);
  } else {
    btn.style.display = "none";
  }
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}


// ===== NAVIGASI =====
function goDetail(id) {
  window.location.href = "detail.html?id=" + id;
}
</script>

</body>
</html>
