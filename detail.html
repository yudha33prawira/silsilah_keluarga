<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Silsilah</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
  text-align: center;
}

h2 { margin: 10px; }

/* ===== TOOLBAR ===== */
.toolbar {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 10px 0;
}

.search-btn, .filter-btn {
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.search-btn {
  background: linear-gradient(135deg,#6a11cb,#2575fc);
}

.filter-btn {
  background: linear-gradient(135deg,#ff7e5f,#ff9966);
}

/* ===== TREE ===== */
.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 15px;
}

.family-block {
  margin-bottom: 40px;
}

.couple {
  display: flex;
  gap: 20px;
  position: relative;
}

.couple::after {
  content: '';
  position: absolute;
  bottom: -30px;
  left: 50%;
  width: 2px;
  height: 30px;
  background: black;
  transform: translateX(-50%);
}

.children {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 15px;
  max-width: 700px;
  width: 100%;
}

.person {
  border: 1px solid black;
  border-radius: 12px;
  padding: 10px;
  background: white;
}

.person.meninggal {
  background: black;
  color: white;
}

.person img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  cursor: pointer;
}

.name {
  font-weight: bold;
  margin-top: 5px;
  cursor: pointer;
}

.name.disabled {
  color: gray;
}

/* ===== FILTER ===== */
.filter-panel {
  display: none;
  width: 90%;
  max-width: 600px;
  margin: 10px auto;
  background: white;
  padding: 15px;
  border-radius: 10px;
}

.filter-container {
  display: flex;
  gap: 10px;
}

.filter-left, .filter-right {
  width: 50%;
}

.filter-left div {
  background: #eee;
  padding: 8px;
  margin-bottom: 5px;
  cursor: pointer;
  border-radius: 6px;
}

.filter-right div {
  background: #2575fc;
  color: white;
  padding: 8px;
  margin-bottom: 5px;
  cursor: pointer;
  border-radius: 6px;
}

.filter-item {
  border-bottom: 1px solid #ddd;
  padding: 5px;
  text-align: left;
  cursor: pointer;
}

/* ===== POPUP ===== */
.search-popup, .popup {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.5);
}

.search-box, .popup-content {
  background: white;
  padding: 20px;
  margin: 100px auto;
  width: 90%;
  max-width: 300px;
  border-radius: 10px;
}

.breadcrumb span {
  cursor: pointer;
  color: blue;
}

@media(max-width:600px){
  .children { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<h2 id="judul">Silsilah</h2>

<div class="breadcrumb" id="breadcrumb"></div>

<button onclick="history.back()">⬅ Kembali</button>

<!-- TOOLBAR -->
<div class="toolbar">
  <button onclick="openSearch()" class="search-btn">🔍 Cari</button>
  <button onclick="toggleFilter()" class="filter-btn">🎛 Filter</button>
</div>

<!-- FILTER -->
<div class="filter-panel" id="filterPanel">
  <h4>Filter Data</h4>

  <div class="filter-container">
    <div class="filter-left">
      <div onclick="setFilter('gender')">Gender</div>
      <div onclick="setFilter('generasi')">Generasi</div>
      <div onclick="setFilter('status')">Status</div>
    </div>

    <div class="filter-right" id="filterOptions">
      Pilih filter
    </div>
  </div>

  <div id="filterResult"></div>
</div>

<div class="tree" id="tree"></div>

<!-- SEARCH -->
<div id="searchPopup" class="search-popup">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Cari nama..." onkeyup="searchName(event)">
    <br><br>
    <button onclick="searchName()">Cari</button>
    <button onclick="closeSearch()">Tutup</button>
  </div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3 id="nama"></h3>
    <p id="info"></p>
    <button id="btnDetail">Detail</button><br><br>
    <button onclick="closePopup()">Tutup</button>
  </div>
</div>

<script>
let globalData = [];
const id = new URLSearchParams(window.location.search).get('id');

fetch('data.json?v='+Date.now())
.then(r=>r.json())
.then(data=>{
  globalData = data;
  init(data);
});

function init(data){
  const root = data.find(p=>p.id===id);
  if(!root) return;

  document.getElementById("judul").innerText="Silsilah "+root.nama;
  buildBreadcrumb(root,data);

  let pasangan=data.filter(x=>root.pasangan?.includes(x.nama));

  if(pasangan.length===0) createFamilyBlock(root,null);
  else pasangan.forEach(p=>createFamilyBlock(root,p));
}

function createFamilyBlock(root,pasangan){
  const tree=document.getElementById("tree");

  const block=document.createElement("div");
  block.className="family-block";

  const couple=document.createElement("div");
  couple.className="couple";

  couple.appendChild(createPerson(root));
  if(pasangan) couple.appendChild(createPerson(pasangan));

  block.appendChild(couple);

  let children=globalData.filter(x=>
    (x.ayah===root.nama && pasangan && x.ibu===pasangan.nama) ||
    (x.ibu===root.nama && pasangan && x.ayah===pasangan.nama)
  );

  children.sort((a,b)=>(a.tanggal_lahir||0)-(b.tanggal_lahir||0));

  if(children.length){
    const box=document.createElement("div");
    box.className="children";
    children.forEach(c=>box.appendChild(createPerson(c)));
    block.appendChild(box);
  }

  tree.appendChild(block);
}

function punyaAnak(p){
  return globalData.some(x=>x.ayah===p.nama||x.ibu===p.nama);
}

function createPerson(p){
  const has=punyaAnak(p);

  const div=document.createElement("div");
  div.className="person "+((p.status||"").includes("Meninggal")?"meninggal":"");

  div.innerHTML=`
    <img src="${p.foto}" onclick="openPopup('${p.id}')">
    <div class="name ${!has?'disabled':''}">${p.nama}</div>
  `;

  if(has) div.querySelector('.name').onclick=()=>goDetail(p.id);
  return div;
}

// POPUP
function openPopup(id){
  const p=globalData.find(x=>x.id===id);

  document.getElementById("popup").style.display="block";
  document.getElementById("nama").innerText=p.nama;
  document.getElementById("info").innerHTML=`Lahir: ${p.tanggal_lahir}<br>Status: ${p.status}`;

  document.getElementById("btnDetail").onclick=()=>goDetail(p.id);
}

function closePopup(){ document.getElementById("popup").style.display="none"; }
function goDetail(id){ window.location.href="detail.html?id="+id; }

// SEARCH
function openSearch(){ document.getElementById("searchPopup").style.display="block"; }
function closeSearch(){ document.getElementById("searchPopup").style.display="none"; }

function searchName(e){
  if(e && e.key!=="Enter") return;
  let v=document.getElementById("searchInput").value.toLowerCase();
  let p=globalData.find(x=>x.nama.toLowerCase().includes(v));
  if(p) goDetail(p.id); else alert("Tidak ditemukan");
}

// FILTER
function toggleFilter(){
  const panel=document.getElementById("filterPanel");
  panel.style.display = (panel.style.display==="block")?"none":"block";
}

let activeFilter=null;

function setFilter(type){
  activeFilter=type;
  const box=document.getElementById("filterOptions");
  box.innerHTML="";

  if(type==="gender"){
    box.innerHTML=`<div onclick="applyFilter('L')">L</div><div onclick="applyFilter('P')">P</div>`;
  }

  if(type==="generasi"){
    [...new Set(globalData.map(p=>p.generasi))].forEach(g=>{
      box.innerHTML+=`<div onclick="applyFilter('${g}')">Gen ${g}</div>`;
    });
  }

  if(type==="status"){
    box.innerHTML=`<div onclick="applyFilter('hidup')">Hidup</div><div onclick="applyFilter('meninggal')">Meninggal</div>`;
  }
}

function applyFilter(val){
  let res=[...globalData];

  if(activeFilter==="gender") res=res.filter(p=>(p.jenis_kelamin||"").toUpperCase()===val);
  if(activeFilter==="generasi") res=res.filter(p=>p.generasi===val);
  if(activeFilter==="status") res=res.filter(p=>(p.status||"").toLowerCase().includes(val));

  res.sort((a,b)=>(a.tanggal_lahir||0)-(b.tanggal_lahir||0));

  const box=document.getElementById("filterResult");
  box.innerHTML="";

  res.forEach(p=>{
    const d=document.createElement("div");
    d.className="filter-item";
    d.innerHTML=`${p.nama}<br><small>${p.tanggal_lahir}</small>`;
    d.onclick=()=>goDetail(p.id);
    box.appendChild(d);
  });
}

// BREADCRUMB
function buildBreadcrumb(person,data){
  const container=document.getElementById("breadcrumb");
  let path=[], current=person;

  while(current){
    path.unshift(current);
    current=data.find(x=>x.nama===current.ayah || x.nama===current.ibu);
  }

  path.forEach((p,i)=>{
    const span=document.createElement("span");
    span.innerText=p.nama;
    span.onclick=()=>goDetail(p.id);
    container.appendChild(span);

    if(i<path.length-1)
      container.appendChild(document.createTextNode(" > "));
  });
}
</script>

</body>
</html>
