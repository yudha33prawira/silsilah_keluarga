<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Silsilah</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
  text-align: center;
}

h2 { margin: 10px; }

/* BREADCRUMB */
.breadcrumb {
  margin-bottom: 10px;
  font-size: 14px;
}

.breadcrumb span {
  cursor: pointer;
  color: blue;
}

/* TOOLBAR */
.toolbar {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 10px 0;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color: white;
  cursor: pointer;
}

/* TREE */
.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.family-block { margin-bottom: 40px; }

.couple {
  display: flex;
  gap: 40px;
  position: relative;
}

.love-icon {
  position: absolute;
  top: 40px;
  left: 50%;
  transform: translateX(-50%);
}

/* garis */
.couple::after {
  content: '';
  position: absolute;
  bottom: -30px;
  left: 50%;
  width: 2px;
  height: 30px;
  background: black;
}

.children {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 15px;
}

/* PERSON */
.person {
  border: 1px solid black;
  border-radius: 12px;
  padding: 10px;
  background: white;
}

.person.meninggal {
  background: black;
  color: white;
}

.person img, .siluet {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  cursor: pointer;
}

.siluet {
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

.siluet.l { background:#2193b0; color:white; }
.siluet.p { background:#ff758c; color:white; }

.name {
  font-weight: bold;
  margin-top: 5px;
  cursor: pointer;
}

.name.disabled {
  color: gray;
}

/* POPUP MODERN */
.popup {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  overflow:auto;
}

.popup-box {
  background:white;
  margin:40px auto;
  width:90%;
  max-width:400px;
  border-radius:15px;
  overflow:hidden;
  text-align:left;
}

.popup-header {
  text-align:center;
  padding:20px;
  background:linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;
}

.popup-header img,
.popup-avatar {
  width:100px;
  height:100px;
  border-radius:50%;
  margin-bottom:10px;
}

.popup-avatar {
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  background:white;
  color:black;
}

.popup-body {
  padding:15px;
}

.section {
  margin-bottom:15px;
}

.section-title {
  font-weight:bold;
  margin-bottom:5px;
  color:#2575fc;
}

.popup-footer {
  padding:15px;
  text-align:center;
}

.btn-wa {
  background:#25D366;
}
</style>
</head>

<body>

<h2 id="judul">Detail Silsilah</h2>
<div class="breadcrumb" id="breadcrumb"></div>

<div class="toolbar">
  <button onclick="history.back()">⬅ Kembali</button>
</div>

<div class="tree" id="tree"></div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">

    <div class="popup-header" id="popupHeader"></div>
    <div class="popup-body" id="popupBody"></div>

    <div class="popup-footer">
      <button id="btnWA" class="btn-wa">📞 WhatsApp</button><br>
      <button id="btnDetail">📄 Lihat Silsilah</button><br><br>
      <button onclick="closePopup()">Tutup</button>
    </div>

  </div>
</div>

<script>
let globalData=[];
const id = new URLSearchParams(window.location.search).get('id');

/* LOAD */
fetch('data.json?v='+Date.now())
.then(r=>r.json())
.then(data=>{
  globalData=data;
  init(data);
});

/* NAMA PENDEK */
function shortName(nama){
  if(!nama) return "-";
  return nama.split(" ")[0];
}

/* INIT */
function init(data){
  const root=data.find(p=>p.id===id);
  if(!root) return;

  document.getElementById("judul").innerText="Silsilah "+shortName(root.nama);

  buildBreadcrumb(root,data);

  let pasanganList=[];
  if(root.pasangan){
    let list=root.pasangan.split("|").map(x=>x.trim());
    pasanganList=data.filter(x=>list.includes(x.nama));
  }

  if(!pasanganList.length) createFamilyBlock(root,null);
  else pasanganList.forEach(p=>createFamilyBlock(root,p));
}

/* FAMILY */
function createFamilyBlock(root,pasangan){
  const tree=document.getElementById("tree");

  const block=document.createElement("div");
  block.className="family-block";

  const couple=document.createElement("div");
  couple.className="couple";

  couple.appendChild(createPerson(root));

  if(pasangan){
    const love=document.createElement("div");
    love.className="love-icon";
    love.innerHTML="❤️";
    couple.appendChild(love);
    couple.appendChild(createPerson(pasangan));
  }

  block.appendChild(couple);

  let children=globalData.filter(x=>
    (x.ayah===root.nama && pasangan && x.ibu===pasangan.nama) ||
    (x.ibu===root.nama && pasangan && x.ayah===pasangan.nama)
  );

  children.sort((a,b)=>(a.tanggal_lahir||0)-(b.tanggal_lahir||0));

  if(children.length){
    const box=document.createElement("div");
    box.className="children";
    children.forEach(c=>box.appendChild(createPerson(c)));
    block.appendChild(box);
  }

  tree.appendChild(block);
}

/* PERSON */
function createPerson(p){

  const isMeninggal=(p.status||"").toLowerCase().includes("meninggal");

  const div=document.createElement("div");
  div.className="person "+(isMeninggal?"meninggal":"");

  let foto = p.foto
    ? `<img src="${p.foto}" onclick="openPopup('${p.id}')">`
    : `<div class="siluet ${p.jenis_kelamin==='L'?'l':'p'}" onclick="openPopup('${p.id}')">${p.jenis_kelamin==='L'?'👨':'👩'}</div>`;

  div.innerHTML = `
    ${foto}
    <div class="name" onclick="goDetail('${p.id}')">${shortName(p.nama)}</div>
  `;

  return div;
}

/* POPUP FULL BIODATA */
function val(v){ return v ? v : "-"; }

function openPopup(id){
  const p=globalData.find(x=>x.id===id);
  if(!p) return;

  document.getElementById("popup").style.display="block";

  let header = p.foto
    ? `<img src="${p.foto}"><br>${p.nama}`
    : `<div class="popup-avatar">${p.jenis_kelamin==='L'?'👨':'👩'}</div>${p.nama}`;

  document.getElementById("popupHeader").innerHTML=header;

  document.getElementById("popupBody").innerHTML=`
    <div class="section">
      <div class="section-title">👤 Biodata</div>
      Jenis Kelamin: ${val(p.jenis_kelamin)}<br>
      Status: ${val(p.status)}<br>
      Pekerjaan: ${val(p.pekerjaan)}
    </div>

    <div class="section">
      <div class="section-title">👨‍👩‍👧 Keluarga</div>
      Ayah: ${val(p.ayah)}<br>
      Ibu: ${val(p.ibu)}<br>
      Pasangan: ${val(p.pasangan)}<br>
      Anak: ${val(p.jumlah_anak)}
    </div>

    <div class="section">
      <div class="section-title">📍 Lahir</div>
      Tahun: ${val(p.tanggal_lahir)}<br>
      Tempat: ${val(p.alamat_lahir)}<br>
      Domisili: ${val(p.domisili)}
    </div>

    <div class="section">
      <div class="section-title">📞 Kontak</div>
      WA: ${val(p.wa)}
    </div>
  `;

  document.getElementById("btnWA").onclick=()=>{
    if(p.wa) window.open("https://wa.me/"+p.wa);
    else alert("No WA tidak tersedia");
  };

  document.getElementById("btnDetail").onclick=()=>goDetail(p.id);
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

function goDetail(id){
  window.location.href="detail.html?id="+id;
}

/* BREADCRUMB */
function buildBreadcrumb(person,data){
  const box=document.getElementById("breadcrumb");
  box.innerHTML="";

  let path=[];
  let current=person;

  while(current){
    path.unshift(current);
    current=data.find(x=>x.nama===current.ayah || x.nama===current.ibu);
  }

  path.forEach((p,i)=>{
    const span=document.createElement("span");
    span.innerText=shortName(p.nama);
    span.onclick=()=>goDetail(p.id);

    box.appendChild(span);

    if(i<path.length-1)
      box.appendChild(document.createTextNode(" > "));
  });
}
</script>

</body>
</html>
