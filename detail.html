<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Detail Silsilah</title>

<style>
body {
  font-family: Arial;
  text-align: center;
}

h2 { margin-bottom: 10px; }

.breadcrumb {
  margin-bottom: 15px;
  font-size: 14px;
}

.breadcrumb span {
  cursor: pointer;
  color: blue;
}

.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.row {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.v-line {
  width: 2px;
  height: 30px;
  background: black;
}

.children {
  position: relative;
  margin-top: 10px;
}

.children::before {
  content: '';
  position: absolute;
  top: -10px;
  left: 10%;
  right: 10%;
  height: 2px;
  background: black;
}

.person {
  border: 1px solid black;
  padding: 10px;
  border-radius: 10px;
  margin: 10px;
  background: white;
  cursor: pointer;
  min-width: 120px;
}

.person img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
}

.couple {
  display: flex;
  gap: 10px;
  justify-content: center;
}

.back { margin-bottom: 10px; }
</style>
</head>

<body>

<h2 id="judul">Silsilah Keluarga</h2>
<div class="breadcrumb" id="breadcrumb"></div>

<button class="back" onclick="history.back()">⬅ Kembali</button>

<div class="tree" id="tree"></div>

<script>
// ===== AMBIL ID =====
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get('id');

fetch('data.json')
.then(res => res.json())
.then(data => {

  const root = data.find(p => p.id === id);

  if (!root) {
    document.getElementById("judul").innerText = "Data tidak ditemukan";
    return;
  }

  document.getElementById("judul").innerText =
    "Silsilah Keluarga " + root.nama;

  buildBreadcrumb(root, data);

  const tree = document.getElementById("tree");

  // ===== ROOT + PASANGAN =====
  const row1 = document.createElement("div");
  row1.className = "row";
  row1.appendChild(createPerson(root, data, true));
  tree.appendChild(row1);

  // ===== GARIS =====
  const vline = document.createElement("div");
  vline.className = "v-line";
  tree.appendChild(vline);

  // ===== AMBIL ANAK (SUAMI + ISTRI) =====
  let children = data.filter(x =>
    x.orang_tua === root.nama ||
    x.orang_tua === root.pasangan
  );

  // ===== HILANGKAN DUPLIKAT =====
  const unique = [];
  const used = new Set();

  children.forEach(c => {
    if (!used.has(c.nama)) {
      unique.push(c);
      used.add(c.nama);
    }
  });

  // ===== TAMPILKAN =====
  const row2 = document.createElement("div");
  row2.className = "row children";

  unique.forEach(p => {
    row2.appendChild(createPerson(p, data, false));
  });

  tree.appendChild(row2);

});


// ===== BREADCRUMB =====
function buildBreadcrumb(person, data) {

  const container = document.getElementById("breadcrumb");

  let path = [];
  let current = person;

  while (current) {
    path.unshift(current);
    current = data.find(x => x.nama === current.orang_tua);
  }

  path.forEach((p, i) => {

    const span = document.createElement("span");
    span.innerText = p.nama;

    span.onclick = () => {
      window.location.href = "detail.html?id=" + p.id;
    };

    container.appendChild(span);

    if (i < path.length - 1) {
      container.appendChild(document.createTextNode(" > "));
    }
  });
}


// ===== CARD =====
function createPerson(p, data, isRoot = false) {

  const div = document.createElement("div");
  div.className = "person";

  // ===== ROOT → tampil pasangan =====
  if (isRoot && p.pasangan && p.pasangan !== "-") {

    const pasangan = data.find(x =>
      x.nama.toLowerCase().trim() === p.pasangan.toLowerCase().trim()
    );

    if (pasangan) {
      div.innerHTML = `
        <div class="couple">
          <div>
            <img src="${p.foto}">
            <div>${p.nama}</div>
          </div>
          <div>
            <img src="${pasangan.foto}">
            <div>${pasangan.nama}</div>
          </div>
        </div>
      `;
    } else {
      // fallback kalau tidak ketemu
      div.innerHTML = `
        <img src="${p.foto}">
        <div>${p.nama}</div>
      `;
    }

  } else {
    div.innerHTML = `
      <img src="${p.foto}">
      <div>${p.nama}</div>
    `;
  }

  div.onclick = () => {
    window.location.href = "detail.html?id=" + p.id;
  };

  return div;
}
</script>

</body>
</html>
