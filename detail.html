<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Silsilah</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 0;
  background: #f5f5f5;
}

h2 { margin: 10px; }

.breadcrumb {
  margin-bottom: 15px;
  font-size: 14px;
}

.breadcrumb span {
  cursor: pointer;
  color: blue;
}

.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 15px;
}

.family-block {
  margin-bottom: 40px;
}

.couple {
  display: flex;
  gap: 20px;
  justify-content: center;
  position: relative;
}

.couple::after {
  content: '';
  position: absolute;
  bottom: -30px;
  left: 50%;
  width: 2px;
  height: 30px;
  background: black;
  transform: translateX(-50%);
}

.children {
  margin-top: 40px;
  width: 100%;
  max-width: 700px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  position: relative;
}

.children::before {
  content: '';
  position: absolute;
  top: -15px;
  left: 10%;
  right: 10%;
  height: 2px;
  background: black;
}

/* PERSON */
.person {
  border: 1px solid black;
  border-radius: 12px;
  padding: 15px;
  background: white;
  transition: 0.2s;
}

.person:hover {
  transform: scale(1.05);
}

.person.meninggal {
  background: black;
  color: white;
}

.person img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  cursor: pointer;
}

.name {
  margin-top: 8px;
  font-weight: bold;
  cursor: pointer;
}

.name.disabled {
  color: gray;
}

/* SEARCH */
.search-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  color: white;
  font-size: 22px;
  cursor: pointer;
}

/* POPUPS */
.search-popup, .popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.search-box, .popup-content {
  background: white;
  padding: 20px;
  margin: 100px auto;
  width: 90%;
  max-width: 320px;
  border-radius: 10px;
}

@media (max-width: 600px) {
  .children {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<h2 id="judul">Silsilah</h2>
<div class="breadcrumb" id="breadcrumb"></div>

<button onclick="history.back()">⬅ Kembali</button>
<button onclick="openSearch()" class="search-btn">🔍</button>

<div class="tree" id="tree"></div>

<!-- SEARCH -->
<div id="searchPopup" class="search-popup">
  <div class="search-box">
    <h3>Cari Nama</h3>
    <input type="text" id="searchInput" placeholder="Ketik nama..." onkeyup="searchName(event)">
    <br><br>
    <button onclick="searchName()">Cari</button>
    <button onclick="closeSearch()">Tutup</button>
  </div>
</div>

<!-- DETAIL POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3 id="nama"></h3>
    <p id="info"></p>
    <button id="btnDetail">Lihat Detail</button><br><br>
    <button onclick="closePopup()">Tutup</button>
  </div>
</div>

<script>
let globalData = [];
const id = new URLSearchParams(window.location.search).get('id');

// LOAD DATA
fetch('data.json?v=' + new Date().getTime())
.then(res => res.json())
.then(data => {
  globalData = data;
  init(data);
});

// INIT
function init(data) {
  const root = data.find(p => p.id === id);

  if (!root) {
    document.getElementById("judul").innerText = "Data tidak ditemukan";
    return;
  }

  document.getElementById("judul").innerText = "Silsilah Keluarga " + root.nama;
  buildBreadcrumb(root, data);

  const tree = document.getElementById("tree");

  let pasanganList = [];
  if (root.pasangan) {
    let list = root.pasangan.split("|").map(x => x.trim());
    pasanganList = data.filter(x => list.includes(x.nama));
  }

  if (pasanganList.length === 0) {
    createFamilyBlock(tree, root, null);
  } else {
    pasanganList.forEach(psg => {
      createFamilyBlock(tree, root, psg);
    });
  }
}

// CREATE FAMILY
function createFamilyBlock(tree, root, pasangan) {
  const block = document.createElement("div");
  block.className = "family-block";

  const couple = document.createElement("div");
  couple.className = "couple";

  couple.appendChild(createPerson(root));
  if (pasangan) couple.appendChild(createPerson(pasangan));

  block.appendChild(couple);

  // ✅ ANAK DIURUTKAN BERDASARKAN USIA
  let children = globalData.filter(x =>
    (x.ayah === root.nama && pasangan && x.ibu === pasangan.nama) ||
    (x.ibu === root.nama && pasangan && x.ayah === pasangan.nama)
  );

  children.sort((a, b) => (a.tanggal_lahir || 0) - (b.tanggal_lahir || 0));

  if (children.length > 0) {
    const childBox = document.createElement("div");
    childBox.className = "children";
    children.forEach(p => childBox.appendChild(createPerson(p)));
    block.appendChild(childBox);
  }

  tree.appendChild(block);
}

// CHECK ANAK
function punyaAnak(p) {
  return globalData.some(x => x.ayah === p.nama || x.ibu === p.nama);
}

// CARD
function createPerson(p) {
  const hasChild = punyaAnak(p);
  const isMeninggal = (p.status || "").toLowerCase().includes("meninggal");

  const div = document.createElement("div");
  div.className = isMeninggal ? "person meninggal" : "person";

  div.innerHTML = `
    <img src="${p.foto}" onclick="openPopup('${p.id}')">
    <div class="name ${!hasChild ? 'disabled' : ''}">${p.nama}</div>
  `;

  if (hasChild) div.querySelector('.name').onclick = () => goDetail(p.id);

  return div;
}

// POPUP
function openPopup(id) {
  const p = globalData.find(x => x.id === id);
  if (!p) return;

  const hasChild = punyaAnak(p);

  document.getElementById("popup").style.display = "block";
  document.getElementById("nama").innerText = p.nama;

  document.getElementById("info").innerHTML = `
    Lahir: ${p.tanggal_lahir}<br>
    Domisili: ${p.domisili}<br>
    Status: ${p.status}<br>
    Pasangan: ${p.pasangan}<br>
    Anak: ${p.jumlah_anak}
  `;

  const btn = document.getElementById("btnDetail");
  btn.style.display = hasChild ? "inline-block" : "none";
  btn.onclick = () => goDetail(p.id);
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

function goDetail(id) {
  window.location.href = "detail.html?id=" + id;
}

// SEARCH
function openSearch() {
  document.getElementById("searchPopup").style.display = "block";
}

function closeSearch() {
  document.getElementById("searchPopup").style.display = "none";
}

function searchName(e) {
  if (e && e.key && e.key !== "Enter") return;

  let input = document.getElementById("searchInput").value.toLowerCase();
  let person = globalData.find(p => p.nama.toLowerCase().includes(input));

  if (person) window.location.href = "detail.html?id=" + person.id;
  else alert("Nama tidak ditemukan!");
}

// BREADCRUMB
function buildBreadcrumb(person, data) {
  const container = document.getElementById("breadcrumb");

  let path = [];
  let current = person;
  let visited = new Set();

  while (current && !visited.has(current.id)) {
    visited.add(current.id);
    path.unshift(current);
    current = data.find(x => x.nama === current.ayah || x.nama === current.ibu);
  }

  path.forEach((p, i) => {
    const span = document.createElement("span");
    span.innerText = p.nama;
    span.onclick = () => goDetail(p.id);
    container.appendChild(span);

    if (i < path.length - 1) {
      container.appendChild(document.createTextNode(" > "));
    }
  });
}
</script>

</body>
</html>
