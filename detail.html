<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Detail Silsilah</title>

<style>
body {
  font-family: Arial;
  text-align: center;
}

h2 {
  margin-bottom: 10px;
}

/* ===== BREADCRUMB ===== */
.breadcrumb {
  margin-bottom: 15px;
  font-size: 14px;
}

.breadcrumb span {
  cursor: pointer;
  color: blue;
}

.breadcrumb span:hover {
  text-decoration: underline;
}

/* ===== TREE ===== */
.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.row {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.v-line {
  width: 2px;
  height: 30px;
  background: black;
}

.children {
  position: relative;
  margin-top: 10px;
}

.children::before {
  content: '';
  position: absolute;
  top: -10px;
  left: 10%;
  right: 10%;
  height: 2px;
  background: black;
}

.person {
  border: 1px solid black;
  padding: 10px;
  border-radius: 10px;
  margin: 10px;
  background: white;
  cursor: pointer;
  min-width: 120px;
}

.person img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
}

.back {
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h2 id="judul">Silsilah Keluarga</h2>

<div class="breadcrumb" id="breadcrumb"></div>

<button class="back" onclick="history.back()">⬅ Kembali</button>

<div class="tree" id="tree"></div>

<script>
// ===== AMBIL ID =====
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get('id');

fetch('data.json')
  .then(res => res.json())
  .then(data => {

    const root = data.find(p => p.id === id);

    if (!root) {
      document.getElementById("judul").innerText = "Data tidak ditemukan";
      return;
    }

    // ===== JUDUL =====
    document.getElementById("judul").innerText =
      "Silsilah Keluarga " + root.nama;

    // ===== BREADCRUMB =====
    buildBreadcrumb(root, data);

    const tree = document.getElementById("tree");

    // ===== ROOT =====
    const row1 = document.createElement("div");
    row1.className = "row";
    row1.appendChild(createPerson(root));
    tree.appendChild(row1);

    // ===== GARIS =====
    const vline = document.createElement("div");
    vline.className = "v-line";
    tree.appendChild(vline);

    // ===== ANAK =====
    const children = data.filter(x => x.orang_tua === root.nama);

    const row2 = document.createElement("div");
    row2.className = "row children";

    children.forEach(p => {
      row2.appendChild(createPerson(p));
    });

    tree.appendChild(row2);

  });


// ===== BREADCRUMB FUNCTION =====
function buildBreadcrumb(person, data) {

  const container = document.getElementById("breadcrumb");

  let path = [];
  let current = person;

  // naik ke atas
  while (current) {
    path.unshift(current);
    current = data.find(x => x.nama === current.orang_tua);
  }

  // render breadcrumb
  path.forEach((p, index) => {

    const span = document.createElement("span");
    span.innerText = p.nama;

    span.onclick = () => {
      window.location.href = "detail.html?id=" + p.id;
    };

    container.appendChild(span);

    if (index < path.length - 1) {
      container.appendChild(document.createTextNode(" > "));
    }
  });
}


// ===== CARD =====
function createPerson(p) {

  const div = document.createElement("div");
  div.className = "person";

  div.innerHTML = `
    <img src="${p.foto}">
    <div>${p.nama}</div>
  `;

  div.onclick = () => {
    window.location.href = "detail.html?id=" + p.id;
  };

  return div;
}
</script>

</body>
</html>
