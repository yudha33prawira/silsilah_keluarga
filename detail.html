<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Silsilah</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin: 0;
}

/* TREE */
.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 15px;
}

/* COUPLE */
.couple {
  display: flex;
  gap: 20px;
  justify-content: center;
  position: relative;
}

/* GARIS TURUN */
.couple::after {
  content: '';
  position: absolute;
  bottom: -40px;
  left: 50%;
  width: 2px;
  height: 40px;
  background: black;
  transform: translateX(-50%);
}

/* CHILDREN */
.children {
  margin-top: 50px;
  width: 100%;
  max-width: 600px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  position: relative;
}

/* GARIS ANAK */
.children::before {
  content: '';
  position: absolute;
  top: -20px;
  left: 10%;
  right: 10%;
  height: 2px;
  background: black;
}

/* CARD */
.person {
  border: 1px solid black;
  border-radius: 12px;
  padding: 15px;
  background: white;
  cursor: pointer;
}

.person img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .children {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<h2 id="judul"></h2>

<div class="tree" id="tree"></div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get('id');

fetch('data.json?v=' + new Date().getTime())
.then(res => res.json())
.then(data => {

  const root = data.find(p => p.id === id);
  if (!root) return;

  document.getElementById("judul").innerText =
    "Silsilah " + root.nama;

  const tree = document.getElementById("tree");

  // ===== ROOT + PASANGAN =====
  const pasangan = data.find(x =>
    x.nama.toLowerCase() === root.pasangan.toLowerCase()
  );

  const couple = document.createElement("div");
  couple.className = "couple";

  couple.appendChild(createPerson(root));

  if (pasangan) {
    couple.appendChild(createPerson(pasangan));
  }

  tree.appendChild(couple);

  // ===== ANAK =====
  const children = data.filter(x =>
    x.ayah === root.nama ||
    x.ibu === root.nama ||
    x.ayah === root.pasangan ||
    x.ibu === root.pasangan
  );

  const unique = [];
  const used = new Set();

  children.forEach(c => {
    if (!used.has(c.id)) {
      unique.push(c);
      used.add(c.id);
    }
  });

  const childBox = document.createElement("div");
  childBox.className = "children";

  unique.forEach(p => {
    childBox.appendChild(createPerson(p));
  });

  tree.appendChild(childBox);

});

// CARD
function createPerson(p) {
  const div = document.createElement("div");
  div.className = "person";

  div.innerHTML = `
    <img src="${p.foto}">
    <div>${p.nama}</div>
  `;

  div.onclick = () => {
    window.location.href = "detail.html?id=" + p.id;
  };

  return div;
}
</script>

</body>
</html>
