<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Detail Silsilah</title>

<style>
body {
  font-family: Arial;
  text-align: center;
}

h2 { margin-bottom: 10px; }

.breadcrumb {
  margin-bottom: 15px;
  font-size: 14px;
}

.breadcrumb span {
  cursor: pointer;
  color: blue;
}

.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.row {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.v-line {
  width: 2px;
  height: 30px;
  background: black;
}

.children {
  position: relative;
  margin-top: 10px;
}

.children::before {
  content: '';
  position: absolute;
  top: -10px;
  left: 10%;
  right: 10%;
  height: 2px;
  background: black;
}

.person {
  border: 1px solid black;
  padding: 10px;
  border-radius: 10px;
  margin: 10px;
  background: white;
  min-width: 120px;
}

.person img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  cursor: pointer;
}

.name {
  cursor: pointer;
  font-weight: bold;
  margin-top: 5px;
}

.couple {
  display: flex;
  gap: 10px;
  justify-content: center;
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.popup-content {
  background: white;
  width: 260px;
  margin: 100px auto;
  padding: 20px;
  border-radius: 10px;
}

.back { margin-bottom: 10px; }
</style>
</head>

<body>

<h2 id="judul">Silsilah Keluarga</h2>
<div class="breadcrumb" id="breadcrumb"></div>

<button class="back" onclick="history.back()">⬅ Kembali</button>

<div class="tree" id="tree"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3 id="nama"></h3>
    <p id="info"></p>

    <button id="btnDetail">Lihat Detail</button><br><br>
    <button onclick="closePopup()">Tutup</button>
  </div>
</div>

<script>
// ===== AMBIL ID =====
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get('id');

fetch('data.json?v=' + new Date().getTime())
.then(res => res.json())
.then(data => {

  const root = data.find(p => p.id === id);

  if (!root) {
    document.getElementById("judul").innerText = "Data tidak ditemukan";
    return;
  }

  document.getElementById("judul").innerText =
    "Silsilah Keluarga " + root.nama;

  buildBreadcrumb(root, data);

  const tree = document.getElementById("tree");

  // ===== ROOT =====
  const row1 = document.createElement("div");
  row1.className = "row";
  row1.appendChild(createPerson(root, data, true));
  tree.appendChild(row1);

  // ===== GARIS =====
  const vline = document.createElement("div");
  vline.className = "v-line";
  tree.appendChild(vline);

  // ===== ANAK (AYAH + IBU + PASANGAN) =====
  const pasanganNama = root.pasangan;

  const children = data.filter(x =>
    x.ayah === root.nama ||
    x.ibu === root.nama ||
    x.ayah === pasanganNama ||
    x.ibu === pasanganNama
  );

  // ===== HAPUS DUPLIKAT =====
  const unique = [];
  const used = new Set();

  children.forEach(c => {
    if (!used.has(c.id)) {
      unique.push(c);
      used.add(c.id);
    }
  });

  const row2 = document.createElement("div");
  row2.className = "row children";

  unique.forEach(p => {
    row2.appendChild(createPerson(p, data, false));
  });

  tree.appendChild(row2);

});


// ===== BREADCRUMB =====
function buildBreadcrumb(person, data) {

  const container = document.getElementById("breadcrumb");

  let path = [];
  let current = person;

  while (current) {
    path.unshift(current);

    current = data.find(x =>
      x.nama === current.ayah || x.nama === current.ibu
    );
  }

  path.forEach((p, i) => {

    const span = document.createElement("span");
    span.innerText = p.nama;

    span.onclick = () => {
      window.location.href = "detail.html?id=" + p.id;
    };

    container.appendChild(span);

    if (i < path.length - 1) {
      container.appendChild(document.createTextNode(" > "));
    }
  });
}


// ===== CARD =====
function createPerson(p, data, isRoot = false) {

  const div = document.createElement("div");
  div.className = "person";

  // ===== ROOT → tampil pasangan =====
  if (isRoot && p.pasangan && p.pasangan !== "-") {

    const pasangan = data.find(x =>
      x.nama.toLowerCase().trim() === p.pasangan.toLowerCase().trim()
    );

    if (pasangan) {
      div.innerHTML = `
        <div class="couple">
          ${personHTML(p)}
          ${personHTML(pasangan)}
        </div>
      `;
    } else {
      div.innerHTML = personHTML(p);
    }

  } else {
    div.innerHTML = personHTML(p);
  }

  return div;
}


// ===== TEMPLATE PERSON =====
function personHTML(p) {
  return `
    <div>
      <img src="${p.foto}" onclick="openPopup('${p.id}')">
      <div class="name" onclick="goDetail('${p.id}')">${p.nama}</div>
    </div>
  `;
}


// ===== POPUP =====
function openPopup(id) {

  fetch('data.json?v=' + new Date().getTime())
  .then(res => res.json())
  .then(data => {

    const p = data.find(x => x.id === id);

    showDetail(
      p.nama,
      `Lahir: ${p.tanggal_lahir}
Alamat: ${p.alamat_lahir}
Domisili: ${p.domisili}
Pasangan: ${p.pasangan}
Anak: ${p.jumlah_anak}
Status: ${p.status}
WA: ${p.wa}
Pekerjaan: ${p.pekerjaan}`,
      p.id
    );

  });
}

function showDetail(nama, info, id) {
  document.getElementById("popup").style.display = "block";
  document.getElementById("nama").innerText = nama;
  document.getElementById("info").innerHTML = info.replace(/\n/g, "<br>");

  const btn = document.getElementById("btnDetail");

  btn.onclick = function() {
    window.location.href = "detail.html?id=" + id;
  };
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}


// ===== NAVIGASI =====
function goDetail(id) {
  window.location.href = "detail.html?id=" + id;
}
</script>

</body>
</html>
