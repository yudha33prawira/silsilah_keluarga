<!DOCTYPE html>

<title>Detail Silsilah</title>

body {
  font-family: Arial;

}

.family-block {
  margin-bottom: 40px;
}

.couple {
  display: flex;
  gap: 20px;
  justify-content: center;
}

.children {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
}

.person {
  border: 1px solid black;
  padding: 10px;
  border-radius: 10px;
}

.person.meninggal {
  background: black;
  color: white;
}
</style>

<body>

<h2 id="judul"></h2>
<button onclick="history.back()">⬅ Kembali</button>

<div id="tree"></div>

<script>
let globalData = [];

const id = new URLSearchParams(window.location.search).get('id');

fetch('data.json?v=' + new Date().getTime())
.then(res => res.json())
.then(data => {
  globalData = data;
  init(data);
});

function init(data) {

  const root = data.find(p => p.id === id);
  if (!root) return;

  document.getElementById("judul").innerText = root.nama;

  let pasanganList = [];

  if (root.pasangan) {
    let list = root.pasangan.split("|").map(x => x.trim());
    pasanganList = data.filter(x => list.includes(x.nama));
  }

  if (pasanganList.length === 0) {
    createBlock(root, null);
  } else {
    pasanganList.forEach(p => createBlock(root, p));
  }
}

function createBlock(root, pasangan) {

  const container = document.getElementById("tree");

  const block = document.createElement("div");
  block.className = "family-block";

  const couple = document.createElement("div");
  couple.className = "couple";

  couple.appendChild(createPerson(root));

  if (pasangan) {
    couple.appendChild(createPerson(pasangan));
  }

  block.appendChild(couple);

  const children = globalData.filter(x =>
    (x.ayah === root.nama && pasangan && x.ibu === pasangan.nama) ||
    (x.ibu === root.nama && pasangan && x.ayah === pasangan.nama)
  );

  if (children.length > 0) {

    const childBox = document.createElement("div");
    childBox.className = "children";

    children.forEach(p => {
      childBox.appendChild(createPerson(p));
    });

    block.appendChild(childBox);
  }

  container.appendChild(block);
}

function createPerson(p) {

  const isMeninggal = (p.status || "").toLowerCase().includes("meninggal");

  const div = document.createElement("div");
  div.className = isMeninggal ? "person meninggal" : "person";

  div.innerHTML = `
    <div onclick="goDetail('${p.id}')">${p.nama}</div>
  `;

  return div;
}
