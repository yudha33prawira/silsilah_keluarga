<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Detail Silsilah</title>

<style>
body {
  font-family: Arial;
  text-align: center;
}

h2 {
  margin-bottom: 20px;
}

.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.row {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.v-line {
  width: 2px;
  height: 30px;
  background: black;
}

.children {
  position: relative;
  margin-top: 10px;
}

.children::before {
  content: '';
  position: absolute;
  top: -10px;
  left: 10%;
  right: 10%;
  height: 2px;
  background: black;
}

.person {
  border: 1px solid black;
  padding: 10px;
  border-radius: 10px;
  margin: 10px;
  background: white;
  cursor: pointer;
  min-width: 120px;
}

.person img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
}

.back {
  margin-bottom: 20px;
}
</style>
</head>

<body>

<h2 id="judul">Detail Keluarga</h2>

<button class="back" onclick="history.back()">⬅ Kembali</button>

<div class="tree" id="tree"></div>

<script>
// ambil id dari URL
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get('id');

fetch('data.json')
  .then(res => res.json())
  .then(data => {

    const root = data.find(p => p.id === id);

    if (!root) {
      document.getElementById("judul").innerText = "Data tidak ditemukan";
      return;
    }

    document.getElementById("judul").innerText = "Keturunan " + root.nama;

    const tree = document.getElementById("tree");

    buildTree([root], tree, data);
  });


// ===== BUILD TREE (KHUSUS GARIS KETURUNAN) =====
function buildTree(parents, container, data) {

  if (parents.length === 0) return;

  // tampilkan parent
  const row = document.createElement("div");
  row.className = "row";

  parents.forEach(p => {
    row.appendChild(createPerson(p));
  });

  container.appendChild(row);

  // cari anak
  let children = [];

  parents.forEach(p => {
    const child = data.filter(x => x.orang_tua === p.nama);
    children = children.concat(child);
  });

  // hapus duplikat
  const uniqueChildren = [];
  const used = new Set();

  children.forEach(c => {
    if (!used.has(c.nama)) {
      uniqueChildren.push(c);
      used.add(c.nama);
    }
  });

  // lanjut ke bawah
  if (uniqueChildren.length > 0) {

    const vline = document.createElement("div");
    vline.className = "v-line";
    container.appendChild(vline);

    const childContainer = document.createElement("div");
    childContainer.className = "tree children";

    container.appendChild(childContainer);

    buildTree(uniqueChildren, childContainer, data);
  }
}


// ===== CARD (TANPA PASANGAN) =====
function createPerson(p) {

  const div = document.createElement("div");
  div.className = "person";

  div.innerHTML = `
    <img src="${p.foto}">
    <div>${p.nama}</div>
  `;

  return div;
}
</script>

</body>
</html>
