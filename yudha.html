<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Silsilah Keluarga</title>

<style>
body {
  font-family: Arial;
  text-align: center;
}

.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.row {
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Garis dari orang tua ke tengah */
.v-line {
  width: 2px;
  height: 35px;
  background: black;
  margin-bottom: 10px;
}

/* ===== GARIS OTOMATIS KE ANAK ===== */
.row.children {
  position: relative;
}

/* garis horizontal */
.row.children::before {
  content: '';
  position: absolute;
  top: -10px;
  left: 5%;
  right: 5%;
  height: 2px;
  background: black;
}

/* garis ke tiap anak */
.row.children .person {
  position: relative;
}

.row.children .person::before {
  content: '';
  position: absolute;
  top: -20px;
  left: 50%;
  width: 2px;
  height: 20px;
  background: black;
}

/* Card orang */
.person {
  border: 1px solid #000;
  padding: 10px;
  border-radius: 10px;
  margin: 10px;
  width: 110px;
  cursor: pointer;
}

.person img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.popup-content {
  background: white;
  width: 260px;
  margin: 100px auto;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}
</style>
</head>

<body>

<h2>Silsilah Keluarga Yudha</h2>

<div class="tree">

  <!-- ORANG TUA -->
  <div class="row">

    <div class="person"
onclick="showDetail('R Yudha Prawira Dirja','Gen3\nAyah\nLahir: 1990\nAlamat Lahir: Tasikmalaya\nDomisili: Bandung\nHubungan: Menikah dengan Ina\nKeturunan: 2\nStatus Saat Ini : Hidup\nWA: +62 851-7333-8862\nPekerjaan: Bekerja di perusahaan aplikasi pembayaran online')">
  <img src="images/yudha.jpg">
  <div>R Yudha Prawira Dirja</div>
</div>

<div class="person"
onclick="showDetail('Ina Febrianti','Gen3\nIbu\nLahir: 1998\nAlamat Lahir: Banyumas\nDomisili: Bandung\nHubungan: Menikah dengan R Yudha Prawira D\nKeturunan: 2\nStatus Saat Ini : Hidup\nWA: +62 857-7441-0435\nPekerjaan: Ibu Rumah Tangga')">
  <img src="images/ina.jpg">
  <div>Ina Febrianti</div>
</div>

  </div>

  <div class="v-line"></div>

  <!-- ANAK -->
  <div class="row children">

    <div class="person"
onclick="showDetail('Arsyad Hamizan','Gen4\nAnak1\nLahir: ------\nAlamat Lahir: Banyumas\nDomisili: Bandung\nHubungan: Lajang\nKeturunan: -----\nStatus Saat Ini : Hidup\nWA: -------\nPekerjaan: ——-')">
  <img src="images/arsyad.jpg">
  <div>Arsyad Hamizan</div>
    </div>

    <div class="person"
onclick="showDetail('Arvin Hamzah','Gen4\nAnak2\nLahir: ------\nAlamat Lahir: Banyumas\nDomisili: Bandung\nHubungan: Lajang\nKeturunan: -----\nStatus Saat Ini : Hidup\nWA: -------\nPekerjaan: ——-')">
  <img src="images/arvin.jpg">
  <div>Arvin Hamzah</div>
    </div>

  </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3 id="nama"></h3>
    <p id="info"></p>

    <button id="btnDetail">Lihat Silsilah</button><br><br>
    <button onclick="closePopup()">Tutup</button>
  </div>
</div>

<script>
function showDetail(nama, info, link) {
  document.getElementById("popup").style.display = "block";
  document.getElementById("nama").innerText = nama;
  document.getElementById("info").innerHTML = info.replace(/\n/g, "<br>");

  const btn = document.getElementById("btnDetail");

  if (link) {
    btn.style.display = "inline-block";
    btn.onclick = function() {
      window.location.href = link;
    };
  } else {
    btn.style.display = "none";
  }
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
